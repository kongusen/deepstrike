
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike signals and reactive sessions</title>
  <desc id="desc">Signals enter through scheduled prompts, webhooks, injected notes, or broadcasts, use leased claim and acknowledgment, receive kernel attention dispositions, then feed a reactive multi-peer session with shared budget and idempotent checkpoints.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">SIGNALS &amp; REACTIVE / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Signals turn external events into governed peer work.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">INGEST · LEASE · ATTENTION · BLACKBOARD · RUNGROUP</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Signal ingress and delivery</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">A DURABLE SOURCE MAY IMPLEMENT THE SAME LEASED CONTRACT</text>

  <g>
    <rect x="48" y="146" width="210" height="116" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="116" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">Ingress</text>
    <text x="66" y="199" class="card-text" text-anchor="start">schedule · ingest · injectNote</text>
<text x="66" y="217" class="card-text" text-anchor="start">broadcast · targeted interrupt</text>

  </g>
    <path d="M258 204H304" class="flow flow-coral"/>

  <g>
    <rect x="306" y="146" width="210" height="116" rx="6" class="panel"/>

    <text x="324" y="175" class="card-title" text-anchor="start">Recipient + dedupe</text>
    <text x="324" y="199" class="card-text" text-anchor="start">recipient routing</text>
<text x="324" y="217" class="card-text" text-anchor="start">dedupe key + TTL / deadline</text>

  </g>
    <path d="M516 204H562" class="flow flow-coral"/>

  <g>
    <rect x="564" y="146" width="210" height="116" rx="6" class="panel"/>

    <text x="582" y="175" class="card-title" text-anchor="start">Claim lease</text>
    <text x="582" y="199" class="card-text" text-anchor="start">claim → ack on kernel accept</text>
<text x="582" y="217" class="card-text" text-anchor="start">nack / expiry makes visible again</text>

  </g>
    <path d="M774 204H820" class="flow flow-coral"/>

  <g>
    <rect x="822" y="146" width="330" height="116" rx="6" class="panel"/>

    <text x="840" y="175" class="card-title" text-anchor="start">Attention disposition</text>
    <text x="840" y="199" class="card-text" text-anchor="start">ignore · observe · queue · run</text>
<text x="840" y="217" class="card-text" text-anchor="start">interrupt · interrupt_now · dropped</text>

  </g>


  <text x="48" y="310" class="section-title" text-anchor="start">Kernel attention plane</text>
  <text x="1152" y="310" class="section-note" text-anchor="end">SIGNALS RENDER IN state_turn, NEVER IN THE CACHE-STABLE PREFIX</text>
    <rect x="48" y="330" width="1104" height="118" rx="7" class="kernel"/>
    <text x="68" y="361" class="label" text-anchor="start">Urgency + task lifecycle + deadline escalation</text>
    <path d="M346 358H466" class="flow flow-coral"/>
    <text x="486" y="361" class="label" text-anchor="start">bounded queue / displacement / dedupe</text>
    <path d="M716 358H836" class="flow flow-coral"/>
    <text x="856" y="361" class="label" text-anchor="start">[SIGNAL] directive on a turn boundary</text>
    <text x="68" y="410" class="body" text-anchor="start">Queue overflow returns dropped without committing the dedupe key, so the SDK can apply backpressure and retry safely.</text>


  <text x="48" y="496" class="section-title" text-anchor="start">ReactiveSession governance domain</text>
  <text x="1152" y="496" class="section-note" text-anchor="end">BLACKBOARD SELECTS WORK · RUNGROUP ACCOUNTS FOR IT</text>

  <g>
    <rect x="48" y="516" width="210" height="116" rx="6" class="panel"/>

    <text x="66" y="545" class="card-title" text-anchor="start">EventStream</text>
    <text x="66" y="569" class="card-text" text-anchor="start">Shared blackboard</text>
<text x="66" y="587" class="card-text" text-anchor="start">visibility by channel / audience</text>

  </g>

  <g>
    <rect x="274" y="516" width="210" height="116" rx="6" class="panel"/>

    <text x="292" y="545" class="card-title" text-anchor="start">TurnPolicy</text>
    <text x="292" y="569" class="card-text" text-anchor="start">Select visible peers</text>
<text x="292" y="587" class="card-text" text-anchor="start">reactByMention or custom</text>

  </g>

  <g>
    <rect x="500" y="516" width="210" height="116" rx="6" class="panel"/>

    <text x="518" y="545" class="card-title" text-anchor="start">Reaction checkpoint</text>
    <text x="518" y="569" class="card-text" text-anchor="start">Idempotency key + lease</text>
<text x="518" y="587" class="card-text" text-anchor="start">Save plan and partial outputs</text>

  </g>

  <g>
    <rect x="726" y="516" width="210" height="116" rx="6" class="panel"/>

    <text x="744" y="545" class="card-title" text-anchor="start">Peer RuntimeRunner</text>
    <text x="744" y="569" class="card-text" text-anchor="start">One durable session per persona</text>
<text x="744" y="587" class="card-text" text-anchor="start">Retry only unfinished reactions</text>

  </g>

  <g>
    <rect x="952" y="516" width="200" height="116" rx="6" class="panel"/>

    <text x="970" y="545" class="card-title" text-anchor="start">RunGroup</text>
    <text x="970" y="569" class="card-text" text-anchor="start">Shared cumulative budget</text>
<text x="970" y="587" class="card-text" text-anchor="start">Membership + lineage</text>

  </g>
    <path d="M258 574H272" class="flow"/><path d="M484 574H498" class="flow"/><path d="M710 574H724" class="flow"/><path d="M936 574H950" class="flow flow-coral"/>

  <text x="48" y="684" class="section-title" text-anchor="start">Deployment boundary</text>
  <text x="1152" y="684" class="section-note" text-anchor="end">IN-MEMORY STORES ARE PROCESS-LOCAL · MULTI-REPLICA USES ATOMIC DURABLE IMPLEMENTATIONS</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
