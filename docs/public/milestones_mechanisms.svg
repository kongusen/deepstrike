
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike milestone state machine</title>
  <desc id="desc">Milestone phases progress from pending through evaluation to passed or failed, collect required evidence, unlock later capabilities, and apply explicit retry or termination policy.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">MILESTONES / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Acceptance gates turn long work into explicit phases.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">CONTRACT · EVIDENCE · EVALUATION · UNLOCK</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Milestone contract</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">PHASES AND REQUIRED EVIDENCE ARE DATA</text>

  <g>
    <rect x="48" y="146" width="250" height="104" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="104" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">Pending phase</text>
    <text x="66" y="199" class="card-text" text-anchor="start">id · description · criteria</text>
<text x="66" y="217" class="card-text" text-anchor="start">requiredEvidence · unlocks</text>

  </g>
    <path d="M298 198H370" class="flow flow-coral"/>

  <g>
    <rect x="372" y="146" width="250" height="104" rx="6" class="panel"/>

    <text x="390" y="175" class="card-title" text-anchor="start">Evidence boundary</text>
    <text x="390" y="199" class="card-text" text-anchor="start">Agent emits milestone_check</text>
<text x="390" y="217" class="card-text" text-anchor="start">Kernel records supplied evidence</text>

  </g>
    <path d="M622 198H694" class="flow flow-coral"/>

  <g>
    <rect x="696" y="146" width="250" height="104" rx="6" class="panel"/>

    <text x="714" y="175" class="card-title" text-anchor="start">Evaluation policy</text>
    <text x="714" y="199" class="card-text" text-anchor="start">require_verifier · terminate</text>
<text x="714" y="217" class="card-text" text-anchor="start">auto_pass for development</text>

  </g>
    <path d="M946 198H1018" class="flow flow-coral"/>

  <g>
    <rect x="1020" y="146" width="132" height="104" rx="6" class="panel"/>

    <text x="1038" y="175" class="card-title" text-anchor="start">Verdict</text>
    <text x="1038" y="199" class="card-text" text-anchor="start">pass</text>
<text x="1038" y="217" class="card-text" text-anchor="start">or fail</text>

  </g>


  <text x="48" y="300" class="section-title" text-anchor="start">State transitions</text>
  <text x="1152" y="300" class="section-note" text-anchor="end">FAILURE POLICY IS EXPLICIT AND BOUNDED</text>
    <rect x="48" y="320" width="1104" height="156" rx="7" class="kernel"/>

  <rect x="82" y="350" width="92" height="22" rx="11" class="pill ivory"/>
  <text x="128" y="365" class="pill-text" text-anchor="middle">PENDING</text>
    <path d="M176 361H318" class="flow"/>

  <rect x="320" y="350" width="108" height="22" rx="11" class="pill coral"/>
  <text x="374" y="365" class="pill-text" text-anchor="middle">EVALUATING</text>
    <path d="M430 361H572" class="flow flow-coral"/>

  <rect x="574" y="350" width="80" height="22" rx="11" class="pill ivory"/>
  <text x="614" y="365" class="pill-text" text-anchor="middle">PASSED</text>
    <path d="M654 361H796" class="flow"/>

  <rect x="798" y="350" width="96" height="22" rx="11" class="pill ivory"/>
  <text x="846" y="365" class="pill-text" text-anchor="middle">UNLOCKED</text>
    <path d="M374 372V430H574" class="flow flow-coral flow-dash"/>

  <rect x="576" y="420" width="76" height="22" rx="11" class="pill muted"/>
  <text x="614" y="435" class="pill-text" text-anchor="middle">FAILED</text>
    <path d="M652 431H758" class="flow flow-coral"/>
    <text x="778" y="435" class="label" text-anchor="start">retry / rollback / terminate</text>
    <text x="82" y="448" class="body" text-anchor="start">Phase state and evidence are journaled; retry exhaustion terminates instead of re-entering an unbounded loop.</text>


  <text x="48" y="526" class="section-title" text-anchor="start">Composition</text>
  <text x="1152" y="526" class="section-note" text-anchor="end">MILESTONES DO NOT REPLACE WORKFLOWS OR HARNESSES</text>

  <g>
    <rect x="48" y="546" width="258" height="92" rx="6" class="panel"/>

    <text x="66" y="575" class="card-title" text-anchor="start">With workflows</text>
    <text x="66" y="599" class="card-text" text-anchor="start">Gate one run phase</text>
<text x="66" y="617" class="card-text" text-anchor="start">while DAG nodes schedule work</text>

  </g>

  <g>
    <rect x="324" y="546" width="258" height="92" rx="6" class="panel"/>

    <text x="342" y="575" class="card-title" text-anchor="start">With sub-agents</text>
    <text x="342" y="599" class="card-text" text-anchor="start">Verifier supplies evidence</text>
<text x="342" y="617" class="card-text" text-anchor="start">Unlock narrows later authority</text>

  </g>

  <g>
    <rect x="600" y="546" width="258" height="92" rx="6" class="panel"/>

    <text x="618" y="575" class="card-title" text-anchor="start">With harness eval</text>
    <text x="618" y="599" class="card-text" text-anchor="start">Verdict feedback can retry</text>
<text x="618" y="617" class="card-text" text-anchor="start">without changing kernel semantics</text>

  </g>

  <g>
    <rect x="876" y="546" width="276" height="92" rx="6" class="panel"/>

    <text x="894" y="575" class="card-title" text-anchor="start">With SessionLog</text>
    <text x="894" y="599" class="card-text" text-anchor="start">Attempts and outcomes survive</text>
<text x="894" y="617" class="card-text" text-anchor="start">replay, audit, and recovery</text>

  </g>

  <text x="48" y="684" class="section-title" text-anchor="start">Invariant</text>
  <text x="1152" y="684" class="section-note" text-anchor="end">A PHASE PASSES ONLY FROM EVIDENCE ACCEPTED BY ITS CONFIGURED POLICY</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
