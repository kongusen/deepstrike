<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" />
  <rect width="800" height="480" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid lines -->
  <path d="M 0 60 L 800 60 M 0 120 L 800 120 M 0 180 L 800 180 M 0 240 L 800 240 M 0 300 L 800 300 M 0 360 L 800 360 M 0 420 L 800 420" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 100 0 L 100 480 M 200 0 L 200 480 M 300 0 L 300 480 M 400 0 L 400 480 M 500 0 L 500 480 M 600 0 L 600 480 M 700 0 L 700 480" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">QUALITY GATE: HARNESS &amp; EVAL LOOP</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Evaluation Feedback Loop &amp; Retry Logic</text>

  <!-- OUTER HARNESS BOX -->
  <g transform="translate(40, 80)">
    <rect width="720" height="370" rx="10" fill="none" stroke="#bd00ff" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="15" y="-10" fill="#c084fc" font-size="11" font-weight="bold">HarnessLoop (max_attempts = 3)</text>

    <!-- STEP 1: RUN AGENT (Left) -->
    <g transform="translate(25, 110)">
      <rect width="180" height="110" rx="6" fill="url(#boxGrad)" stroke="#00f0ff" stroke-width="1.2" />
      <text x="15" y="24" fill="#ffffff" font-size="12" font-weight="bold">1. Run Agent Task</text>
      <text x="15" y="44" fill="#94a3b8" font-size="8.5">Runner drives agent loop</text>
      <text x="15" y="56" fill="#94a3b8" font-size="8.5">Produces agent text output</text>
      
      <!-- Attempt Indicator -->
      <rect x="15" y="75" width="90" height="18" rx="3" fill="#00f0ff" opacity="0.1" />
      <text x="20" y="87" fill="#38bdf8" font-size="8" font-weight="bold">Attempt counter: N</text>
    </g>

    <!-- STEP 2: EVAL JUDGE (Middle) -->
    <g transform="translate(260, 110)">
      <rect width="200" height="110" rx="6" fill="url(#boxGrad)" stroke="#1e293b" stroke-width="1" />
      <text x="15" y="24" fill="#ffffff" font-size="12" font-weight="bold">2. Eval Judge Plane</text>
      <text x="15" y="42" fill="#94a3b8" font-size="8.5">Reviews output against criteria</text>
      
      <!-- LLM / Rules -->
      <rect x="15" y="58" width="170" height="40" rx="4" fill="#111827" stroke="#334155" stroke-width="0.8" />
      <text x="22" y="72" fill="#e2e8f0" font-size="9" font-weight="bold">▪ LLM-as-a-judge (independent)</text>
      <text x="22" y="85" fill="#e2e8f0" font-size="9" font-weight="bold">▪ Deterministic rule engine</text>
    </g>

    <!-- STEP 3: DECISION DIAMOND (Right) -->
    <g transform="translate(520, 110)">
      <!-- Diamond represented as polygon -->
      <polygon points="80,10 150,60 80,110 10,60" fill="#1e293b" stroke="#00f0ff" stroke-width="1.5" />
      <text x="80" y="64" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Verdict</text>
      <text x="80" y="76" text-anchor="middle" fill="#00f0ff" font-size="9" font-weight="bold">Passed?</text>
    </g>

    <!-- CRITERIA CARD (Floating top middle) -->
    <g transform="translate(260, 30)">
      <rect width="200" height="50" rx="4" fill="#111827" stroke="#fbbf24" stroke-width="1" />
      <text x="12" y="18" fill="#fbbf24" font-size="9.5" font-weight="bold">Harness Request Criteria:</text>
      <text x="12" y="32" fill="#e2e8f0" font-size="8">e.g. "Output includes error handling logic"</text>
      <text x="12" y="42" fill="#e2e8f0" font-size="8">e.g. "Executable code completes without panic"</text>
    </g>

    <!-- SUCCESS PATH (Right Out) -->
    <path d="M 670,170 L 690,170" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)" />
    <text x="695" y="155" fill="#10b981" font-size="9" font-weight="bold">YES</text>
    
    <g transform="translate(620, 220)">
      <rect width="80" height="40" rx="4" fill="#10b981" opacity="0.1" stroke="#10b981" />
      <text x="40" y="24" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">DELIVER</text>
      <text x="40" y="34" text-anchor="middle" fill="#a7f3d0" font-size="7">Return outcome</text>
    </g>

    <!-- FAIL / RETRY PATH (Loop back) -->
    <path d="M 590,220 L 590,280 L 115,280 L 115,230" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)" />
    <text x="596" y="245" fill="#ef4444" font-size="9" font-weight="bold">NO (Attempt &lt; max)</text>
    
    <g transform="translate(240, 290)">
      <rect width="240" height="55" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" />
      <text x="120" y="20" text-anchor="middle" fill="#f87171" font-size="10.5" font-weight="bold">Feedback Injected to Agent VM</text>
      <text x="120" y="35" text-anchor="middle" fill="#ffffff" font-size="8">Verdict feedback is injected into history turns.</text>
      <text x="120" y="45" text-anchor="middle" fill="#94a3b8" font-size="8">Prompts agent to review feedback and refine output.</text>
    </g>

    <!-- TERMINATE / RETRIES EXHAUSTED -->
    <path d="M 590,220 C 590,260 550,260 550,370" fill="none" stroke="#ef4444" stroke-dasharray="3 3" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <text x="500" y="260" fill="#f87171" font-size="7.5" font-weight="bold">NO (Attempt >= max)</text>
    <g transform="translate(470, 370)">
      <rect width="160" height="40" rx="4" fill="#ef4444" opacity="0.15" stroke="#ef4444" />
      <text x="80" y="20" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">Harness Failed</text>
      <text x="80" y="32" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="bold">Aborts downstream tasks</text>
    </g>
  </g>

  <!-- Connectors -->
  <!-- Run to Judge -->
  <path d="M 205,170 L 250,170" stroke="#00f0ff" stroke-width="2" marker-end="url(#arrow)" />
  <!-- Judge to Diamond -->
  <path d="M 460,170 L 520,170" stroke="#bd00ff" stroke-width="2" marker-end="url(#arrowPurple)" />
</svg>
