
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike harness and evaluation</title>
  <desc id="desc">Ordinary agent runs can be wrapped by single-pass, retry, eval-loop, or contract-driven harnesses using an independent judge, structured verdicts, bounded feedback, workflow integration, and SessionLog evidence.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">HARNESS &amp; EVAL / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Evaluation wraps the run without replacing the runtime loop.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">RUN · JUDGE · FEEDBACK · BOUNDED RETRY · VERDICT</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">One evaluation attempt</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">GENERATOR AND JUDGE MAY USE DIFFERENT PROVIDERS</text>

  <g>
    <rect x="48" y="146" width="258" height="116" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="116" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">Agent run</text>
    <text x="66" y="199" class="card-text" text-anchor="start">Normal RuntimeRunner semantics</text>
<text x="66" y="217" class="card-text" text-anchor="start">Tools · governance · SessionLog</text>

  </g>
    <path d="M306 204H372" class="flow flow-coral"/>

  <g>
    <rect x="374" y="146" width="258" height="116" rx="6" class="panel"/>

    <text x="392" y="175" class="card-title" text-anchor="start">Candidate output</text>
    <text x="392" y="199" class="card-text" text-anchor="start">Text or structured value</text>
<text x="392" y="217" class="card-text" text-anchor="start">Attempt evidence stays durable</text>

  </g>
    <path d="M632 204H698" class="flow flow-coral"/>

  <g>
    <rect x="700" y="146" width="208" height="116" rx="6" class="panel"/>

    <text x="718" y="175" class="card-title" text-anchor="start">Judge</text>
    <text x="718" y="199" class="card-text" text-anchor="start">Independent eval provider</text>
<text x="718" y="217" class="card-text" text-anchor="start">Criterion-by-criterion verdict</text>

  </g>
    <path d="M908 204H974" class="flow flow-coral"/>

  <g>
    <rect x="976" y="146" width="176" height="116" rx="6" class="panel"/>

    <text x="994" y="175" class="card-title" text-anchor="start">Verdict</text>
    <text x="994" y="199" class="card-text" text-anchor="start">pass · score</text>
<text x="994" y="217" class="card-text" text-anchor="start">feedback</text>
<text x="994" y="235" class="card-text" text-anchor="start">evidence</text>

  </g>


  <text x="48" y="310" class="section-title" text-anchor="start">Bounded harness loop</text>
  <text x="1152" y="310" class="section-note" text-anchor="end">FAILURE FEEDBACK BECOMES THE NEXT ATTEMPT'S INPUT</text>
    <rect x="48" y="330" width="1104" height="136" rx="7" class="kernel"/>

  <rect x="78" y="354" width="90" height="22" rx="11" class="pill ivory"/>
  <text x="123" y="369" class="pill-text" text-anchor="middle">ATTEMPT</text>
    <path d="M170 365H314" class="flow flow-coral"/>

  <rect x="316" y="354" width="82" height="22" rx="11" class="pill coral"/>
  <text x="357" y="369" class="pill-text" text-anchor="middle">JUDGE</text>
    <path d="M400 365H544" class="flow flow-coral"/>

  <rect x="546" y="354" width="78" height="22" rx="11" class="pill ivory"/>
  <text x="585" y="369" class="pill-text" text-anchor="middle">PASS</text>
    <path d="M624 365H768" class="flow"/>

  <rect x="770" y="354" width="82" height="22" rx="11" class="pill ivory"/>
  <text x="811" y="369" class="pill-text" text-anchor="middle">RETURN</text>
    <path d="M356 376V430H142V378" class="flow flow-coral flow-dash"/>
    <text x="248" y="426" class="micro" text-anchor="middle">fail → bounded feedback + retry</text>
    <text x="78" y="448" class="body" text-anchor="start">maxAttempts and contract policy cap retries; the harness cannot silently create an unbounded agent loop.</text>


  <text x="48" y="514" class="section-title" text-anchor="start">Harness forms and composition</text>
  <text x="1152" y="514" class="section-note" text-anchor="end">ALL OF THEM REUSE THE SAME RUNNER, WORKFLOW, AND EVIDENCE CONTRACTS</text>

  <g>
    <rect x="48" y="534" width="258" height="102" rx="6" class="panel"/>

    <text x="66" y="563" class="card-title" text-anchor="start">SinglePassHarness</text>
    <text x="66" y="587" class="card-text" text-anchor="start">One run + one eval</text>
<text x="66" y="605" class="card-text" text-anchor="start">Fast acceptance check</text>

  </g>

  <g>
    <rect x="324" y="534" width="258" height="102" rx="6" class="panel"/>

    <text x="342" y="563" class="card-title" text-anchor="start">HarnessLoop</text>
    <text x="342" y="587" class="card-text" text-anchor="start">Feedback-driven attempts</text>
<text x="342" y="605" class="card-text" text-anchor="start">Bounded by maxAttempts</text>

  </g>

  <g>
    <rect x="600" y="534" width="258" height="102" rx="6" class="panel"/>

    <text x="618" y="563" class="card-title" text-anchor="start">ContractDrivenHarness</text>
    <text x="618" y="587" class="card-text" text-anchor="start">Collaboration criteria</text>
<text x="618" y="605" class="card-text" text-anchor="start">Handoff / milestone evidence</text>

  </g>

  <g>
    <rect x="876" y="534" width="276" height="102" rx="6" class="panel"/>

    <text x="894" y="563" class="card-title" text-anchor="start">Workflow node harness</text>
    <text x="894" y="587" class="card-text" text-anchor="start">Per-node retry / verifier</text>
<text x="894" y="605" class="card-text" text-anchor="start">Dependents see accepted output only</text>

  </g>

  <text x="48" y="686" class="section-title" text-anchor="start">Separation</text>
  <text x="1152" y="686" class="section-note" text-anchor="end">HARNESS EVAL IMPROVES ONE OUTPUT · SELF-HARNESS EVOLVES THE NEXT RUN'S BOUNDED PROFILE</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
