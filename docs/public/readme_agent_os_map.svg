
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike runtime mechanism</title>
  <desc id="desc">The complete DeepStrike 0.2.48 runtime boundary: host-owned I/O, RuntimeRunner driving ABI v2, a Rust kernel governing control flow, and an isolated Self-Harness v2 outer loop improving the next run.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">RUNTIME MECHANISM / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">One governed loop for every agent effect.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="122" class="section-title" text-anchor="start">Host-owned I/O</text>
  <text x="1152" y="122" class="section-note" text-anchor="end">CREDENTIALS · NETWORK · FILESYSTEM · DURABLE STORAGE</text>

  <g>
    <rect x="48" y="140" width="258" height="82" rx="6" class="panel"/>
    <rect x="48" y="140" width="5" height="82" rx="2.5" class="accent-fill"/>
    <text x="66" y="169" class="card-title" text-anchor="start">Provider adapters</text>
    <text x="66" y="193" class="card-text" text-anchor="start">Streaming LLM calls · model routing</text>
<text x="66" y="211" class="card-text" text-anchor="start">Text · image · audio serialization</text>

  </g>

  <g>
    <rect x="324" y="140" width="258" height="82" rx="6" class="panel"/>

    <text x="342" y="169" class="card-title" text-anchor="start">ExecutionPlane</text>
    <text x="342" y="193" class="card-text" text-anchor="start">Tools · streaming · suspend / resume</text>
<text x="342" y="211" class="card-text" text-anchor="start">Worktrees · sandboxes · remote VPC</text>

  </g>

  <g>
    <rect x="600" y="140" width="258" height="82" rx="6" class="panel"/>

    <text x="618" y="169" class="card-title" text-anchor="start">Evidence &amp; durable stores</text>
    <text x="618" y="193" class="card-text" text-anchor="start">SessionLog · ABI transactions · snapshots</text>
<text x="618" y="211" class="card-text" text-anchor="start">DreamStore · archives · large-result spool</text>

  </g>

  <g>
    <rect x="876" y="140" width="276" height="82" rx="6" class="panel"/>

    <text x="894" y="169" class="card-title" text-anchor="start">External control</text>
    <text x="894" y="193" class="card-text" text-anchor="start">Approvals · signals · webhooks · cron</text>
<text x="894" y="211" class="card-text" text-anchor="start">Cancellation · deadlines · host policy</text>

  </g>

  <text x="48" y="260" class="section-title" text-anchor="start">Host runtime loop</text>
  <text x="1152" y="260" class="section-note" text-anchor="end">RUNTIMERUNNER · ACTIONS OUT · OBSERVATIONS IN</text>

  <g>
    <rect x="48" y="278" width="1104" height="48" rx="6" class="panel-strong"/>
    <rect x="48" y="278" width="5" height="48" rx="2.5" class="accent-fill"/>
    <text x="66" y="307" class="card-title" text-anchor="start">RuntimeRunner</text>


  </g>
    <text x="210" y="308" class="card-text" text-anchor="start">dispatch KernelEffect</text>
    <text x="408" y="308" class="card-text" text-anchor="start">execute approved effects</text>
    <text x="620" y="308" class="card-text" text-anchor="start">append evidence</text>
    <text x="760" y="308" class="card-text" text-anchor="start">feed observations</text>
    <text x="928" y="308" class="card-text" text-anchor="start">signals · harness instructions</text>
    <path d="M488 326V347H386V368" class="flow"/>
    <path d="M704 368V347H592V326" class="flow flow-coral"/>
    <text x="410" y="350" class="micro" text-anchor="start">EFFECTS OUT</text>
    <text x="720" y="350" class="micro" text-anchor="start">OBSERVATIONS IN</text>
    <rect x="48" y="370" width="1104" height="214" rx="7" class="kernel"/>
    <text x="68" y="400" class="section-title" text-anchor="start">deepstrike-core</text>
    <text x="205" y="400" class="section-note" text-anchor="start">PURE RUST · SERIALIZABLE STATE MACHINE · ABI v2 · ZERO PROVIDER I/O</text>

  <rect x="1067" y="384" width="66" height="22" rx="11" class="pill coral"/>
  <text x="1100" y="399" class="pill-text" text-anchor="middle">KERNEL</text>

  <g>
    <rect x="68" y="422" width="249" height="136" rx="6" class="panel"/>

    <text x="86" y="451" class="card-title" text-anchor="start">Syscall gate &amp; governance</text>
    <text x="86" y="475" class="card-text" text-anchor="start">Invoke · Spawn · memory</text>
<text x="86" y="493" class="card-text" text-anchor="start">SubmitNodes · LoadWorkflow</text>

  </g>
        <path d="M86 509H299" class="rule"/>
        <text x="86" y="536" class="micro" text-anchor="start">ALLOW · DENY · ASK · RATE LIMIT</text>

  <g>
    <rect x="329" y="422" width="249" height="136" rx="6" class="panel"/>

    <text x="347" y="451" class="card-title" text-anchor="start">Scheduler, process tree &amp; DAG</text>
    <text x="347" y="475" class="card-text" text-anchor="start">TCBs · child agents · dependency barriers</text>
<text x="347" y="493" class="card-text" text-anchor="start">Budgets · quota · trust · isolation</text>

  </g>
        <path d="M347 509H560" class="rule"/>
        <text x="347" y="536" class="micro" text-anchor="start">LOOP · CLASSIFY · REDUCE</text>

  <g>
    <rect x="590" y="422" width="249" height="136" rx="6" class="panel"/>

    <text x="608" y="451" class="card-title" text-anchor="start">Context VM &amp; knowledge</text>
    <text x="608" y="475" class="card-text" text-anchor="start">stable · knowledge · history · state</text>
<text x="608" y="493" class="card-text" text-anchor="start">Compression · handles · cache boundaries</text>

  </g>
        <path d="M608 509H821" class="rule"/>
        <text x="608" y="536" class="micro" text-anchor="start">SKILL LEASE · KNOWLEDGE BUDGET</text>

  <g>
    <rect x="851" y="422" width="281" height="136" rx="6" class="panel"/>

    <text x="869" y="451" class="card-title" text-anchor="start">Observation &amp; recovery</text>
    <text x="869" y="475" class="card-text" text-anchor="start">Provider / tool results · visible denials</text>
<text x="869" y="493" class="card-text" text-anchor="start">Signals · transactions · snapshots · wake</text>

  </g>
        <path d="M869 509H1114" class="rule"/>
        <text x="869" y="536" class="micro" text-anchor="start">APPEND-ONLY EVIDENCE</text>

  <text x="48" y="620" class="section-title" text-anchor="start">Self-Harness v2 outer loop</text>
  <text x="1152" y="620" class="section-note" text-anchor="end">IMPROVES THE NEXT RUN · NEVER BYPASSES GOVERNANCE</text>

  <g>
    <rect x="48" y="638" width="770" height="62" rx="6" class="panel"/>
    <rect x="48" y="638" width="5" height="62" rx="2.5" class="accent-fill"/>
    <text x="66" y="667" class="card-title" text-anchor="start">evidence → cluster → propose → screen → held-in / held-out validation → tiered promote</text>
    <text x="66" y="691" class="card-text" text-anchor="start">scope isolation · capability intersection · content-addressed lineage</text>

  </g>

  <g>
    <rect x="838" y="638" width="314" height="62" rx="6" class="panel"/>

    <text x="856" y="667" class="card-title" text-anchor="start">Host SDKs on one ABI</text>
    <text x="856" y="691" class="card-text" text-anchor="start">Node.js · Python · Rust · WASM</text>

  </g>
    <path d="M818 669H836" class="flow flow-coral flow-dash"/>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
