<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike Agent OS capability map</title>
  <desc id="desc">A layered map showing host SDKs, the kernel ABI, kernel planes, workflow patterns, and production properties.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#101827"/>
      <stop offset="1" stop-color="#07101a"/>
    </linearGradient>
    <linearGradient id="kernel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102b3a"/>
      <stop offset="1" stop-color="#0e1726"/>
    </linearGradient>
    <linearGradient id="host" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#291b3e"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .title { font: 800 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .subtitle { font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #9ca3af; letter-spacing: 0; }
      .section { font: 800 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .label { font: 700 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #e5e7eb; letter-spacing: 0; }
      .small { font: 500 11px system-ui, -apple-system, Segoe UI, sans-serif; fill: #aeb8c5; letter-spacing: 0; }
      .tiny { font: 700 10px system-ui, -apple-system, Segoe UI, sans-serif; fill: #0b1220; letter-spacing: 0; }
      .card { fill: #111827; stroke: #263449; stroke-width: 1; rx: 8; }
      .chip { fill: #bae6fd; rx: 11; }
      .line { stroke: #7dd3fc; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #475569; stroke-width: 1.5; stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect width="1120" height="620" fill="url(#bg)"/>
  <path d="M 0 92 H 1120 M 0 196 H 1120 M 0 300 H 1120 M 0 404 H 1120 M 0 508 H 1120" stroke="#1f2937" stroke-width="1" opacity="0.45"/>
  <path d="M 140 0 V 620 M 280 0 V 620 M 420 0 V 620 M 560 0 V 620 M 700 0 V 620 M 840 0 V 620 M 980 0 V 620" stroke="#1f2937" stroke-width="1" opacity="0.28"/>

  <text x="560" y="44" text-anchor="middle" class="title">DeepStrike Agent OS</text>
  <text x="560" y="69" text-anchor="middle" class="subtitle">Control flow in a pure Rust kernel. Provider, tools, storage, and network I/O stay in host SDKs.</text>

  <g filter="url(#shadow)">
    <rect x="40" y="110" width="245" height="380" rx="14" fill="url(#host)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="162" y="142" text-anchor="middle" class="section">Host SDKs</text>
    <text x="162" y="163" text-anchor="middle" class="small">Python · Node.js · Rust · WASM</text>

    <rect x="62" y="190" width="201" height="52" class="card"/>
    <text x="82" y="213" class="label">Provider clients</text>
    <text x="82" y="230" class="small">OpenAI, Anthropic, Gemini, Qwen...</text>

    <rect x="62" y="258" width="201" height="56" class="card"/>
    <text x="82" y="281" class="label">ExecutionPlane</text>
    <text x="82" y="298" class="small">Local tools, worktrees, sandboxes</text>

    <rect x="62" y="330" width="201" height="56" class="card"/>
    <text x="82" y="353" class="label">SessionLog / stores</text>
    <text x="82" y="370" class="small">Replay evidence, memory, archives</text>

    <rect x="62" y="402" width="201" height="56" class="card"/>
    <text x="82" y="425" class="label">RuntimeRunner</text>
    <text x="82" y="442" class="small">Streams events and feeds observations</text>
  </g>

  <g>
    <line x1="318" y1="110" x2="318" y2="490" class="dash"/>
    <text x="318" y="102" text-anchor="middle" class="subtitle">Kernel ABI</text>
    <path d="M 286 246 C 312 226, 336 226, 365 246" class="line"/>
    <path d="M 365 354 C 336 374, 312 374, 286 354" class="line"/>
    <rect x="302" y="214" width="86" height="24" rx="12" fill="#1e293b" stroke="#38bdf8"/>
    <text x="345" y="230" text-anchor="middle" class="small">events in</text>
    <rect x="296" y="382" width="98" height="24" rx="12" fill="#1e293b" stroke="#a78bfa"/>
    <text x="345" y="398" text-anchor="middle" class="small">actions out</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="390" y="110" width="690" height="380" rx="14" fill="url(#kernel)" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="735" y="142" text-anchor="middle" class="section">deepstrike-core kernel planes</text>
    <text x="735" y="163" text-anchor="middle" class="small">Serializable state machine · zero provider I/O · one behavior across languages</text>

    <rect x="420" y="193" width="150" height="84" class="card"/>
    <text x="443" y="219" class="label">Syscall gate</text>
    <text x="443" y="238" class="small">Invoke · Spawn</text>
    <text x="443" y="254" class="small">WriteMemory</text>
    <rect x="446" y="261" width="62" height="22" class="chip"/>
    <text x="477" y="276" text-anchor="middle" class="tiny">govern</text>

    <rect x="590" y="193" width="150" height="84" class="card"/>
    <text x="613" y="219" class="label">Scheduler</text>
    <text x="613" y="238" class="small">TCB · process table</text>
    <text x="613" y="254" class="small">budget ledger</text>
    <rect x="620" y="261" width="64" height="22" class="chip"/>
    <text x="652" y="276" text-anchor="middle" class="tiny">budget</text>

    <rect x="760" y="193" width="150" height="84" class="card"/>
    <text x="783" y="219" class="label">Context VM</text>
    <text x="783" y="238" class="small">4-slot render</text>
    <text x="783" y="254" class="small">compression · handles</text>
    <rect x="789" y="261" width="66" height="22" class="chip"/>
    <text x="822" y="276" text-anchor="middle" class="tiny">cache</text>

    <rect x="930" y="193" width="120" height="84" class="card"/>
    <text x="952" y="219" class="label">Signals</text>
    <text x="952" y="238" class="small">interrupts</text>
    <text x="952" y="254" class="small">webhooks · cron</text>

    <rect x="420" y="305" width="150" height="84" class="card"/>
    <text x="443" y="331" class="label">Workflow DAG</text>
    <text x="443" y="350" class="small">Loop · Classify</text>
    <text x="443" y="366" class="small">Tournament · Reduce</text>

    <rect x="590" y="305" width="150" height="84" class="card"/>
    <text x="613" y="331" class="label">Memory plane</text>
    <text x="613" y="350" class="small">validated writes</text>
    <text x="613" y="366" class="small">retrieval closure</text>

    <rect x="760" y="305" width="150" height="84" class="card"/>
    <text x="783" y="331" class="label">Replay state</text>
    <text x="783" y="350" class="small">observations</text>
    <text x="783" y="366" class="small">snapshots · wake</text>

    <rect x="930" y="305" width="120" height="84" class="card"/>
    <text x="952" y="331" class="label">Provider hint</text>
    <text x="952" y="350" class="small">model routing</text>
    <text x="952" y="366" class="small">host resolved</text>

    <path d="M 570 235 H 590 M 740 235 H 760 M 910 235 H 930" stroke="#334155" stroke-width="2"/>
    <path d="M 495 277 V 305 M 665 277 V 305 M 835 277 V 305 M 990 277 V 305" stroke="#334155" stroke-width="2"/>
  </g>

  <g>
    <text x="90" y="535" class="section">Production properties</text>
    <rect x="286" y="515" width="118" height="34" rx="17" fill="#0f172a" stroke="#38bdf8"/>
    <text x="345" y="537" text-anchor="middle" class="small">replayable</text>
    <rect x="424" y="515" width="118" height="34" rx="17" fill="#0f172a" stroke="#38bdf8"/>
    <text x="483" y="537" text-anchor="middle" class="small">governed</text>
    <rect x="562" y="515" width="118" height="34" rx="17" fill="#0f172a" stroke="#38bdf8"/>
    <text x="621" y="537" text-anchor="middle" class="small">resumable</text>
    <rect x="700" y="515" width="142" height="34" rx="17" fill="#0f172a" stroke="#38bdf8"/>
    <text x="771" y="537" text-anchor="middle" class="small">cross-language</text>
    <rect x="862" y="515" width="170" height="34" rx="17" fill="#0f172a" stroke="#38bdf8"/>
    <text x="947" y="537" text-anchor="middle" class="small">host-owned I/O</text>
  </g>
</svg>
