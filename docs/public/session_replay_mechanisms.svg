
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike session replay and recovery</title>
  <desc id="desc">The append-only SessionLog evidence stream records provider, tool, governance, workflow, memory, multimodal, and lifecycle events for audit, provider replay, workflow resume, repair, and OS snapshots.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">SESSION EVIDENCE / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Recovery folds durable observations instead of guessing state.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">APPEND-ONLY LOG · REPLAY · REPAIR · RESUME</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Live evidence stream</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">HOST APPENDS EVENTS AFTER SEMANTIC BOUNDARIES COMMIT</text>

  <g>
    <rect x="48" y="146" width="208" height="116" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="116" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">Run lifecycle</text>
    <text x="66" y="199" class="card-text" text-anchor="start">run_started + attachments</text>
<text x="66" y="217" class="card-text" text-anchor="start">suspended · resumed · terminal</text>

  </g>

  <g>
    <rect x="272" y="146" width="208" height="116" rx="6" class="panel"/>

    <text x="290" y="175" class="card-title" text-anchor="start">Provider</text>
    <text x="290" y="199" class="card-text" text-anchor="start">text · tool calls</text>
<text x="290" y="217" class="card-text" text-anchor="start">protocol-shaped replay envelope</text>

  </g>

  <g>
    <rect x="496" y="146" width="208" height="116" rx="6" class="panel"/>

    <text x="514" y="175" class="card-title" text-anchor="start">Tools &amp; governance</text>
    <text x="514" y="199" class="card-text" text-anchor="start">requested · gated · completed</text>
<text x="514" y="217" class="card-text" text-anchor="start">permission request + resolution</text>

  </g>

  <g>
    <rect x="720" y="146" width="208" height="116" rx="6" class="panel"/>

    <text x="738" y="175" class="card-title" text-anchor="start">Workflow &amp; process</text>
    <text x="738" y="199" class="card-text" text-anchor="start">node output · submissions</text>
<text x="738" y="217" class="card-text" text-anchor="start">agent_process_changed lineage</text>

  </g>

  <g>
    <rect x="944" y="146" width="208" height="116" rx="6" class="panel"/>

    <text x="962" y="175" class="card-title" text-anchor="start">Memory &amp; context</text>
    <text x="962" y="199" class="card-text" text-anchor="start">write · query · recall</text>
<text x="962" y="217" class="card-text" text-anchor="start">compression · renewal · spool</text>

  </g>


  <text x="48" y="310" class="section-title" text-anchor="start">Four consumers of the same evidence</text>
  <text x="1152" y="310" class="section-note" text-anchor="end">ONE LOG · DIFFERENT FOLDS</text>

  <g>
    <rect x="48" y="330" width="258" height="126" rx="6" class="panel"/>

    <text x="66" y="359" class="card-title" text-anchor="start">Audit &amp; primitive view</text>
    <text x="66" y="383" class="card-text" text-anchor="start">Filter by category / kernel primitive</text>
<text x="66" y="401" class="card-text" text-anchor="start">Explain who requested and who executed</text>
<text x="66" y="419" class="card-text" text-anchor="start">No claim of filesystem rollback</text>

  </g>

  <g>
    <rect x="324" y="330" width="258" height="126" rx="6" class="panel"/>

    <text x="342" y="359" class="card-title" text-anchor="start">Provider replay</text>
    <text x="342" y="383" class="card-text" text-anchor="start">ReplayProvider reads envelopes</text>
<text x="342" y="401" class="card-text" text-anchor="start">No live network or model tokens</text>
<text x="342" y="419" class="card-text" text-anchor="start">Validate deterministic host behavior</text>

  </g>

  <g>
    <rect x="600" y="330" width="258" height="126" rx="6" class="panel"/>

    <text x="618" y="359" class="card-title" text-anchor="start">Workflow resume</text>
    <text x="618" y="383" class="card-text" text-anchor="start">Fold completed node outputs</text>
<text x="618" y="401" class="card-text" text-anchor="start">Restore runtime submissions</text>
<text x="618" y="419" class="card-text" text-anchor="start">Schedule remaining frontier</text>

  </g>

  <g>
    <rect x="876" y="330" width="276" height="126" rx="6" class="panel"/>

    <text x="894" y="359" class="card-title" text-anchor="start">OS Snapshot</text>
    <text x="894" y="383" class="card-text" text-anchor="start">Fold processes · budgets · signals</text>
<text x="894" y="401" class="card-text" text-anchor="start">Permissions · paging · memory</text>
<text x="894" y="419" class="card-text" text-anchor="start">Dashboard state, not restore state</text>

  </g>


  <text x="48" y="504" class="section-title" text-anchor="start">Kernel recovery path</text>
  <text x="1152" y="504" class="section-note" text-anchor="end">PORTABLE SNAPSHOT REPLAYS ACCEPTED PUBLIC ABI TRANSACTIONS</text>
    <rect x="48" y="524" width="1104" height="118" rx="7" class="kernel"/>
    <text x="68" y="554" class="label" text-anchor="start">Session / transaction stream</text>
    <path d="M258 551H356" class="flow flow-coral"/>
    <text x="376" y="554" class="label" text-anchor="start">validate + repair</text>
    <path d="M500 551H598" class="flow flow-coral"/>
    <text x="618" y="554" class="label" text-anchor="start">fold public ABI</text>
    <path d="M742 551H840" class="flow flow-coral"/>
    <text x="860" y="554" class="label" text-anchor="start">restore lifecycle / operation / effect ids</text>
    <text x="68" y="602" class="body" text-anchor="start">Malformed events can be sanitized or rejected; bounded snapshot journals fail explicitly instead of emitting partial checkpoints.</text>

  <text x="48" y="686" class="section-title" text-anchor="start">Boundary</text>
  <text x="1152" y="686" class="section-note" text-anchor="end">SESSIONLOG RECOVERS CONTROL STATE · TOOL SIDE EFFECTS STILL REQUIRE IDEMPOTENCY OR COMPENSATION</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
