
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike Context VM</title>
  <desc id="desc">Four-slot context address space, prompt-cache boundaries, pressure accounting, compression, handle paging, and distinct knowledge, skill, and memory lifecycles.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">CONTEXT VM / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Context is partitioned state, not an ever-growing chat log.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">FOUR SLOTS · PRESSURE · COMPACTION · RESIDENCY</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Address space rendered before every provider call</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">STABLE PREFIX ON THE LEFT · TURN-LOCAL STATE ON THE RIGHT</text>

  <g>
    <rect x="48" y="146" width="258" height="126" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="126" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">1 · system_stable</text>
    <text x="66" y="199" class="card-text" text-anchor="start">Identity + immutable directives</text>
<text x="66" y="217" class="card-text" text-anchor="start">Byte-stable prompt-cache target</text>
<text x="66" y="235" class="card-text" text-anchor="start">Changes invalidate the long prefix</text>

  </g>

  <g>
    <rect x="324" y="146" width="258" height="126" rx="6" class="panel"/>

    <text x="342" y="175" class="card-title" text-anchor="start">2 · system_knowledge</text>
    <text x="342" y="199" class="card-text" text-anchor="start">Skill bodies · initialMemory</text>
<text x="342" y="217" class="card-text" text-anchor="start">Host-pinned keyed references</text>
<text x="342" y="235" class="card-text" text-anchor="start">Budgeted + boundary-evicted</text>

  </g>

  <g>
    <rect x="600" y="146" width="258" height="126" rx="6" class="panel"/>

    <text x="618" y="175" class="card-title" text-anchor="start">3 · turns</text>
    <text x="618" y="199" class="card-text" text-anchor="start">Conversation + tool observations</text>
<text x="618" y="217" class="card-text" text-anchor="start">Memory / knowledge retrieval hits</text>
<text x="618" y="235" class="card-text" text-anchor="start">Frozen prefix + growing tail</text>

  </g>

  <g>
    <rect x="876" y="146" width="276" height="126" rx="6" class="panel"/>

    <text x="894" y="175" class="card-title" text-anchor="start">4 · state_turn</text>
    <text x="894" y="199" class="card-text" text-anchor="start">Task state · signals · directives</text>
<text x="894" y="217" class="card-text" text-anchor="start">Recomputed every turn</text>
<text x="894" y="235" class="card-text" text-anchor="start">Never treated as cache-stable</text>

  </g>
    <path d="M48 292H858" class="rule"/>
    <text x="453" y="312" class="micro" text-anchor="middle">PROMPT-CACHE-AWARE STABLE / FROZEN REGION</text>


  <text x="48" y="354" class="section-title" text-anchor="start">Pressure and compaction</text>
  <text x="1152" y="354" class="section-note" text-anchor="end">ρ INCLUDES TEXT, IMAGES, AUDIO, TOOL RESULTS, AND RESERVES</text>

  <g>
    <rect x="48" y="374" width="250" height="108" rx="6" class="panel"/>

    <text x="66" y="403" class="card-title" text-anchor="start">Pressure meter</text>
    <text x="66" y="427" class="card-text" text-anchor="start">TokenEngine estimates all slots</text>
<text x="66" y="445" class="card-text" text-anchor="start">Threshold and hard limit are policy</text>

  </g>
    <path d="M298 428H364" class="flow flow-coral"/>

  <g>
    <rect x="366" y="374" width="300" height="108" rx="6" class="panel"/>
    <rect x="366" y="374" width="5" height="108" rx="2.5" class="accent-fill"/>
    <text x="384" y="403" class="card-title" text-anchor="start">Compression pyramid</text>
    <text x="384" y="427" class="card-text" text-anchor="start">Snip large results → drop old turns</text>
<text x="384" y="445" class="card-text" text-anchor="start">Summarize archive when required</text>

  </g>
    <path d="M666 428H732" class="flow flow-coral"/>

  <g>
    <rect x="734" y="374" width="418" height="108" rx="6" class="panel"/>

    <text x="752" y="403" class="card-title" text-anchor="start">Renewal boundary</text>
    <text x="752" y="427" class="card-text" text-anchor="start">Re-query memory · sweep knowledge · expire leases</text>
<text x="752" y="445" class="card-text" text-anchor="start">Recompute cache generation and frozen prefix</text>

  </g>


  <text x="48" y="532" class="section-title" text-anchor="start">Residency and content lifetimes</text>
  <text x="1152" y="532" class="section-note" text-anchor="end">LARGE VALUES USE HANDLES · DIFFERENT FACTS HAVE DIFFERENT LIFETIMES</text>

  <g>
    <rect x="48" y="552" width="258" height="102" rx="6" class="panel"/>

    <text x="66" y="581" class="card-title" text-anchor="start">Large tool output</text>
    <text x="66" y="605" class="card-text" text-anchor="start">Inline preview + H# descriptor</text>
<text x="66" y="623" class="card-text" text-anchor="start">Payload pages to host spool</text>

  </g>

  <g>
    <rect x="324" y="552" width="258" height="102" rx="6" class="panel"/>

    <text x="342" y="581" class="card-title" text-anchor="start">Skill body</text>
    <text x="342" y="605" class="card-text" text-anchor="start">Key: skill:&lt;name&gt;</text>
<text x="342" y="623" class="card-text" text-anchor="start">Resident until deactivate / lease expiry</text>

  </g>

  <g>
    <rect x="600" y="552" width="258" height="102" rx="6" class="panel"/>

    <text x="618" y="581" class="card-title" text-anchor="start">Retrieval hit</text>
    <text x="618" y="605" class="card-text" text-anchor="start">Ordinary history turn</text>
<text x="618" y="623" class="card-text" text-anchor="start">Decays through compaction</text>

  </g>

  <g>
    <rect x="876" y="552" width="276" height="102" rx="6" class="panel"/>

    <text x="894" y="581" class="card-title" text-anchor="start">Pinned knowledge</text>
    <text x="894" y="605" class="card-text" text-anchor="start">Host-keyed + pinned</text>
<text x="894" y="623" class="card-text" text-anchor="start">Exempt from knowledge-budget eviction</text>

  </g>

  <text x="48" y="694" class="section-title" text-anchor="start">Invariant</text>
  <text x="1152" y="694" class="section-note" text-anchor="end">EACH CONTENT CLASS ENTERS ONE SLOT WITH AN EXPLICIT EVICTION POLICY</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
