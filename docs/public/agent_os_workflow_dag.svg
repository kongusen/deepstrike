<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="tcbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#bd00ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" />
  <rect width="800" height="400" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid lines -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 100 0 L 100 400 M 200 0 L 200 400 M 300 0 L 300 400 M 400 0 L 400 400 M 500 0 L 500 400 M 600 0 L 600 400 M 700 0 L 700 400" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">DYNAMICAL WORKFLOW ORCHESTRATION</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">DAG Scheduling &amp; Task Isolation</text>

  <!-- BUDGET LEDGER BAR -->
  <g transform="translate(240, 75)">
    <rect width="320" height="28" rx="14" fill="#ef4444" opacity="0.1" stroke="#f87171" stroke-width="1" stroke-dasharray="2 2" />
    <text x="160" y="18" text-anchor="middle" fill="#f87171" font-size="10.5" font-weight="bold">BudgetLedger: Track and Deduct Max Token/Node Quota</text>
  </g>

  <!-- ROOT PROCESS / TASK (Left) -->
  <g transform="translate(40, 160)">
    <!-- Glow Effect -->
    <rect x="-2" y="-2" width="154" height="74" rx="10" fill="none" stroke="#bd00ff" stroke-width="3" opacity="0.3" />
    <!-- Main Box -->
    <rect width="150" height="70" rx="8" fill="url(#tcbGrad)" stroke="#bd00ff" stroke-width="1.5" />
    <text x="15" y="25" fill="#ffffff" font-size="13" font-weight="bold">Root TCB</text>
    <text x="15" y="42" fill="#bd00ff" font-size="10" font-weight="bold">Parent Agent Run</text>
    <text x="15" y="55" fill="#94a3b8" font-size="9">Submits Workflow DAG</text>
  </g>

  <!-- SUB-AGENTS / TCB NODES (Middle) -->
  
  <!-- TCB Node 1 -->
  <g transform="translate(320, 120)">
    <rect width="180" height="60" rx="8" fill="url(#tcbGrad)" stroke="#00f0ff" stroke-width="1.2" />
    <rect x="0" y="0" width="180" height="20" rx="8" fill="#00f0ff" opacity="0.1" />
    <text x="10" y="14" fill="#00f0ff" font-size="10.5" font-weight="bold">TCB #1 [Classify Node]</text>
    <text x="10" y="36" fill="#ffffff" font-size="10" font-weight="600">Context Partition A</text>
    <text x="10" y="48" fill="#94a3b8" font-size="8.5">Budget: 5,000 tokens | Isolation: none</text>
  </g>

  <!-- TCB Node 2 -->
  <g transform="translate(320, 200)">
    <rect width="180" height="60" rx="8" fill="url(#tcbGrad)" stroke="#00f0ff" stroke-width="1.2" />
    <rect x="0" y="0" width="180" height="20" rx="8" fill="#00f0ff" opacity="0.1" />
    <text x="10" y="14" fill="#00f0ff" font-size="10.5" font-weight="bold">TCB #2 [Verify Node]</text>
    <text x="10" y="36" fill="#ffffff" font-size="10" font-weight="600">Context Partition B</text>
    <text x="10" y="48" fill="#94a3b8" font-size="8.5">Budget: 8,000 tokens | Isolation: quarantine</text>
    
    <!-- Red Lock / Quarantine Tag -->
    <rect x="125" y="30" width="48" height="13" rx="3" fill="#ef4444" opacity="0.2" />
    <text x="149" y="39" text-anchor="middle" fill="#f87171" font-size="7" font-weight="bold">QUARANTINED</text>
  </g>

  <!-- TCB Node 3 -->
  <g transform="translate(320, 280)">
    <rect width="180" height="60" rx="8" fill="url(#tcbGrad)" stroke="#00f0ff" stroke-width="1.2" />
    <rect x="0" y="0" width="180" height="20" rx="8" fill="#00f0ff" opacity="0.1" />
    <text x="10" y="14" fill="#00f0ff" font-size="10.5" font-weight="bold">TCB #3 [Loop Node]</text>
    <text x="10" y="36" fill="#ffffff" font-size="10" font-weight="600">Context Partition C</text>
    <text x="10" y="48" fill="#94a3b8" font-size="8.5">Budget: 10,000 tokens | Isolation: worktree</text>
  </g>

  <!-- REDUCE NODE (Right) -->
  <g transform="translate(590, 165)">
    <!-- Glow Effect -->
    <rect x="-2" y="-2" width="174" height="64" rx="10" fill="none" stroke="#10b981" stroke-width="3" opacity="0.3" />
    <!-- Main Box -->
    <rect width="170" height="60" rx="8" fill="url(#tcbGrad)" stroke="#10b981" stroke-width="1.5" />
    <text x="15" y="25" fill="#ffffff" font-size="13" font-weight="bold">Reduce Node</text>
    <text x="15" y="42" fill="#10b981" font-size="10" font-weight="bold">Deterministic Synthesis</text>
    <text x="15" y="52" fill="#94a3b8" font-size="8">Zero token cost reduction</text>
  </g>

  <!-- CONNECTORS -->
  <!-- Spawn Syscall paths from Root to TCBs -->
  <path d="M 190,185 C 230,185 230,150 310,150" fill="none" stroke="#bd00ff" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowPurple)" />
  <path d="M 190,195 L 310,230" fill="none" stroke="#bd00ff" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowPurple)" />
  <path d="M 190,205 C 230,205 230,310 310,310" fill="none" stroke="#bd00ff" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowPurple)" />
  
  <text x="240" y="145" text-anchor="middle" fill="#bd00ff" font-size="8.5" font-weight="bold">Syscall::Spawn</text>
  <text x="250" y="275" text-anchor="middle" fill="#bd00ff" font-size="8.5" font-weight="bold">Gated Dispatch</text>

  <!-- Joining paths from TCBs to Reduce Node -->
  <path d="M 500,150 C 540,150 540,185 580,185" fill="none" stroke="#00f0ff" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 500,230 L 580,195" fill="none" stroke="#00f0ff" stroke-width="1.5" marker-end="url(#arrow)" />
  <path d="M 500,310 C 540,310 540,205 580,205" fill="none" stroke="#00f0ff" stroke-width="1.5" marker-end="url(#arrow)" />

  <text x="545" y="140" text-anchor="middle" fill="#00f0ff" font-size="8.5" font-weight="bold">Join Barrier</text>
  <text x="545" y="270" text-anchor="middle" fill="#00f0ff" font-size="8.5" font-weight="bold">Output Sync</text>
</svg>
