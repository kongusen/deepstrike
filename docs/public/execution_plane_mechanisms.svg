
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike ExecutionPlane</title>
  <desc id="desc">Approved tool calls move through host decision hooks into local, worktree, sandbox, or remote execution, with streaming, suspension, result redaction, and large-result spooling.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">EXECUTION PLANE / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">The kernel grants authority; the host performs the effect.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">TOOLS · STREAMING · ISOLATION · SUSPEND · SPOOL</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Approved-call path</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">NO TOOL FUNCTION RUNS INSIDE deepstrike-core</text>

  <g>
    <rect x="48" y="146" width="220" height="112" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="112" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">KernelEffect</text>
    <text x="66" y="199" class="card-text" text-anchor="start">ExecuteTool(calls)</text>
<text x="66" y="217" class="card-text" text-anchor="start">Already passed kernel governance</text>

  </g>
    <path d="M268 202H314" class="flow flow-coral"/>

  <g>
    <rect x="316" y="146" width="220" height="112" rx="6" class="panel"/>

    <text x="334" y="175" class="card-title" text-anchor="start">Host pre-hook</text>
    <text x="334" y="199" class="card-text" text-anchor="start">onToolCall for stateful policy</text>
<text x="334" y="217" class="card-text" text-anchor="start">Throw → fail closed by default</text>

  </g>
    <path d="M536 202H582" class="flow flow-coral"/>

  <g>
    <rect x="584" y="146" width="220" height="112" rx="6" class="panel"/>

    <text x="602" y="175" class="card-title" text-anchor="start">ExecutionPlane</text>
    <text x="602" y="199" class="card-text" text-anchor="start">Lookup schema + implementation</text>
<text x="602" y="217" class="card-text" text-anchor="start">Validate / repair arguments</text>

  </g>
    <path d="M804 202H850" class="flow flow-coral"/>

  <g>
    <rect x="852" y="146" width="300" height="112" rx="6" class="panel"/>

    <text x="870" y="175" class="card-title" text-anchor="start">Host post-hook + observation</text>
    <text x="870" y="199" class="card-text" text-anchor="start">Redact / replace output · inject note</text>
<text x="870" y="217" class="card-text" text-anchor="start">Return ToolResult to kernel + SessionLog</text>

  </g>


  <text x="48" y="306" class="section-title" text-anchor="start">Execution backends</text>
  <text x="1152" y="306" class="section-note" text-anchor="end">THE SAME TOOL CONTRACT CAN RUN IN DIFFERENT TRUST ZONES</text>

  <g>
    <rect x="48" y="326" width="258" height="106" rx="6" class="panel"/>

    <text x="66" y="355" class="card-title" text-anchor="start">Local</text>
    <text x="66" y="379" class="card-text" text-anchor="start">In-process functions</text>
<text x="66" y="397" class="card-text" text-anchor="start">RunContext carries cwd + signal</text>

  </g>

  <g>
    <rect x="324" y="326" width="258" height="106" rx="6" class="panel"/>

    <text x="342" y="355" class="card-title" text-anchor="start">Worktree</text>
    <text x="342" y="379" class="card-text" text-anchor="start">Per-agent git worktree cwd</text>
<text x="342" y="397" class="card-text" text-anchor="start">Lifecycle managed by host</text>

  </g>

  <g>
    <rect x="600" y="326" width="258" height="106" rx="6" class="panel"/>

    <text x="618" y="355" class="card-title" text-anchor="start">Process sandbox</text>
    <text x="618" y="379" class="card-text" text-anchor="start">Subprocess boundary</text>
<text x="618" y="397" class="card-text" text-anchor="start">Timeout · cancellation · limits</text>

  </g>

  <g>
    <rect x="876" y="326" width="276" height="106" rx="6" class="panel"/>

    <text x="894" y="355" class="card-title" text-anchor="start">Remote VPC / MCP proxy</text>
    <text x="894" y="379" class="card-text" text-anchor="start">Customer-network execution</text>
<text x="894" y="397" class="card-text" text-anchor="start">Protocol adapter stays host-side</text>

  </g>


  <text x="48" y="480" class="section-title" text-anchor="start">Long-running and large-result paths</text>
  <text x="1152" y="480" class="section-note" text-anchor="end">STREAM PROGRESS WITHOUT FLOODING CONTEXT</text>

  <g>
    <rect x="48" y="500" width="344" height="116" rx="6" class="panel"/>

    <text x="66" y="529" class="card-title" text-anchor="start">Streaming tool</text>
    <text x="66" y="553" class="card-text" text-anchor="start">Async chunks become progress events</text>
<text x="66" y="571" class="card-text" text-anchor="start">Final chunk closes the tool-call pair</text>

  </g>

  <g>
    <rect x="428" y="500" width="344" height="116" rx="6" class="panel"/>

    <text x="446" y="529" class="card-title" text-anchor="start">Suspend / resume</text>
    <text x="446" y="553" class="card-text" text-anchor="start">Tool yields a suspend token</text>
<text x="446" y="571" class="card-text" text-anchor="start">Host callback resolves external work</text>

  </g>

  <g>
    <rect x="808" y="500" width="344" height="116" rx="6" class="panel"/>

    <text x="826" y="529" class="card-title" text-anchor="start">LargeResultSpool</text>
    <text x="826" y="553" class="card-text" text-anchor="start">Inline preview + content handle</text>
<text x="826" y="571" class="card-text" text-anchor="start">Payload stored on disk / DB and paged</text>

  </g>

  <text x="48" y="666" class="section-title" text-anchor="start">Cancellation boundary</text>
  <text x="1152" y="666" class="section-note" text-anchor="end">USER · DEADLINE · LEASE LOST · HOST SHUTDOWN COMPOSE INTO THE OPERATION SIGNAL</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
