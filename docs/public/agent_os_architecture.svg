
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike Agent OS architecture</title>
  <desc id="desc">Layered system architecture showing application APIs, the host runtime and I/O adapters, the ABI v2 boundary, the pure Rust kernel, and durable evidence stores.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">SYSTEM ARCHITECTURE / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">A narrow kernel boundary keeps authority explicit.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">FIVE LAYERS · ONE EVIDENCE CHAIN</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Application intent</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">WHAT BUILDERS AUTHOR</text>

  <g>
    <rect x="48" y="142" width="258" height="72" rx="6" class="panel"/>

    <text x="66" y="171" class="card-title" text-anchor="start">runAgent / RuntimeRunner</text>
    <text x="66" y="195" class="card-text" text-anchor="start">Goals · tools · attachments · signals</text>

  </g>

  <g>
    <rect x="324" y="142" width="258" height="72" rx="6" class="panel"/>

    <text x="342" y="171" class="card-title" text-anchor="start">WorkflowSpec</text>
    <text x="342" y="195" class="card-text" text-anchor="start">DAG · control nodes · output schemas</text>

  </g>

  <g>
    <rect x="600" y="142" width="258" height="72" rx="6" class="panel"/>

    <text x="618" y="171" class="card-title" text-anchor="start">Policies &amp; profiles</text>
    <text x="618" y="195" class="card-text" text-anchor="start">Governance · quotas · reliability</text>

  </g>

  <g>
    <rect x="876" y="142" width="276" height="72" rx="6" class="panel"/>

    <text x="894" y="171" class="card-title" text-anchor="start">HarnessManifest</text>
    <text x="894" y="195" class="card-text" text-anchor="start">Bounded next-run adaptation</text>

  </g>


  <text x="48" y="254" class="section-title" text-anchor="start">Host user space</text>
  <text x="1152" y="254" class="section-note" text-anchor="end">NODE.JS · PYTHON · RUST · WASM</text>

  <g>
    <rect x="48" y="272" width="210" height="100" rx="6" class="panel"/>
    <rect x="48" y="272" width="5" height="100" rx="2.5" class="accent-fill"/>
    <text x="66" y="301" class="card-title" text-anchor="start">RuntimeRunner</text>
    <text x="66" y="325" class="card-text" text-anchor="start">Drive effects</text>
<text x="66" y="343" class="card-text" text-anchor="start">Append observations</text>

  </g>

  <g>
    <rect x="274" y="272" width="210" height="100" rx="6" class="panel"/>

    <text x="292" y="301" class="card-title" text-anchor="start">Provider adapters</text>
    <text x="292" y="325" class="card-text" text-anchor="start">Vendor wire formats</text>
<text x="292" y="343" class="card-text" text-anchor="start">Streaming + replay</text>

  </g>

  <g>
    <rect x="500" y="272" width="210" height="100" rx="6" class="panel"/>

    <text x="518" y="301" class="card-title" text-anchor="start">ExecutionPlane</text>
    <text x="518" y="325" class="card-text" text-anchor="start">Local · worktree</text>
<text x="518" y="343" class="card-text" text-anchor="start">sandbox · remote</text>

  </g>

  <g>
    <rect x="726" y="272" width="210" height="100" rx="6" class="panel"/>

    <text x="744" y="301" class="card-title" text-anchor="start">Stores</text>
    <text x="744" y="325" class="card-text" text-anchor="start">SessionLog · DreamStore</text>
<text x="744" y="343" class="card-text" text-anchor="start">archive · spool</text>

  </g>

  <g>
    <rect x="952" y="272" width="200" height="100" rx="6" class="panel"/>

    <text x="970" y="301" class="card-title" text-anchor="start">External control</text>
    <text x="970" y="325" class="card-text" text-anchor="start">Approvals · signals</text>
<text x="970" y="343" class="card-text" text-anchor="start">cancel · deadlines</text>

  </g>

    <path d="M600 372V408" class="flow flow-coral"/>
    <text x="618" y="398" class="micro" text-anchor="start">KernelEffect ↓     ↑ KernelObservation</text>
    <rect x="48" y="414" width="1104" height="210" rx="7" class="kernel"/>
    <text x="68" y="444" class="section-title" text-anchor="start">deepstrike-core</text>
    <text x="207" y="444" class="section-note" text-anchor="start">PURE STATE MACHINE · ABI v2 · NO NETWORK / FILESYSTEM / CREDENTIALS</text>

  <rect x="1064" y="428" width="69" height="22" rx="11" class="pill coral"/>
  <text x="1098.5" y="443" class="pill-text" text-anchor="middle">KERNEL</text>

  <g>
    <rect x="68" y="466" width="250" height="130" rx="6" class="panel"/>

    <text x="86" y="495" class="card-title" text-anchor="start">Syscall &amp; governance</text>
    <text x="86" y="519" class="card-text" text-anchor="start">Effects enter one trap</text>
<text x="86" y="537" class="card-text" text-anchor="start">Policy + quota + constraints</text>
    <text x="302" y="494" class="micro" text-anchor="end">P1</text>
  </g>

  <g>
    <rect x="330" y="466" width="250" height="130" rx="6" class="panel"/>

    <text x="348" y="495" class="card-title" text-anchor="start">TCB scheduler &amp; DAG</text>
    <text x="348" y="519" class="card-text" text-anchor="start">Lifecycle · joins · budgets</text>
<text x="348" y="537" class="card-text" text-anchor="start">Loop · classify · tournament</text>
    <text x="564" y="494" class="micro" text-anchor="end">P2</text>
  </g>

  <g>
    <rect x="592" y="466" width="250" height="130" rx="6" class="panel"/>

    <text x="610" y="495" class="card-title" text-anchor="start">Context VM</text>
    <text x="610" y="519" class="card-text" text-anchor="start">Four slots · compression</text>
<text x="610" y="537" class="card-text" text-anchor="start">handles · skills · knowledge</text>
    <text x="826" y="494" class="micro" text-anchor="end">P3</text>
  </g>

  <g>
    <rect x="854" y="466" width="278" height="130" rx="6" class="panel"/>

    <text x="872" y="495" class="card-title" text-anchor="start">Transactions &amp; recovery</text>
    <text x="872" y="519" class="card-text" text-anchor="start">Accepted input journal</text>
<text x="872" y="537" class="card-text" text-anchor="start">snapshots · replay · repair</text>

  </g>


  <text x="48" y="666" class="section-title" text-anchor="start">Durable evidence plane</text>
  <text x="1152" y="666" class="section-note" text-anchor="end">AUDIT · REPLAY · RECOVERY · EVAL</text>
    <text x="48" y="694" class="body" text-anchor="start">SessionLog records host events; KernelSnapshot rebuilds accepted ABI state; OS Snapshot folds observations for dashboards.</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
