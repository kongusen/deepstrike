<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="kernelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="hostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#00a8ff" />
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd00ff" />
      <stop offset="100%" stop-color="#7900ff" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Markers for arrows -->
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#bd00ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" />
  <rect width="800" height="500" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid lines for high tech feel -->
  <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400 M 0 450 L 800 450" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 100 0 L 100 500 M 200 0 L 200 500 M 300 0 L 300 500 M 400 0 L 400 500 M 500 0 L 500 500 M 600 0 L 600 500 M 700 0 L 700 500" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">DEEPSTRIKE ARCHITECTURE</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Kernel / SDK Layering &amp; Boundary</text>

  <!-- HOST SDK (Left Box) -->
  <g transform="translate(30, 80)">
    <!-- Container -->
    <rect width="320" height="380" rx="12" fill="url(#hostGrad)" stroke="#bd00ff" stroke-width="1.5" opacity="0.9" />
    <!-- Header -->
    <rect width="320" height="45" rx="12" fill="#bd00ff" opacity="0.1" />
    <text x="160" y="28" text-anchor="middle" fill="#bd00ff" font-size="15" font-weight="700" letter-spacing="1">HOST SDK (User Space)</text>
    
    <!-- Languages Bar -->
    <g transform="translate(15, 60)">
      <rect width="290" height="35" rx="6" fill="#1e293b" stroke="#334155" />
      <text x="145" y="22" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">RuntimeRunner (Python / JS / WASM)</text>
    </g>

    <!-- Sub modules -->
    <!-- LLM Provider -->
    <g transform="translate(15, 110)">
      <rect width="290" height="50" rx="8" fill="#111827" stroke="#334155" />
      <text x="15" y="22" fill="#ffffff" font-size="12" font-weight="600">LLM Provider Client</text>
      <text x="15" y="38" fill="#94a3b8" font-size="10">Manages stream inputs, API keys &amp; format adaptation</text>
    </g>
    
    <!-- Execution Plane -->
    <g transform="translate(15, 175)">
      <rect width="290" height="55" rx="8" fill="#111827" stroke="#334155" />
      <text x="15" y="20" fill="#ffffff" font-size="12" font-weight="600">ExecutionPlane (Tools I/O)</text>
      <text x="15" y="35" fill="#94a3b8" font-size="10">Runs tools in local workspace, OS filesystem,</text>
      <text x="15" y="47" fill="#94a3b8" font-size="10">or remote sandboxes</text>
    </g>

    <!-- DreamStore -->
    <g transform="translate(15, 245)">
      <rect width="290" height="50" rx="8" fill="#111827" stroke="#334155" />
      <text x="15" y="22" fill="#ffffff" font-size="12" font-weight="600">DreamStore (Semantic Memory)</text>
      <text x="15" y="38" fill="#94a3b8" font-size="10">Local vector index search &amp; memory commits</text>
    </g>

    <!-- Session Log -->
    <g transform="translate(15, 310)">
      <rect width="290" height="55" rx="8" fill="#111827" stroke="#334155" />
      <text x="15" y="20" fill="#ffffff" font-size="12" font-weight="600">SessionLog &amp; Replay</text>
      <text x="15" y="35" fill="#94a3b8" font-size="10">Append-only evidence chain storage</text>
      <text x="15" y="47" fill="#94a3b8" font-size="10">(FileSessionLog, InMemorySessionLog)</text>
    </g>
  </g>

  <!-- KERNEL CORE (Right Box) -->
  <g transform="translate(450, 80)">
    <!-- Container -->
    <rect width="320" height="380" rx="12" fill="url(#kernelGrad)" stroke="#00f0ff" stroke-width="1.5" opacity="0.9" />
    <!-- Header -->
    <rect width="320" height="45" rx="12" fill="#00f0ff" opacity="0.1" />
    <text x="160" y="28" text-anchor="middle" fill="#00f0ff" font-size="15" font-weight="700" letter-spacing="1">DEEPSTRIKE CORE (Kernel)</text>
    
    <!-- Syscall Trap -->
    <g transform="translate(15, 60)">
      <rect width="290" height="65" rx="8" fill="#111827" stroke="#334155" />
      <text x="15" y="20" fill="#ffffff" font-size="12" font-weight="600">Syscall Trap &amp; Governance</text>
      <text x="15" y="36" fill="#94a3b8" font-size="10">Intercepts Invoke, Spawn, WriteMemory</text>
      <text x="15" y="48" fill="#94a3b8" font-size="10">Resolves Dispositions: Allow | Deny | Gate | RateLimit</text>
      <rect x="235" y="8" width="45" height="16" rx="3" fill="#ef4444" opacity="0.2" />
      <text x="257" y="20" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold">Gate</text>
    </g>

    <!-- TCB Scheduler -->
    <g transform="translate(15, 140)">
      <rect width="290" height="65" rx="8" fill="#111827" stroke="#334155" />
      <text x="15" y="20" fill="#ffffff" font-size="12" font-weight="600">TCB &amp; Scheduler</text>
      <text x="15" y="36" fill="#94a3b8" font-size="10">Manages task life cycle state &amp; budget ledger</text>
      <text x="15" y="48" fill="#94a3b8" font-size="10">States: Ready | Running | Blocked | Suspended</text>
      <rect x="235" y="8" width="45" height="16" rx="3" fill="#10b981" opacity="0.2" />
      <text x="257" y="20" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">Budget</text>
    </g>

    <!-- Context VM -->
    <g transform="translate(15, 220)">
      <rect width="290" height="65" rx="8" fill="#111827" stroke="#334155" />
      <text x="15" y="20" fill="#ffffff" font-size="12" font-weight="600">Context VM (Address Space)</text>
      <text x="15" y="36" fill="#94a3b8" font-size="10">Four Slots: Identity | Knowledge | History | State</text>
      <text x="15" y="48" fill="#94a3b8" font-size="10">Runs context compression (Snip/Drop/Summarize)</text>
    </g>

    <!-- Memory Management -->
    <g transform="translate(15, 300)">
      <rect width="290" height="65" rx="8" fill="#111827" stroke="#334155" />
      <text x="15" y="20" fill="#ffffff" font-size="12" font-weight="600">Memory &amp; Handle Table</text>
      <text x="15" y="36" fill="#94a3b8" font-size="10">Abstracts large tool results into descriptors</text>
      <text x="15" y="48" fill="#94a3b8" font-size="10">Performs residency tracking: page-in / page-out</text>
    </g>
  </g>

  <!-- MIDDLE: KERNEL ABI BOUNDARY -->
  <g transform="translate(350, 80)">
    <line x1="20" y1="20" x2="80" y2="20" stroke="#e2e8f0" stroke-dasharray="2 2" opacity="0.5" />
    <text x="50" y="15" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold" letter-spacing="1">ABI</text>
    <line x1="50" y1="30" x2="50" y2="370" stroke="#1e293b" stroke-width="2" stroke-dasharray="4 4" />
    
    <!-- Arrow 1: KernelInput (Events) -->
    <path d="M 5,90 Q 50,110 95,90" fill="none" stroke="#bd00ff" stroke-width="2" marker-end="url(#arrowPurple)" />
    <rect x="25" y="60" width="50" height="15" rx="3" fill="#111827" stroke="#bd00ff" stroke-width="0.5" />
    <text x="50" y="71" text-anchor="middle" fill="#bd00ff" font-size="8" font-weight="bold">Input Event</text>

    <!-- Arrow 2: KernelAction (Actions) -->
    <path d="M 95,200 Q 50,220 5,200" fill="none" stroke="#00f0ff" stroke-width="2" marker-end="url(#arrowCyan)" />
    <rect x="25" y="170" width="50" height="15" rx="3" fill="#111827" stroke="#00f0ff" stroke-width="0.5" />
    <text x="50" y="181" text-anchor="middle" fill="#00f0ff" font-size="8" font-weight="bold">Action</text>

    <!-- Arrow 3: KernelObservation -->
    <path d="M 95,310 Q 50,330 5,310" fill="none" stroke="#00f0ff" stroke-width="2" marker-end="url(#arrowCyan)" />
    <rect x="20" y="280" width="60" height="15" rx="3" fill="#111827" stroke="#00f0ff" stroke-width="0.5" />
    <text x="50" y="291" text-anchor="middle" fill="#00f0ff" font-size="8" font-weight="bold">Observation</text>
  </g>
</svg>
