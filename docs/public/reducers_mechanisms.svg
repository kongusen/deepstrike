
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike structured output and reducers</title>
  <desc id="desc">Schema-carrying workflow nodes are instructed and validated by the host, retried within a bound, then passed to dependents or reduced by deterministic zero-token functions.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">STRUCTURED DATA / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Validated outputs make DAG edges reliable inputs.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">SCHEMA CONTRACT · BOUNDED RETRY · DETERMINISTIC REDUCE</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">LLM node output path</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">KERNEL CARRIES THE CONTRACT · SDK VALIDATES THE VALUE</text>

  <g>
    <rect x="48" y="150" width="208" height="112" rx="6" class="panel"/>
    <rect x="48" y="150" width="5" height="112" rx="2.5" class="accent-fill"/>
    <text x="66" y="179" class="card-title" text-anchor="start">Workflow node</text>
    <text x="66" y="203" class="card-text" text-anchor="start">task + outputSchema</text>
<text x="66" y="221" class="card-text" text-anchor="start">Schema travels with descriptor</text>

  </g>

  <g>
    <rect x="288" y="150" width="208" height="112" rx="6" class="panel"/>

    <text x="306" y="179" class="card-title" text-anchor="start">Provider prompt</text>
    <text x="306" y="203" class="card-text" text-anchor="start">SDK injects format instruction</text>
<text x="306" y="221" class="card-text" text-anchor="start">Model returns text</text>

  </g>

  <g>
    <rect x="528" y="150" width="208" height="112" rx="6" class="panel"/>

    <text x="546" y="179" class="card-title" text-anchor="start">Extract + validate</text>
    <text x="546" y="203" class="card-text" text-anchor="start">Object / array / scalar</text>
<text x="546" y="221" class="card-text" text-anchor="start">required · properties · items · enum</text>

  </g>

  <g>
    <rect x="768" y="150" width="208" height="112" rx="6" class="panel"/>

    <text x="786" y="179" class="card-title" text-anchor="start">Bounded retry</text>
    <text x="786" y="203" class="card-text" text-anchor="start">Validation feedback</text>
<text x="786" y="221" class="card-text" text-anchor="start">1..16 attempts</text>

  </g>

  <g>
    <rect x="1008" y="150" width="144" height="112" rx="6" class="panel"/>

    <text x="1026" y="179" class="card-title" text-anchor="start">Commit</text>
    <text x="1026" y="203" class="card-text" text-anchor="start">Typed output</text>
<text x="1026" y="221" class="card-text" text-anchor="start">unblocks DAG</text>

  </g>
    <path d="M256 206H286" class="flow"/><path d="M496 206H526" class="flow"/><path d="M736 206H766" class="flow"/><path d="M976 206H1006" class="flow flow-coral"/>
    <path d="M872 262V290H632V264" class="flow flow-coral flow-dash"/>
    <text x="750" y="286" class="micro" text-anchor="middle">retry on mismatch</text>


  <text x="48" y="336" class="section-title" text-anchor="start">Reduce node path</text>
  <text x="1152" y="336" class="section-note" text-anchor="end">PURE HOST COMPUTE · NO PROVIDER CALL</text>

  <g>
    <rect x="48" y="356" width="250" height="112" rx="6" class="panel"/>

    <text x="66" y="385" class="card-title" text-anchor="start">Dependency outputs</text>
    <text x="66" y="409" class="card-text" text-anchor="start">Only completed upstream values</text>
<text x="66" y="427" class="card-text" text-anchor="start">Stable ordering from dependsOn</text>

  </g>
    <path d="M298 412H364" class="flow flow-coral"/>

  <g>
    <rect x="366" y="356" width="300" height="112" rx="6" class="panel"/>
    <rect x="366" y="356" width="5" height="112" rx="2.5" class="accent-fill"/>
    <text x="384" y="385" class="card-title" text-anchor="start">Named reducer</text>
    <text x="384" y="409" class="card-text" text-anchor="start">concat · dedupe_lines · count</text>
<text x="384" y="427" class="card-text" text-anchor="start">merge_json_arrays · custom function</text>

  </g>
    <path d="M666 412H732" class="flow flow-coral"/>

  <g>
    <rect x="734" y="356" width="418" height="112" rx="6" class="panel"/>

    <text x="752" y="385" class="card-title" text-anchor="start">Deterministic downstream value</text>
    <text x="752" y="409" class="card-text" text-anchor="start">Recorded as workflow-node output</text>
<text x="752" y="427" class="card-text" text-anchor="start">Can feed writer, verifier, or another reducer</text>

  </g>


  <text x="48" y="516" class="section-title" text-anchor="start">Failure semantics</text>
  <text x="1152" y="516" class="section-note" text-anchor="end">INVALID OUTPUT NEVER SILENTLY BECOMES VALID DATA</text>

  <g>
    <rect x="48" y="536" width="344" height="98" rx="6" class="panel"/>

    <text x="66" y="565" class="card-title" text-anchor="start">Retry succeeds</text>
    <text x="66" y="589" class="card-text" text-anchor="start">Validated value commits</text>
<text x="66" y="607" class="card-text" text-anchor="start">Dependents become ready</text>

  </g>

  <g>
    <rect x="428" y="536" width="344" height="98" rx="6" class="panel"/>

    <text x="446" y="565" class="card-title" text-anchor="start">Attempts exhausted</text>
    <text x="446" y="589" class="card-text" text-anchor="start">Node fails with validation evidence</text>
<text x="446" y="607" class="card-text" text-anchor="start">Dependent nodes remain blocked</text>

  </g>

  <g>
    <rect x="808" y="536" width="344" height="98" rx="6" class="panel"/>

    <text x="826" y="565" class="card-title" text-anchor="start">Reducer missing / throws</text>
    <text x="826" y="589" class="card-text" text-anchor="start">Reduce node fails explicitly</text>
<text x="826" y="607" class="card-text" text-anchor="start">No LLM fallback hides the fault</text>

  </g>

  <text x="48" y="682" class="section-title" text-anchor="start">Ownership boundary</text>
  <text x="1152" y="682" class="section-note" text-anchor="end">SCHEDULING: KERNEL · INSTRUCTION / VALIDATION / REDUCER EXECUTION: HOST SDK</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
