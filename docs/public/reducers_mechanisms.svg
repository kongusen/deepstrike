<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" />
  <rect width="800" height="480" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid lines -->
  <path d="M 0 60 L 800 60 M 0 120 L 800 120 M 0 180 L 800 180 M 0 240 L 800 240 M 0 300 L 800 300 M 0 360 L 800 360 M 0 420 L 800 420" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 100 0 L 100 480 M 200 0 L 200 480 M 300 0 L 300 480 M 400 0 L 400 480 M 500 0 L 500 480 M 600 0 L 600 480 M 700 0 L 700 480" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">STRUCTURED OUTPUT &amp; REDUCERS</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">JSON Schema Output Validation Retries &amp; Zero-Token Deterministic Reductions</text>

  <!-- TOP FLOW: OUTPUT SCHEMA VALIDATION (LLM Node) -->
  <g transform="translate(40, 80)">
    <rect width="720" height="170" rx="8" fill="url(#boxGrad)" stroke="#1e293b" />
    <rect width="720" height="30" rx="8" fill="#00f0ff" opacity="0.05" />
    <text x="15" y="20" fill="#00f0ff" font-size="11.5" font-weight="bold">I. Structured Output Schema Validation (output_schema)</text>

    <!-- Node 1: LLM Generate -->
    <g transform="translate(15, 45)">
      <rect width="140" height="60" rx="4" fill="#111827" stroke="#334155" />
      <text x="10" y="18" fill="#ffffff" font-size="10.5" font-weight="bold">1. LLM Node Gen</text>
      <text x="10" y="32" fill="#94a3b8" font-size="8">Produces text response</text>
      <text x="10" y="44" fill="#94a3b8" font-size="8">containing JSON payload</text>
    </g>

    <!-- Arrow 1 -> 2 -->
    <path d="M 160,75 L 180,75" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" />

    <!-- Step 2: Extract & Validate -->
    <g transform="translate(185, 45)">
      <rect width="180" height="60" rx="4" fill="#111827" stroke="#334155" />
      <text x="10" y="18" fill="#ffffff" font-size="10.5" font-weight="bold">2. Extract &amp; Validate</text>
      <text x="10" y="32" fill="#94a3b8" font-size="8">validate_against_schema()</text>
      <text x="10" y="44" fill="#e2e8f0" font-size="8" font-family="monospace">Checks properties &amp; types</text>
    </g>

    <!-- Arrow 2 -> 3 -->
    <path d="M 370,75 L 390,75" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" />

    <!-- Step 3: Decision Diamond -->
    <g transform="translate(395, 45)">
      <polygon points="50,5 90,30 50,55 10,30" fill="#1e293b" stroke="#00f0ff" stroke-width="1" />
      <text x="50" y="33" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Valid?</text>
    </g>

    <!-- Success path -->
    <path d="M 490,75 L 530,75" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)" />
    <text x="505" y="65" fill="#10b981" font-size="8" font-weight="bold">YES</text>

    <!-- Step 4 Success: Downstream -->
    <g transform="translate(540, 45)">
      <rect width="150" height="60" rx="4" fill="#10b981" opacity="0.1" stroke="#10b981" />
      <text x="10" y="20" fill="#34d399" font-size="10.5" font-weight="bold">3. Normal Flow</text>
      <text x="10" y="34" fill="#ffffff" font-size="8">Passes parsed JSON object</text>
      <text x="10" y="46" fill="#94a3b8" font-size="8">to downstream active nodes</text>
    </g>

    <!-- Fail path: retry loop -->
    <path d="M 445,100 L 445,140 L 85,140 L 85,110" fill="none" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <text x="450" y="120" fill="#ef4444" font-size="8" font-weight="bold">NO (Retry &lt; max)</text>
    <text x="260" y="132" text-anchor="middle" fill="#f87171" font-size="8" font-weight="bold">Injects schema_retry_instruction with validation errors</text>

    <!-- Retries exhausted path -->
    <path d="M 445,100 C 445,130 515,130 515,145" fill="none" stroke="#ef4444" stroke-dasharray="2" stroke-width="1" marker-end="url(#arrowRed)" />
    <text x="495" y="115" fill="#f87171" font-size="7">Retry limit</text>
    
    <g transform="translate(485, 145)">
      <rect width="70" height="18" rx="2.5" fill="#ef4444" opacity="0.15" />
      <text x="35" y="11" text-anchor="middle" fill="#fca5a5" font-size="7" font-weight="bold">Node Aborts</text>
    </g>
  </g>

  <!-- BOTTOM FLOW: DETERMINISTIC REDUCERS (Reduce Node) -->
  <g transform="translate(40, 270)">
    <rect width="720" height="170" rx="8" fill="url(#boxGrad)" stroke="#1e293b" />
    <rect width="720" height="30" rx="8" fill="#bd00ff" opacity="0.05" />
    <text x="15" y="20" fill="#c084fc" font-size="11.5" font-weight="bold">II. Deterministic Reductions (Reduce Node)</text>

    <!-- Upstream Parallel nodes -->
    <g transform="translate(15, 45)">
      <!-- Mini TCB Node A -->
      <rect width="110" height="30" rx="3" fill="#111827" stroke="#334155" />
      <text x="10" y="18" fill="#ffffff" font-size="8.5" font-weight="bold">Worker 1 Output</text>
      
      <!-- Mini TCB Node B -->
      <g transform="translate(0, 36)">
        <rect width="110" height="30" rx="3" fill="#111827" stroke="#334155" />
        <text x="10" y="18" fill="#ffffff" font-size="8.5" font-weight="bold">Worker 2 Output</text>
      </g>
      
      <!-- Mini TCB Node C -->
      <g transform="translate(0, 72)">
        <rect width="110" height="30" rx="3" fill="#111827" stroke="#334155" />
        <text x="10" y="18" fill="#ffffff" font-size="8.5" font-weight="bold">Worker 3 Output</text>
      </g>
    </g>

    <!-- Joining arrows to Reducer -->
    <path d="M 130,60 C 170,60 170,95 210,95" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" />
    <path d="M 130,96 L 210,96" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" />
    <path d="M 130,132 C 170,132 170,97 210,97" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)" />

    <!-- Reducer Node -->
    <g transform="translate(220, 50)">
      <!-- Glow -->
      <rect x="-2" y="-2" width="234" height="94" rx="8" fill="none" stroke="#bd00ff" stroke-width="2" opacity="0.3" />
      
      <rect width="230" height="90" rx="6" fill="#111827" stroke="#bd00ff" stroke-width="1.5" />
      <text x="15" y="22" fill="#c084fc" font-size="12" font-weight="bold">Reduce Node (Deterministic)</text>
      
      <rect x="15" y="32" width="200" height="15" rx="3.5" fill="#ef4444" opacity="0.1" />
      <text x="115" y="42" text-anchor="middle" fill="#f87171" font-size="8" font-weight="bold">Zero Token Cost (No LLM Model Call)</text>
      
      <text x="15" y="65" fill="#94a3b8" font-size="8.5">Runs Python/JS pure reducer functions:</text>
      <text x="15" y="77" fill="#e2e8f0" font-size="8" font-weight="bold" font-family="monospace">dedupe() | merge_json() | concat_text()</text>
    </g>

    <!-- Arrow from Reducer to downstream -->
    <path d="M 460,95 L 485,95" stroke="#bd00ff" stroke-width="2" marker-end="url(#arrowPurple)" />

    <!-- Step 3: Synthesis Output -->
    <g transform="translate(500, 50)">
      <rect width="190" height="90" rx="6" fill="url(#boxGrad)" stroke="#334155" />
      <text x="15" y="24" fill="#ffffff" font-size="12" font-weight="bold">Unified Output</text>
      <text x="15" y="44" fill="#94a3b8" font-size="8.5">Deterministic synthesis payload</text>
      <text x="15" y="56" fill="#94a3b8" font-size="8.5">delivered to downstream queue</text>
      
      <rect x="15" y="70" width="70" height="13" rx="2" fill="#10b981" opacity="0.2" />
      <text x="50" y="79" text-anchor="middle" fill="#34d399" font-size="7.5" font-weight="bold">STABLE INPUT</text>
    </g>
  </g>
</svg>
