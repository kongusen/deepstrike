
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike provider routing</title>
  <desc id="desc">The kernel carries model hints and budgets while the host resolves concrete providers, protocols, endpoints, runtime policy, modality serialization, and replay compatibility.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">PROVIDER ROUTING / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">The kernel requests capability; the host chooses the vendor.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">modelHint · providerFor · PROTOCOL · REPLAY</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Routing decision</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">API KEYS, ENDPOINTS, AND PROVIDER OBJECTS NEVER ENTER THE KERNEL</text>

  <g>
    <rect x="48" y="146" width="250" height="108" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="108" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">Workflow node / run</text>
    <text x="66" y="199" class="card-text" text-anchor="start">role · modelHint · token budget</text>
<text x="66" y="217" class="card-text" text-anchor="start">Kernel carries hint for audit</text>

  </g>
    <path d="M298 200H364" class="flow flow-coral"/>

  <g>
    <rect x="366" y="146" width="300" height="108" rx="6" class="panel"/>

    <text x="384" y="175" class="card-title" text-anchor="start">RuntimeRunner.providerFor</text>
    <text x="384" y="199" class="card-text" text-anchor="start">Resolve hint to provider instance</text>
<text x="384" y="217" class="card-text" text-anchor="start">undefined falls back to default provider</text>

  </g>
    <path d="M666 200H732" class="flow flow-coral"/>

  <g>
    <rect x="734" y="146" width="418" height="108" rx="6" class="panel"/>

    <text x="752" y="175" class="card-title" text-anchor="start">Concrete host configuration</text>
    <text x="752" y="199" class="card-text" text-anchor="start">API key · base URL · region · RuntimePolicy</text>
<text x="752" y="217" class="card-text" text-anchor="start">Retry, timeout, protocol, and operation cancellation</text>

  </g>


  <text x="48" y="302" class="section-title" text-anchor="start">Provider families and wires</text>
  <text x="1152" y="302" class="section-note" text-anchor="end">FACTORIES COLLAPSE VENDOR-SPECIFIC CONFIGURATION</text>

  <g>
    <rect x="48" y="322" width="258" height="108" rx="6" class="panel"/>

    <text x="66" y="351" class="card-title" text-anchor="start">Native base providers</text>
    <text x="66" y="375" class="card-text" text-anchor="start">Anthropic · OpenAI Chat</text>
<text x="66" y="393" class="card-text" text-anchor="start">OpenAI Responses · Gemini</text>

  </g>

  <g>
    <rect x="324" y="322" width="258" height="108" rx="6" class="panel"/>

    <text x="342" y="351" class="card-title" text-anchor="start">Vendor factories</text>
    <text x="342" y="375" class="card-text" text-anchor="start">DeepSeek · Kimi · Qwen</text>
<text x="342" y="393" class="card-text" text-anchor="start">GLM · Minimax · Ollama</text>

  </g>

  <g>
    <rect x="600" y="322" width="258" height="108" rx="6" class="panel"/>

    <text x="618" y="351" class="card-title" text-anchor="start">Protocol selection</text>
    <text x="618" y="375" class="card-text" text-anchor="start">OpenAI-compatible or Anthropic</text>
<text x="618" y="393" class="card-text" text-anchor="start">Provider descriptor records the wire</text>

  </g>

  <g>
    <rect x="876" y="322" width="276" height="108" rx="6" class="panel"/>

    <text x="894" y="351" class="card-title" text-anchor="start">Custom provider</text>
    <text x="894" y="375" class="card-text" text-anchor="start">Implement LLMProvider</text>
<text x="894" y="393" class="card-text" text-anchor="start">Preserve stream + replay contract</text>

  </g>


  <text x="48" y="478" class="section-title" text-anchor="start">Call and replay path</text>
  <text x="1152" y="478" class="section-note" text-anchor="end">PROVIDER OUTPUT IS NORMALIZED BEFORE IT BECOMES KERNEL INPUT</text>
    <rect x="48" y="498" width="1104" height="128" rx="7" class="panel-strong"/>
    <text x="68" y="530" class="label" text-anchor="start">RenderedContext + narrowed tools + typed attachments</text>
    <path d="M362 527H478" class="flow flow-coral"/>
    <text x="498" y="530" class="label" text-anchor="start">vendor-native request / stream</text>
    <path d="M710 527H826" class="flow flow-coral"/>
    <text x="846" y="530" class="label" text-anchor="start">provider_result + replay envelope</text>
    <text x="68" y="568" class="card-title" text-anchor="start">Live</text>
    <text x="122" y="568" class="card-text" text-anchor="start">Network call executes under host retry, timeout, and cancellation policy.</text>
    <text x="68" y="598" class="card-title" text-anchor="start">Replay</text>
    <text x="122" y="598" class="card-text" text-anchor="start">ReplayProvider feeds recorded protocol-shaped results without another network call.</text>

  <text x="48" y="676" class="section-title" text-anchor="start">Typical role routing</text>
  <text x="1152" y="676" class="section-note" text-anchor="end">EXPLORE: THROUGHPUT · IMPLEMENT: TOOL RELIABILITY · VERIFY: REASONING · REDUCE: NO LLM</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
