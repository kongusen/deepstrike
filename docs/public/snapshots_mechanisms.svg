<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#bd00ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" />
  <rect width="800" height="480" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid lines -->
  <path d="M 0 60 L 800 60 M 0 120 L 800 120 M 0 180 L 800 180 M 0 240 L 800 240 M 0 300 L 800 300 M 0 360 L 800 360 M 0 420 L 800 420" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 100 0 L 100 480 M 200 0 L 200 480 M 300 0 L 300 480 M 400 0 L 400 480 M 500 0 L 500 480 M 600 0 L 600 480 M 700 0 L 700 480" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">OS PROFILE &amp;运行时快照</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Declarative Strategy Configs &amp; Folded Observability Snapshots</text>

  <!-- LEFT: OS PROFILE (Start Config) -->
  <g transform="translate(40, 80)">
    <rect width="320" height="370" rx="8" fill="url(#boxGrad)" stroke="#bd00ff" stroke-width="1.5" />
    <rect width="320" height="40" rx="8" fill="#bd00ff" opacity="0.1" />
    <text x="160" y="25" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">OS Profile (Declarative Configuration)</text>
    
    <!-- Profile Items -->
    <g transform="translate(15, 60)">
      <!-- AttentionPolicy -->
      <rect width="290" height="55" rx="4" fill="#111827" stroke="#334155" />
      <text x="12" y="18" fill="#ffffff" font-size="10.5" font-weight="bold">AttentionPolicy</text>
      <text x="12" y="32" fill="#94a3b8" font-size="8.5">▪ max_queue_size = 64</text>
      <text x="12" y="44" fill="#94a3b8" font-size="8.5">▪ Defines queue size for signal gateway limits</text>
    </g>

    <!-- GovernancePolicy -->
    <g transform="translate(15, 125)">
      <rect width="290" height="55" rx="4" fill="#111827" stroke="#334155" />
      <text x="12" y="18" fill="#ffffff" font-size="10.5" font-weight="bold">GovernancePolicy</text>
      <text x="12" y="32" fill="#94a3b8" font-size="8.5">▪ Binds Allow/Deny rule sets</text>
      <text x="12" y="44" fill="#94a3b8" font-size="8.5">▪ Configures RateLimit options &amp; Veto tools</text>
    </g>

    <!-- SchedulerBudget -->
    <g transform="translate(15, 190)">
      <rect width="290" height="55" rx="4" fill="#111827" stroke="#334155" />
      <text x="12" y="18" fill="#ffffff" font-size="10.5" font-weight="bold">SchedulerBudget Config</text>
      <text x="12" y="32" fill="#94a3b8" font-size="8.5">▪ Max runtime seconds constraint</text>
      <text x="12" y="44" fill="#94a3b8" font-size="8.5">▪ Max token budget per task execution</text>
    </g>

    <!-- Profile Validation -->
    <g transform="translate(15, 260)">
      <rect width="290" height="90" rx="4" fill="#111827" stroke="#bd00ff" stroke-width="0.8" />
      <text x="12" y="18" fill="#c084fc" font-size="10" font-weight="bold">validate_declarative_policy() Checks</text>
      <text x="12" y="35" fill="#94a3b8" font-size="8.5">Asserts profile correctness before booting kernel:</text>
      <text x="12" y="50" fill="#34d399" font-size="8.5">✓ rules patterns must compile</text>
      <text x="12" y="62" fill="#34d399" font-size="8.5">✓ default action is valid allow / deny / ask_user</text>
      <text x="12" y="74" fill="#34d399" font-size="8.5">✓ rate limits are positive integers</text>
    </g>
  </g>

  <!-- MIDDLE: ABI TRANSITION -->
  <g transform="translate(370, 230)">
    <path d="M 0,20 Q 30,30 60,20" fill="none" stroke="#bd00ff" stroke-width="2" marker-end="url(#arrowPurple)" />
    <text x="30" y="10" text-anchor="middle" fill="#94a3b8" font-size="9">Boot kernel</text>
  </g>

  <!-- RIGHT: OS SNAPSHOT (Observability &amp; State) -->
  <g transform="translate(440, 80)">
    <rect width="320" height="370" rx="8" fill="url(#boxGrad)" stroke="#00f0ff" stroke-width="1.5" />
    <rect width="320" height="40" rx="8" fill="#00f0ff" opacity="0.1" />
    <text x="160" y="25" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">OS Snapshot (Observability Status)</text>

    <!-- Folded state summary -->
    <g transform="translate(15, 60)">
      <rect width="290" height="95" rx="4" fill="#111827" stroke="#334155" />
      <text x="12" y="18" fill="#ffffff" font-size="10.5" font-weight="bold">Folded state from SessionLog</text>
      <text x="12" y="35" fill="#94a3b8" font-size="8">Constructs status by compiling the log stream:</text>
      
      <!-- Folded tree items -->
      <g transform="translate(15, 45)">
        <text x="0" y="12" fill="#e2e8f0" font-size="9">▪ active_sessions: ["pay-42", "auth-9"]</text>
        <text x="0" y="24" fill="#e2e8f0" font-size="9">▪ running_tcb_count: 3</text>
        <text x="0" y="36" fill="#e2e8f0" font-size="9">▪ current_depth: 2 (concurrent limit 5)</text>
      </g>
    </g>

    <!-- Scheduler Table View -->
    <g transform="translate(15, 165)">
      <rect width="290" height="95" rx="4" fill="#111827" stroke="#334155" />
      <text x="12" y="18" fill="#ffffff" font-size="10.5" font-weight="bold">Scheduler Table View</text>
      
      <!-- Table Rows representation -->
      <g transform="translate(10, 30)">
        <rect width="270" height="18" rx="2" fill="#1e293b" />
        <text x="8" y="12" fill="#38bdf8" font-size="8" font-family="monospace">pay-42   | TCB_01 | Running   | Budget: 4k/10k</text>
        
        <rect x="0" y="22" width="270" height="18" rx="2" fill="#1e293b" />
        <text x="8" y="34" fill="#34d399" font-size="8" font-family="monospace">auth-9   | TCB_02 | Done      | Budget: 5k/5k</text>

        <rect x="0" y="44" width="270" height="18" rx="2" fill="#1e293b" />
        <text x="8" y="56" fill="#f87171" font-size="8" font-family="monospace">audit-1  | TCB_03 | Suspended | Waiting AskUser</text>
      </g>
    </g>

    <!-- Observations Fold loop -->
    <g transform="translate(15, 270)">
      <rect width="290" height="80" rx="4" fill="#111827" stroke="#00f0ff" stroke-width="0.8" />
      <text x="12" y="18" fill="#38bdf8" font-size="10" font-weight="bold">Reconstructs Snapshot</text>
      
      <!-- Log icon to state icon -->
      <text x="12" y="35" fill="#94a3b8" font-size="8.5">Reads SessionLog event stream: parses observations</text>
      <text x="12" y="47" fill="#94a3b8" font-size="8.5">such as tool_invoked, Tcb changes, workflow nodes.</text>
      <text x="12" y="59" fill="#00f0ff" font-size="8.5" font-weight="bold">→ Generates telemetry data for Web Dashboard UI</text>
    </g>
  </g>
</svg>
