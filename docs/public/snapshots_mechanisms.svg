
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike OS profiles and snapshots</title>
  <desc id="desc">OS Profile configures validated runtime policy; OS Snapshot folds observable SessionLog state; KernelSnapshot restores exact accepted ABI state; ContextSnapshot restores context partitions only.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">PROFILES &amp; SNAPSHOTS / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Configuration, observability, and recovery are different artifacts.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">PROFILE ≠ OS SNAPSHOT ≠ KERNEL SNAPSHOT</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Before the run</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">PROFILE SELECTS POLICY · VALIDATION FAILS BEFORE STARTUP</text>

  <g>
    <rect x="48" y="146" width="344" height="112" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="112" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">OS Profile</text>
    <text x="66" y="199" class="card-text" text-anchor="start">SignalPolicy + GovernancePolicy defaults</text>
<text x="66" y="217" class="card-text" text-anchor="start">Host-selectable native or custom profile</text>
<text x="66" y="235" class="card-text" text-anchor="start">Not a complete production safety boundary</text>

  </g>
    <path d="M392 202H456" class="flow flow-coral"/>

  <g>
    <rect x="458" y="146" width="284" height="112" rx="6" class="panel"/>

    <text x="476" y="175" class="card-title" text-anchor="start">Declarative validation</text>
    <text x="476" y="199" class="card-text" text-anchor="start">Actions · patterns · queue bounds · TTL</text>
<text x="476" y="217" class="card-text" text-anchor="start">Invalid policy never reaches the kernel</text>

  </g>
    <path d="M742 202H806" class="flow flow-coral"/>

  <g>
    <rect x="808" y="146" width="344" height="112" rx="6" class="panel"/>

    <text x="826" y="175" class="card-title" text-anchor="start">Runtime configuration</text>
    <text x="826" y="199" class="card-text" text-anchor="start">ConfigureRun + granular updates</text>
<text x="826" y="217" class="card-text" text-anchor="start">Compose profile with ResourceQuota</text>
<text x="826" y="235" class="card-text" text-anchor="start">KernelReliability bounds recovery</text>

  </g>


  <text x="48" y="306" class="section-title" text-anchor="start">After or during the run</text>
  <text x="1152" y="306" class="section-note" text-anchor="end">CHOOSE THE ARTIFACT FOR THE QUESTION YOU ARE ASKING</text>

  <g>
    <rect x="48" y="326" width="344" height="146" rx="6" class="panel"/>
    <rect x="48" y="326" width="5" height="146" rx="2.5" class="accent-fill"/>
    <text x="66" y="355" class="card-title" text-anchor="start">OS Snapshot · observe</text>
    <text x="66" y="379" class="card-text" text-anchor="start">Folded from SessionLog events</text>
<text x="66" y="397" class="card-text" text-anchor="start">Processes · budget · signals · paging</text>
<text x="66" y="415" class="card-text" text-anchor="start">Permissions · spool · memory counters</text>
<text x="66" y="433" class="card-text" text-anchor="start">Cannot restore execution</text>

  </g>

  <g>
    <rect x="428" y="326" width="344" height="146" rx="6" class="panel"/>

    <text x="446" y="355" class="card-title" text-anchor="start">KernelSnapshot · restore</text>
    <text x="446" y="379" class="card-text" text-anchor="start">Accepted ABI transaction journal</text>
<text x="446" y="397" class="card-text" text-anchor="start">Lifecycle + operation + effect identity</text>
<text x="446" y="415" class="card-text" text-anchor="start">Strict single-version ABI v2</text>
<text x="446" y="433" class="card-text" text-anchor="start">Bounded; incompatible fails explicitly</text>

  </g>

  <g>
    <rect x="808" y="326" width="344" height="146" rx="6" class="panel"/>

    <text x="826" y="355" class="card-title" text-anchor="start">ContextSnapshot · context only</text>
    <text x="826" y="379" class="card-text" text-anchor="start">Four context partitions</text>
<text x="826" y="397" class="card-text" text-anchor="start">Token and cache metadata</text>
<text x="826" y="415" class="card-text" text-anchor="start">Partial restore surface</text>
<text x="826" y="433" class="card-text" text-anchor="start">Not process / workflow recovery</text>

  </g>


  <text x="48" y="520" class="section-title" text-anchor="start">Dashboard fold</text>
  <text x="1152" y="520" class="section-note" text-anchor="end">OS SNAPSHOT MAKES KERNEL PRIMITIVES OPERATIONALLY VISIBLE</text>
    <rect x="48" y="540" width="1104" height="104" rx="7" class="panel-strong"/>
    <text x="68" y="570" class="label" text-anchor="start">health</text><text x="178" y="570" class="label" text-anchor="start">queue</text><text x="288" y="570" class="label" text-anchor="start">permissions</text><text x="430" y="570" class="label" text-anchor="start">process tree</text><text x="580" y="570" class="label" text-anchor="start">budget</text><text x="690" y="570" class="label" text-anchor="start">signals</text><text x="800" y="570" class="label" text-anchor="start">paging / spool</text><text x="972" y="570" class="label" text-anchor="start">memory</text>
    <path d="M68 590H1132" class="rule"/>
    <text x="68" y="620" class="body" text-anchor="start">session_log_has_required_categories verifies category and primitive completeness before dashboard ingest.</text>

  <text x="48" y="692" class="section-title" text-anchor="start">Production rule</text>
  <text x="1152" y="692" class="section-note" text-anchor="end">PROFILE SETS BOUNDARIES · QUOTA LIMITS RESOURCES · SNAPSHOT REPORTS OR RESTORES STATE</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
