<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#bd00ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" />
  <rect width="800" height="480" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid lines -->
  <path d="M 0 60 L 800 60 M 0 120 L 800 120 M 0 180 L 800 180 M 0 240 L 800 240 M 0 300 L 800 300 M 0 360 L 800 360 M 0 420 L 800 420" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 100 0 L 100 480 M 200 0 L 200 480 M 300 0 L 300 480 M 400 0 L 400 480 M 500 0 L 500 480 M 600 0 L 600 480 M 700 0 L 700 480" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">SYSCALL GOVERNANCE FUNNEL</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Side-Effect Trap Pipeline &amp; Decision Logic</text>

  <!-- INPUT: SYSCALL (Left) -->
  <g transform="translate(30, 140)">
    <!-- Container -->
    <rect width="160" height="220" rx="8" fill="url(#funnelGrad)" stroke="#1e293b" />
    <rect width="160" height="30" rx="8" fill="#bd00ff" opacity="0.1" />
    <text x="80" y="19" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold">Syscall Trap Input</text>
    
    <!-- Syscall Types -->
    <g transform="translate(10, 45)">
      <rect width="140" height="35" rx="4" fill="#111827" stroke="#334155" />
      <text x="12" y="21" fill="#e2e8f0" font-size="10.5" font-weight="bold">Invoke(tool_call)</text>
      <text x="12" y="29" fill="#94a3b8" font-size="7">Tool execution request</text>
    </g>

    <g transform="translate(10, 95)">
      <rect width="140" height="35" rx="4" fill="#111827" stroke="#334155" />
      <text x="12" y="21" fill="#e2e8f0" font-size="10.5" font-weight="bold">Spawn(manifest)</text>
      <text x="12" y="29" fill="#94a3b8" font-size="7">Sub-agent creation request</text>
    </g>

    <g transform="translate(10, 145)">
      <rect width="140" height="35" rx="4" fill="#111827" stroke="#334155" />
      <text x="12" y="21" fill="#e2e8f0" font-size="10.5" font-weight="bold">WriteMemory(req)</text>
      <text x="12" y="29" fill="#94a3b8" font-size="7">Semantic store insertion</text>
    </g>
  </g>

  <!-- PIPELINE FUNNEL (Center 5 Stages) -->
  <g transform="translate(230, 90)">
    <rect width="340" height="320" rx="8" fill="url(#funnelGrad)" stroke="#1e293b" />
    <text x="170" y="20" text-anchor="middle" fill="#00f0ff" font-size="12" font-weight="bold" letter-spacing="1">Governance Adjudication Funnel</text>

    <!-- Stage 1: Veto List -->
    <g transform="translate(15, 35)">
      <rect width="310" height="40" rx="4" fill="#111827" stroke="#334155" />
      <rect x="5" y="5" width="45" height="30" rx="3" fill="#ef4444" opacity="0.2" />
      <text x="27.5" y="23" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold">VETO</text>
      <text x="60" y="18" fill="#ffffff" font-size="10" font-weight="bold">1. Blacklist Check (Vetoes)</text>
      <text x="60" y="30" fill="#94a3b8" font-size="8.5">Rejects dangerous tools (e.g. rm_rf) immediately</text>
      <!-- Connection out -->
      <path d="M 310,20 L 320,20" stroke="#ef4444" stroke-width="1.5" />
    </g>

    <!-- Stage 2: Rate Limit -->
    <g transform="translate(15, 85)">
      <rect width="310" height="40" rx="4" fill="#111827" stroke="#334155" />
      <rect x="5" y="5" width="45" height="30" rx="3" fill="#3b82f6" opacity="0.2" />
      <text x="27.5" y="23" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">LIMIT</text>
      <text x="60" y="18" fill="#ffffff" font-size="10" font-weight="bold">2. Rate Limiting (Sliding Window)</text>
      <text x="60" y="30" fill="#94a3b8" font-size="8.5">Blocks calls exceeding rate configs (max_calls/window)</text>
    </g>

    <!-- Stage 3: Permission Rules -->
    <g transform="translate(15, 135)">
      <rect width="310" height="47" rx="4" fill="#111827" stroke="#334155" />
      <rect x="5" y="5" width="45" height="37" rx="3" fill="#eab308" opacity="0.2" />
      <text x="27.5" y="22" text-anchor="middle" fill="#fde047" font-size="9" font-weight="bold">RULE</text>
      <text x="27.5" y="32" text-anchor="middle" fill="#fde047" font-size="7">Pattern</text>
      <text x="60" y="18" fill="#ffffff" font-size="10" font-weight="bold">3. Rule Evaluation (Regex Matching)</text>
      <text x="60" y="30" fill="#94a3b8" font-size="8.5">Matches glob/regex patterns (e.g. read_* -> allow)</text>
      <text x="60" y="40" fill="#a78bfa" font-size="8.5">Default action: ask_user / deny</text>
    </g>

    <!-- Stage 4: Constraints -->
    <g transform="translate(15, 192)">
      <rect width="310" height="40" rx="4" fill="#111827" stroke="#334155" />
      <rect x="5" y="5" width="45" height="30" rx="3" fill="#ec4899" opacity="0.2" />
      <text x="27.5" y="23" text-anchor="middle" fill="#f472b6" font-size="9" font-weight="bold">TYPE</text>
      <text x="60" y="18" fill="#ffffff" font-size="10" font-weight="bold">4. Parameter Constraint Check</text>
      <text x="60" y="30" fill="#94a3b8" font-size="8.5">Validates arguments: required check, types, and ranges</text>
    </g>

    <!-- Stage 5: Gate -->
    <g transform="translate(15, 242)">
      <rect width="310" height="47" rx="4" fill="#111827" stroke="#334155" />
      <rect x="5" y="5" width="45" height="37" rx="3" fill="#f97316" opacity="0.2" />
      <text x="27.5" y="22" text-anchor="middle" fill="#fb923c" font-size="9" font-weight="bold">GATE</text>
      <text x="27.5" y="32" text-anchor="middle" fill="#fb923c" font-size="7">AskUser</text>
      <text x="60" y="18" fill="#ffffff" font-size="10" font-weight="bold">5. Gate (Human-In-The-Loop)</text>
      <text x="60" y="30" fill="#94a3b8" font-size="8.5">Suspends task, fires PermissionRequestEvent,</text>
      <text x="60" y="40" fill="#fb923c" font-size="8.5">resumes on user feedback (allow / deny)</text>
    </g>
  </g>

  <!-- OUTPUT: DISPOSITIONS (Right) -->
  
  <!-- ALLOW Path -->
  <g transform="translate(610, 100)">
    <rect width="160" height="80" rx="6" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1.5" />
    <text x="80" y="28" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">ALLOW</text>
    <text x="80" y="48" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Execute in Host SDK</text>
    <text x="80" y="62" text-anchor="middle" fill="#94a3b8" font-size="8.5">ExecutionPlane / Sandbox</text>
  </g>

  <!-- DENY Path + Rollback feedback -->
  <g transform="translate(610, 260)">
    <rect width="160" height="120" rx="6" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1.5" />
    <text x="80" y="28" text-anchor="middle" fill="#f87171" font-size="13" font-weight="bold">DENY</text>
    <text x="80" y="48" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">Abort execution</text>
    
    <!-- Rollback note box -->
    <rect x="15" y="65" width="130" height="42" rx="4" fill="#111827" stroke="#ef4444" stroke-width="0.8" />
    <text x="80" y="80" text-anchor="middle" fill="#fca5a5" font-size="8" font-weight="bold">Create Rollback Note</text>
    <text x="80" y="92" text-anchor="middle" fill="#94a3b8" font-size="7">Feed back into Context VM</text>
    <text x="80" y="100" text-anchor="middle" fill="#94a3b8" font-size="7">so LLM learns and replans</text>
  </g>

  <!-- Connector Paths -->
  <!-- Trap Input -> Funnel -->
  <path d="M 190,250 L 222,250" stroke="#bd00ff" stroke-width="2" marker-end="url(#arrowPurple)" />
  
  <!-- Funnel -> ALLOW -->
  <path d="M 570,140 L 602,140" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)" />
  
  <!-- Funnel -> DENY -->
  <path d="M 570,320 L 602,320" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)" />

  <!-- Rollback Note back to Context VM (feedback loop) -->
  <path d="M 690,380 C 690,440 110,440 110,368" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowRed)" />
  <text x="400" y="432" text-anchor="middle" fill="#f87171" font-size="9" font-weight="bold">Feedback loop: Rollback injected as Observation to Next Turn</text>
</svg>
