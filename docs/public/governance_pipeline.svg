
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike syscall governance funnel</title>
  <desc id="desc">All effect requests cross pre-exposure filtering, veto, rate, permission, parameter constraints, resource quota, and optional host hooks before execution; denials return visible results without rollback.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">GOVERNANCE FUNNEL / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Authority is enforced below the model.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">SCHEMA FILTER → SYSCALL TRAP → DISPOSITION → HOST EXECUTION</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Before the provider call</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">STATIC DENIALS CAN DISAPPEAR FROM THE TOOL SCHEMA</text>

  <g>
    <rect x="48" y="144" width="334" height="92" rx="6" class="panel"/>

    <text x="66" y="173" class="card-title" text-anchor="start">Registered capabilities</text>
    <text x="66" y="197" class="card-text" text-anchor="start">ExecutionPlane tools · meta-tools</text>
<text x="66" y="215" class="card-text" text-anchor="start">Skill / manifest capability ceiling</text>

  </g>
    <path d="M382 190H430" class="flow flow-coral"/>

  <g>
    <rect x="432" y="144" width="334" height="92" rx="6" class="panel"/>
    <rect x="432" y="144" width="5" height="92" rx="2.5" class="accent-fill"/>
    <text x="450" y="173" class="card-title" text-anchor="start">Schema pre-filter</text>
    <text x="450" y="197" class="card-text" text-anchor="start">Known-denied tools never reach the model</text>
<text x="450" y="215" class="card-text" text-anchor="start">Visible set = intersection of all gates</text>

  </g>
    <path d="M766 190H814" class="flow flow-coral"/>

  <g>
    <rect x="816" y="144" width="336" height="92" rx="6" class="panel"/>

    <text x="834" y="173" class="card-title" text-anchor="start">Provider sees narrowed tools</text>
    <text x="834" y="197" class="card-text" text-anchor="start">No prompt can call a schema-hidden tool</text>
<text x="834" y="215" class="card-text" text-anchor="start">Dynamic checks still run at call time</text>

  </g>


  <text x="48" y="282" class="section-title" text-anchor="start">At the syscall trap</text>
  <text x="1152" y="282" class="section-note" text-anchor="end">INVOKE · SPAWN · WRITE MEMORY · SUBMIT NODES · LOAD WORKFLOW</text>

  <g>
    <rect x="48" y="302" width="188" height="108" rx="6" class="panel"/>

    <text x="66" y="331" class="card-title" text-anchor="start">1 · Veto</text>
    <text x="66" y="355" class="card-text" text-anchor="start">Hard block list</text>
<text x="66" y="373" class="card-text" text-anchor="start">Immediate deny</text>

  </g>

  <g>
    <rect x="250" y="302" width="188" height="108" rx="6" class="panel"/>

    <text x="268" y="331" class="card-title" text-anchor="start">2 · Rate</text>
    <text x="268" y="355" class="card-text" text-anchor="start">Sliding window</text>
<text x="268" y="373" class="card-text" text-anchor="start">Retry-after result</text>

  </g>

  <g>
    <rect x="452" y="302" width="188" height="108" rx="6" class="panel"/>

    <text x="470" y="331" class="card-title" text-anchor="start">3 · Permission</text>
    <text x="470" y="355" class="card-text" text-anchor="start">Allow · deny</text>
<text x="470" y="373" class="card-text" text-anchor="start">ask_user</text>

  </g>

  <g>
    <rect x="654" y="302" width="188" height="108" rx="6" class="panel"/>

    <text x="672" y="331" class="card-title" text-anchor="start">4 · Constraint</text>
    <text x="672" y="355" class="card-text" text-anchor="start">Required · enum</text>
<text x="672" y="373" class="card-text" text-anchor="start">numeric range</text>

  </g>

  <g>
    <rect x="856" y="302" width="296" height="108" rx="6" class="panel"/>

    <text x="874" y="331" class="card-title" text-anchor="start">5 · Resource quota + host hook</text>
    <text x="874" y="355" class="card-text" text-anchor="start">Spawn depth / count · memory rate</text>
<text x="874" y="373" class="card-text" text-anchor="start">Stateful onToolCall fails closed</text>

  </g>
    <path d="M236 356H248" class="flow"/><path d="M438 356H450" class="flow"/><path d="M640 356H652" class="flow"/><path d="M842 356H854" class="flow"/>


  <text x="48" y="458" class="section-title" text-anchor="start">Disposition</text>
  <text x="1152" y="458" class="section-note" text-anchor="end">THE MODEL NEVER EXECUTES AN EFFECT DIRECTLY</text>

  <g>
    <rect x="48" y="478" width="250" height="116" rx="6" class="panel"/>

    <text x="66" y="507" class="card-title" text-anchor="start">Allow</text>
    <text x="66" y="531" class="card-text" text-anchor="start">Host ExecutionPlane may run</text>
<text x="66" y="549" class="card-text" text-anchor="start">Result returns as observation</text>

  </g>

  <g>
    <rect x="314" y="478" width="250" height="116" rx="6" class="panel"/>
    <rect x="314" y="478" width="5" height="116" rx="2.5" class="accent-fill"/>
    <text x="332" y="507" class="card-title" text-anchor="start">Deny / RateLimited</text>
    <text x="332" y="531" class="card-text" text-anchor="start">Effect does not run</text>
<text x="332" y="549" class="card-text" text-anchor="start">Error ToolResult stays visible</text>

  </g>

  <g>
    <rect x="580" y="478" width="250" height="116" rx="6" class="panel"/>

    <text x="598" y="507" class="card-title" text-anchor="start">Gate</text>
    <text x="598" y="531" class="card-text" text-anchor="start">Task suspends for approval</text>
<text x="598" y="549" class="card-text" text-anchor="start">Correlated resolution resumes</text>

  </g>

  <g>
    <rect x="846" y="478" width="306" height="116" rx="6" class="panel"/>

    <text x="864" y="507" class="card-title" text-anchor="start">Defer / control rejection</text>
    <text x="864" y="531" class="card-text" text-anchor="start">Backpressure or typed rejection</text>
<text x="864" y="549" class="card-text" text-anchor="start">Decision is appended durably</text>

  </g>

  <text x="48" y="642" class="section-title" text-anchor="start">Current denial contract</text>
  <text x="1152" y="642" class="section-note" text-anchor="end">SINCE v0.2.42: NO ROLLBACK · ALLOWED SIBLINGS STILL EXECUTE</text>
    <text x="48" y="674" class="body" text-anchor="start">A dynamic denial closes the tool-call pair with a visible error result, so the next turn can replan from evidence instead of replaying the failed turn.</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
