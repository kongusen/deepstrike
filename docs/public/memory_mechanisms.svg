
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike memory lifecycle</title>
  <desc id="desc">Working, session, and durable memory paths, including kernel-validated writes and queries, prefetch and renewal recall, recall journaling, retention, promotion suggestions, and host-authoritative DreamStore state.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">MEMORY LIFECYCLE / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Durable memory is a governed host device, not hidden context.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">QUERY · VALIDATE · COMMIT · RECALL · RETAIN · PROMOTE</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Three memory layers</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">THEIR OWNERSHIP AND LIFETIMES ARE DIFFERENT</text>

  <g>
    <rect x="48" y="146" width="344" height="104" rx="6" class="panel"/>

    <text x="66" y="175" class="card-title" text-anchor="start">Working</text>
    <text x="66" y="199" class="card-text" text-anchor="start">Scratch state for the current run</text>
<text x="66" y="217" class="card-text" text-anchor="start">No cross-session durability guarantee</text>

  </g>

  <g>
    <rect x="428" y="146" width="344" height="104" rx="6" class="panel"/>

    <text x="446" y="175" class="card-title" text-anchor="start">Session</text>
    <text x="446" y="199" class="card-text" text-anchor="start">Evidence events in SessionLog</text>
<text x="446" y="217" class="card-text" text-anchor="start">Auditable and recoverable</text>

  </g>

  <g>
    <rect x="808" y="146" width="344" height="104" rx="6" class="panel"/>
    <rect x="808" y="146" width="5" height="104" rx="2.5" class="accent-fill"/>
    <text x="826" y="175" class="card-title" text-anchor="start">Durable</text>
    <text x="826" y="199" class="card-text" text-anchor="start">DreamStore owns full record set</text>
<text x="826" y="217" class="card-text" text-anchor="start">Host decides retention, pinning, eviction</text>

  </g>


  <text x="48" y="298" class="section-title" text-anchor="start">Recall path</text>
  <text x="1152" y="298" class="section-note" text-anchor="end">PREFETCH AND IN-RUN QUERY SHARE ONE JOURNALED ROUTE</text>

  <g>
    <rect x="48" y="318" width="210" height="112" rx="6" class="panel"/>

    <text x="66" y="347" class="card-title" text-anchor="start">Run start / renewal</text>
    <text x="66" y="371" class="card-text" text-anchor="start">preQueryMemory(goal)</text>
<text x="66" y="389" class="card-text" text-anchor="start">Re-fires after context renewal</text>

  </g>

  <g>
    <rect x="274" y="318" width="210" height="112" rx="6" class="panel"/>

    <text x="292" y="347" class="card-title" text-anchor="start">Scoped query</text>
    <text x="292" y="371" class="card-text" text-anchor="start">Kernel validates memory scope</text>
<text x="292" y="389" class="card-text" text-anchor="start">DreamStore.search(topK)</text>

  </g>

  <g>
    <rect x="500" y="318" width="210" height="112" rx="6" class="panel"/>

    <text x="518" y="347" class="card-title" text-anchor="start">Rank + recall</text>
    <text x="518" y="371" class="card-text" text-anchor="start">Host ranks records</text>
<text x="518" y="389" class="card-text" text-anchor="start">memory_recalled increments count</text>

  </g>

  <g>
    <rect x="726" y="318" width="210" height="112" rx="6" class="panel"/>

    <text x="744" y="347" class="card-title" text-anchor="start">Context placement</text>
    <text x="744" y="371" class="card-text" text-anchor="start">Hits enter turns history</text>
<text x="744" y="389" class="card-text" text-anchor="start">Single-use and compressible</text>

  </g>

  <g>
    <rect x="952" y="318" width="200" height="112" rx="6" class="panel"/>

    <text x="970" y="347" class="card-title" text-anchor="start">Promotion signal</text>
    <text x="970" y="371" class="card-text" text-anchor="start">Threshold crossed</text>
<text x="970" y="389" class="card-text" text-anchor="start">Host decides whether to pin</text>

  </g>
    <path d="M258 374H272" class="flow"/><path d="M484 374H498" class="flow"/><path d="M710 374H724" class="flow"/><path d="M936 374H950" class="flow flow-coral"/>


  <text x="48" y="478" class="section-title" text-anchor="start">Write and retention path</text>
  <text x="1152" y="478" class="section-note" text-anchor="end">EVERY WRITE PASSES VALIDATION AND RESOURCE QUOTA</text>

  <g>
    <rect x="48" y="498" width="258" height="112" rx="6" class="panel"/>
    <rect x="48" y="498" width="5" height="112" rx="2.5" class="accent-fill"/>
    <text x="66" y="527" class="card-title" text-anchor="start">write_memory</text>
    <text x="66" y="551" class="card-text" text-anchor="start">Content + metadata + scope</text>
<text x="66" y="569" class="card-text" text-anchor="start">Kernel validation + write-rate quota</text>

  </g>
    <path d="M306 554H372" class="flow flow-coral"/>

  <g>
    <rect x="374" y="498" width="258" height="112" rx="6" class="panel"/>

    <text x="392" y="527" class="card-title" text-anchor="start">Host commit</text>
    <text x="392" y="551" class="card-text" text-anchor="start">Dedup + durable DreamStore write</text>
<text x="392" y="569" class="card-text" text-anchor="start">memory_written evidence</text>

  </g>
    <path d="M632 554H698" class="flow flow-coral"/>

  <g>
    <rect x="700" y="498" width="208" height="112" rx="6" class="panel"/>

    <text x="718" y="527" class="card-title" text-anchor="start">Idle pipeline</text>
    <text x="718" y="551" class="card-text" text-anchor="start">Extract + consolidate</text>
<text x="718" y="569" class="card-text" text-anchor="start">Dream after session boundary</text>

  </g>
    <path d="M908 554H974" class="flow flow-coral"/>

  <g>
    <rect x="976" y="498" width="176" height="112" rx="6" class="panel"/>

    <text x="994" y="527" class="card-title" text-anchor="start">Retention</text>
    <text x="994" y="551" class="card-text" text-anchor="start">Recall-aware score</text>
<text x="994" y="569" class="card-text" text-anchor="start">Host evicts / pins</text>

  </g>

  <text x="48" y="660" class="section-title" text-anchor="start">Invariant</text>
  <text x="1152" y="660" class="section-note" text-anchor="end">DREAMSTORE IS AUTHORITATIVE · RETRIEVAL HITS DECAY · PROMOTION IS ADVISORY</text>
    <text x="48" y="690" class="body" text-anchor="start">A recalled fact becomes durable knowledge only when the host explicitly promotes or pins it; the kernel never silently upgrades authority.</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
