
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike sub-agent collaboration and isolation</title>
  <desc id="desc">Parent-child TCB lineage, role and context inheritance, capability subsets, shared, read-only, worktree, and remote isolation, contracts, handoff artifacts, and RunGroup settlement.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">SUB-AGENTS / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Delegation creates a child process with less or equal authority.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">IDENTITY · CONTEXT · CAPABILITY · ISOLATION · HANDOFF</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Spawn contract</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">THE CHILD BECOMES A TCB IN THE SAME TASKTABLE</text>

  <g>
    <rect x="48" y="146" width="258" height="120" rx="6" class="panel"/>
    <rect x="48" y="146" width="5" height="120" rx="2.5" class="accent-fill"/>
    <text x="66" y="175" class="card-title" text-anchor="start">Parent RuntimeRunner</text>
    <text x="66" y="199" class="card-text" text-anchor="start">AgentRunSpec or workflow node</text>
<text x="66" y="217" class="card-text" text-anchor="start">Parent session + RunGroup identity</text>

  </g>
    <path d="M306 206H372" class="flow flow-coral"/>

  <g>
    <rect x="374" y="146" width="258" height="120" rx="6" class="panel"/>

    <text x="392" y="175" class="card-title" text-anchor="start">Syscall::Spawn</text>
    <text x="392" y="199" class="card-text" text-anchor="start">Governance + ResourceQuota</text>
<text x="392" y="217" class="card-text" text-anchor="start">Depth · concurrency · total count</text>

  </g>
    <path d="M632 206H698" class="flow flow-coral"/>

  <g>
    <rect x="700" y="146" width="208" height="120" rx="6" class="panel"/>

    <text x="718" y="175" class="card-title" text-anchor="start">Child TCB</text>
    <text x="718" y="199" class="card-text" text-anchor="start">Role · lifecycle · budget</text>
<text x="718" y="217" class="card-text" text-anchor="start">Parent waits on join</text>

  </g>
    <path d="M908 206H974" class="flow flow-coral"/>

  <g>
    <rect x="976" y="146" width="176" height="120" rx="6" class="panel"/>

    <text x="994" y="175" class="card-title" text-anchor="start">Result</text>
    <text x="994" y="199" class="card-text" text-anchor="start">Termination</text>
<text x="994" y="217" class="card-text" text-anchor="start">output + artifact</text>
<text x="994" y="235" class="card-text" text-anchor="start">durable lineage</text>

  </g>


  <text x="48" y="314" class="section-title" text-anchor="start">Authority and context inheritance</text>
  <text x="1152" y="314" class="section-note" text-anchor="end">CAPABILITIES ARE SUBSETS · QUARANTINE CANNOT ESCALATE</text>

  <g>
    <rect x="48" y="334" width="258" height="112" rx="6" class="panel"/>

    <text x="66" y="363" class="card-title" text-anchor="start">Context: none</text>
    <text x="66" y="387" class="card-text" text-anchor="start">Fresh system / task context</text>
<text x="66" y="405" class="card-text" text-anchor="start">Best for independent verifier</text>

  </g>

  <g>
    <rect x="324" y="334" width="258" height="112" rx="6" class="panel"/>

    <text x="342" y="363" class="card-title" text-anchor="start">Context: system_only</text>
    <text x="342" y="387" class="card-text" text-anchor="start">Identity and stable directives</text>
<text x="342" y="405" class="card-text" text-anchor="start">No parent conversation history</text>

  </g>

  <g>
    <rect x="600" y="334" width="258" height="112" rx="6" class="panel"/>

    <text x="618" y="363" class="card-title" text-anchor="start">Context: full</text>
    <text x="618" y="387" class="card-text" text-anchor="start">Explicit parent context inheritance</text>
<text x="618" y="405" class="card-text" text-anchor="start">Still bounded by child policy</text>

  </g>

  <g>
    <rect x="876" y="334" width="276" height="112" rx="6" class="panel"/>
    <rect x="876" y="334" width="5" height="112" rx="2.5" class="accent-fill"/>
    <text x="894" y="363" class="card-title" text-anchor="start">Capability filter</text>
    <text x="894" y="387" class="card-text" text-anchor="start">inherit or filtered tool access</text>
<text x="894" y="405" class="card-text" text-anchor="start">effective child set ⊆ parent set</text>

  </g>


  <text x="48" y="494" class="section-title" text-anchor="start">Execution isolation modes</text>
  <text x="1152" y="494" class="section-note" text-anchor="end">HOST MAPS THE MANIFEST TO A CONCRETE EXECUTION PLANE</text>

  <g>
    <rect x="48" y="514" width="210" height="108" rx="6" class="panel"/>

    <text x="66" y="543" class="card-title" text-anchor="start">shared</text>
    <text x="66" y="567" class="card-text" text-anchor="start">Parent plane / cwd</text>
<text x="66" y="585" class="card-text" text-anchor="start">Fastest · least isolation</text>

  </g>

  <g>
    <rect x="274" y="514" width="210" height="108" rx="6" class="panel"/>

    <text x="292" y="543" class="card-title" text-anchor="start">read_only</text>
    <text x="292" y="567" class="card-text" text-anchor="start">Explore without writes</text>
<text x="292" y="585" class="card-text" text-anchor="start">Filtered capability surface</text>

  </g>

  <g>
    <rect x="500" y="514" width="210" height="108" rx="6" class="panel"/>

    <text x="518" y="543" class="card-title" text-anchor="start">worktree</text>
    <text x="518" y="567" class="card-text" text-anchor="start">Dedicated git worktree cwd</text>
<text x="518" y="585" class="card-text" text-anchor="start">Host creates and removes</text>

  </g>

  <g>
    <rect x="726" y="514" width="210" height="108" rx="6" class="panel"/>

    <text x="744" y="543" class="card-title" text-anchor="start">remote</text>
    <text x="744" y="567" class="card-text" text-anchor="start">VPC or sandbox plane</text>
<text x="744" y="585" class="card-text" text-anchor="start">Credentials stay remote / host</text>

  </g>

  <g>
    <rect x="952" y="514" width="200" height="108" rx="6" class="panel"/>

    <text x="970" y="543" class="card-title" text-anchor="start">quarantined</text>
    <text x="970" y="567" class="card-text" text-anchor="start">Deny-all tools</text>
<text x="970" y="585" class="card-text" text-anchor="start">Taint propagates to children</text>

  </g>

  <text x="48" y="670" class="section-title" text-anchor="start">Join boundary</text>
  <text x="1152" y="670" class="section-note" text-anchor="end">CONTRACT + HANDOFF ARTIFACT TURN CHILD OUTPUT INTO PARENT-CONSUMABLE EVIDENCE</text>
    <text x="48" y="700" class="body" text-anchor="start">Nested children join RunGroup lineage and settle actual usage, while local kernel budgets and ResourceQuota remain the child safety boundary.</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
