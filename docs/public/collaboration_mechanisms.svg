<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#bd00ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" />
  <rect width="800" height="480" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid lines -->
  <path d="M 0 60 L 800 60 M 0 120 L 800 120 M 0 180 L 800 180 M 0 240 L 800 240 M 0 300 L 800 300 M 0 360 L 800 360 M 0 420 L 800 420" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 100 0 L 100 480 M 200 0 L 200 480 M 300 0 L 300 480 M 400 0 L 400 480 M 500 0 L 500 480 M 600 0 L 600 480 M 700 0 L 700 480" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">PROCESS ISOLATION &amp; SUB-AGENTS</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Parent-Child TCB Lineage, Context Inheritance &amp; Workspace Isolation Modes</text>

  <!-- TOP: PARENT PROCESS (Root TCB) -->
  <g transform="translate(290, 80)">
    <rect width="220" height="70" rx="8" fill="url(#boxGrad)" stroke="#bd00ff" stroke-width="1.5" />
    <text x="15" y="24" fill="#ffffff" font-size="12" font-weight="bold">Parent Process (Root TCB)</text>
    <text x="15" y="42" fill="#bd00ff" font-size="9.5" font-weight="bold">Role: coordinator | context_inheritance: full</text>
    <text x="15" y="54" fill="#94a3b8" font-size="8">Workspace: host main directory CWD</text>
  </g>

  <!-- SPAWN BOUNDARY (Syscall::Spawn) -->
  <g transform="translate(400, 160)">
    <path d="M 0,0 L 0,20" stroke="#bd00ff" stroke-width="1.5" />
    <path d="M 0,20 L -250,55 M 0,20 L -80,55 M 0,20 L 80,55 M 0,20 L 250,55" fill="none" stroke="#bd00ff" stroke-dasharray="3" stroke-width="1" />
    
    <!-- Arrows at endpoints -->
    <path d="M -250,55 L -250,60" stroke="#bd00ff" stroke-width="1" marker-end="url(#arrowPurple)" />
    <path d="M -80,55 L -80,60" stroke="#bd00ff" stroke-width="1" marker-end="url(#arrowPurple)" />
    <path d="M 80,55 L 80,60" stroke="#bd00ff" stroke-width="1" marker-end="url(#arrowPurple)" />
    <path d="M 250,55 L 250,60" stroke="#bd00ff" stroke-width="1" marker-end="url(#arrowPurple)" />
    
    <rect x="-65" y="-5" width="130" height="18" rx="9" fill="#bd00ff" />
    <text x="0" y="7" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="bold">Syscall::Spawn(manifest)</text>
  </g>

  <!-- BOTTOM: FOUR ISOLATION SUB-AGENTS -->

  <!-- 1. shared isolation -->
  <g transform="translate(30, 230)">
    <rect width="165" height="180" rx="6" fill="url(#boxGrad)" stroke="#1e293b" />
    <rect width="165" height="30" rx="6" fill="#3b82f6" opacity="0.1" />
    <text x="82.5" y="19" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">1. isolation: shared</text>
    
    <g transform="translate(10, 40)">
      <text x="0" y="15" fill="#e2e8f0" font-size="9" font-weight="bold">Workspace:</text>
      <text x="5" y="27" fill="#94a3b8" font-size="8">Shared with parent CWD</text>

      <text x="0" y="47" fill="#e2e8f0" font-size="9" font-weight="bold">Context Inheritance:</text>
      <text x="5" y="59" fill="#10b981" font-size="8" font-weight="bold">full (Default)</text>
      <text x="5" y="69" fill="#94a3b8" font-size="8">Inherits complete history</text>

      <text x="0" y="89" fill="#e2e8f0" font-size="9" font-weight="bold">Capability filter:</text>
      <text x="5" y="101" fill="#94a3b8" font-size="8">Unfiltered (Parent tools)</text>
    </g>
  </g>

  <!-- 2. read_only isolation -->
  <g transform="translate(215, 230)">
    <rect width="165" height="180" rx="6" fill="url(#boxGrad)" stroke="#1e293b" />
    <rect width="165" height="30" rx="6" fill="#eab308" opacity="0.1" />
    <text x="82.5" y="19" text-anchor="middle" fill="#fde047" font-size="11" font-weight="bold">2. isolation: read_only</text>

    <g transform="translate(10, 40)">
      <text x="0" y="15" fill="#e2e8f0" font-size="9" font-weight="bold">Workspace:</text>
      <text x="5" y="27" fill="#f87171" font-size="8" font-weight="bold">Read-Only directory</text>

      <text x="0" y="47" fill="#e2e8f0" font-size="9" font-weight="bold">Context Inheritance:</text>
      <text x="5" y="59" fill="#fb923c" font-size="8" font-weight="bold">system_only</text>
      <text x="5" y="69" fill="#94a3b8" font-size="8">Prunes history dialogs</text>

      <text x="0" y="89" fill="#e2e8f0" font-size="9" font-weight="bold">Capability filter:</text>
      <text x="5" y="101" fill="#94a3b8" font-size="8">Only explore / read tools</text>
    </g>
  </g>

  <!-- 3. worktree isolation -->
  <g transform="translate(400, 230)">
    <rect width="165" height="180" rx="6" fill="url(#boxGrad)" stroke="#1e293b" />
    <rect width="165" height="30" rx="6" fill="#10b981" opacity="0.1" />
    <text x="82.5" y="19" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">3. isolation: worktree</text>

    <g transform="translate(10, 40)">
      <text x="0" y="15" fill="#e2e8f0" font-size="9" font-weight="bold">Workspace:</text>
      <text x="5" y="27" fill="#34d399" font-size="8" font-weight="bold">Cloned git worktree CWD</text>
      <text x="5" y="37" fill="#94a3b8" font-size="8">Isolated branch folder</text>

      <text x="0" y="57" fill="#e2e8f0" font-size="9" font-weight="bold">Context Inheritance:</text>
      <text x="5" y="69" fill="#10b981" font-size="8" font-weight="bold">full / system_only</text>

      <text x="0" y="89" fill="#e2e8f0" font-size="9" font-weight="bold">Capability filter:</text>
      <text x="5" y="101" fill="#94a3b8" font-size="8">Binds code-writing tools</text>
    </g>
  </g>

  <!-- 4. remote isolation -->
  <g transform="translate(585, 230)">
    <rect width="165" height="180" rx="6" fill="url(#boxGrad)" stroke="#ef4444" stroke-width="1" />
    <rect width="165" height="30" rx="6" fill="#ef4444" opacity="0.1" />
    <text x="82.5" y="19" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">4. isolation: remote</text>

    <g transform="translate(10, 40)">
      <text x="0" y="15" fill="#e2e8f0" font-size="9" font-weight="bold">Workspace:</text>
      <text x="5" y="27" fill="#fca5a5" font-size="8" font-weight="bold">Isolated Sandbox VPC</text>
      <text x="5" y="37" fill="#94a3b8" font-size="8">No host access</text>

      <text x="0" y="57" fill="#e2e8f0" font-size="9" font-weight="bold">Context Inheritance:</text>
      <text x="5" y="69" fill="#ef4444" font-size="8" font-weight="bold">none</text>
      <text x="5" y="79" fill="#94a3b8" font-size="8">Zero context carried</text>

      <text x="0" y="99" fill="#e2e8f0" font-size="9" font-weight="bold">Capability filter:</text>
      <text x="5" y="111" fill="#94a3b8" font-size="8">Restricted remote tools only</text>
    </g>
  </g>

  <!-- RESOURCE TRACKING LEDGER (Bottom) -->
  <g transform="translate(30, 430)">
    <rect width="720" height="28" rx="4" fill="#111827" stroke="#334155" />
    <text x="15" y="18" fill="#94a3b8" font-size="9.5" font-weight="bold">Process Table (TaskTable):</text>
    <text x="145" y="18" fill="#ffffff" font-size="9.5">Roots parent-child process relationship lineage: explorer node is child of planner process tree.</text>
  </g>
</svg>
