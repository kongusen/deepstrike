
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike dynamic workflow mechanisms</title>
  <desc id="desc">The workflow vocabulary: static and runtime DAG growth, control-flow nodes, deterministic reducers, scheduler barriers, isolation, quotas, and recovery.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">DYNAMIC WORKFLOWS / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Orchestration is durable data the kernel can govern.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">DAG GROWTH · CONTROL FLOW · SCHEDULING · RECOVERY</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">1 · Author and grow</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">WORKFLOWS CAN START IN THE HOST OR BE AUTHORED BY THE AGENT</text>

  <g>
    <rect x="48" y="144" width="258" height="102" rx="6" class="panel"/>
    <rect x="48" y="144" width="5" height="102" rx="2.5" class="accent-fill"/>
    <text x="66" y="173" class="card-title" text-anchor="start">WorkflowSpec</text>
    <text x="66" y="197" class="card-text" text-anchor="start">Static nodes + dependsOn edges</text>
<text x="66" y="215" class="card-text" text-anchor="start">Standalone or inside an active run</text>

  </g>

  <g>
    <rect x="324" y="144" width="258" height="102" rx="6" class="panel"/>

    <text x="342" y="173" class="card-title" text-anchor="start">submit_workflow_nodes</text>
    <text x="342" y="197" class="card-text" text-anchor="start">Append to active DAG</text>
<text x="342" y="215" class="card-text" text-anchor="start">Syscall::SubmitNodes</text>

  </g>

  <g>
    <rect x="600" y="144" width="258" height="102" rx="6" class="panel"/>

    <text x="618" y="173" class="card-title" text-anchor="start">start_workflow</text>
    <text x="618" y="197" class="card-text" text-anchor="start">Bootstrap or flatten into parent</text>
<text x="618" y="215" class="card-text" text-anchor="start">Syscall::LoadWorkflow</text>

  </g>

  <g>
    <rect x="876" y="144" width="276" height="102" rx="6" class="panel"/>

    <text x="894" y="173" class="card-title" text-anchor="start">Growth ceiling</text>
    <text x="894" y="197" class="card-text" text-anchor="start">maxWorkflowNodes + quota</text>
<text x="894" y="215" class="card-text" text-anchor="start">Rejected control request is durable</text>

  </g>
    <path d="M306 195H322" class="flow"/><path d="M582 195H598" class="flow"/><path d="M858 195H874" class="flow flow-coral"/>


  <text x="48" y="292" class="section-title" text-anchor="start">2 · First-class node vocabulary</text>
  <text x="1152" y="292" class="section-note" text-anchor="end">PROMPT CONVENTIONS BECOME SCHEDULABLE OBJECTS</text>

  <g>
    <rect x="48" y="312" width="202" height="108" rx="6" class="panel"/>

    <text x="66" y="341" class="card-title" text-anchor="start">Spawn</text>
    <text x="66" y="365" class="card-text" text-anchor="start">One isolated child TCB</text>
<text x="66" y="383" class="card-text" text-anchor="start">Role · tools · modelHint</text>

  </g>

  <g>
    <rect x="266" y="312" width="202" height="108" rx="6" class="panel"/>

    <text x="284" y="341" class="card-title" text-anchor="start">Loop</text>
    <text x="284" y="365" class="card-text" text-anchor="start">loopContinue + maxIters</text>
<text x="284" y="383" class="card-text" text-anchor="start">May append downstream work</text>

  </g>

  <g>
    <rect x="484" y="312" width="202" height="108" rx="6" class="panel"/>

    <text x="502" y="341" class="card-title" text-anchor="start">Classify</text>
    <text x="502" y="365" class="card-text" text-anchor="start">Select one branch</text>
<text x="502" y="383" class="card-text" text-anchor="start">Prune inactive subgraphs</text>

  </g>

  <g>
    <rect x="702" y="312" width="202" height="108" rx="6" class="panel"/>

    <text x="720" y="341" class="card-title" text-anchor="start">Tournament</text>
    <text x="720" y="365" class="card-text" text-anchor="start">Parallel entrants</text>
<text x="720" y="383" class="card-text" text-anchor="start">Pairwise judge bracket</text>

  </g>

  <g>
    <rect x="920" y="312" width="232" height="108" rx="6" class="panel"/>

    <text x="938" y="341" class="card-title" text-anchor="start">Reduce</text>
    <text x="938" y="365" class="card-text" text-anchor="start">Named pure function</text>
<text x="938" y="383" class="card-text" text-anchor="start">Deterministic · zero LLM tokens</text>

  </g>


  <text x="48" y="468" class="section-title" text-anchor="start">3 · Schedule and recover</text>
  <text x="1152" y="468" class="section-note" text-anchor="end">DEPENDENCIES CARRY DATA · BLOCKED NODES DO NOT BURN TOKENS</text>
    <rect x="48" y="488" width="1104" height="146" rx="7" class="kernel"/>

  <g>
    <rect x="68" y="510" width="250" height="98" rx="6" class="panel"/>

    <text x="86" y="539" class="card-title" text-anchor="start">Ready frontier</text>
    <text x="86" y="563" class="card-text" text-anchor="start">TaskGraph computes runnable nodes</text>
<text x="86" y="581" class="card-text" text-anchor="start">Scheduler policy chooses order</text>

  </g>

  <g>
    <rect x="330" y="510" width="250" height="98" rx="6" class="panel"/>

    <text x="348" y="539" class="card-title" text-anchor="start">Spawn gate</text>
    <text x="348" y="563" class="card-text" text-anchor="start">Depth · concurrency · total count</text>
<text x="348" y="581" class="card-text" text-anchor="start">Trust + capability subset</text>

  </g>

  <g>
    <rect x="592" y="510" width="250" height="98" rx="6" class="panel"/>

    <text x="610" y="539" class="card-title" text-anchor="start">Output boundary</text>
    <text x="610" y="563" class="card-text" text-anchor="start">Schema validation + retry</text>
<text x="610" y="581" class="card-text" text-anchor="start">Dependents receive durable output</text>

  </g>

  <g>
    <rect x="854" y="510" width="278" height="98" rx="6" class="panel"/>

    <text x="872" y="539" class="card-title" text-anchor="start">Session recovery</text>
    <text x="872" y="563" class="card-text" text-anchor="start">Fold completions + submissions</text>
<text x="872" y="581" class="card-text" text-anchor="start">Resume remaining frontier only</text>

  </g>

  <text x="48" y="680" class="section-title" text-anchor="start">Templates</text>
  <text x="1152" y="680" class="section-note" text-anchor="end">FAN-OUT / SYNTHESIZE · VERIFY RULES · GENERATE / FILTER · TOURNAMENT</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
