<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%" style="background-color: #0b0f19; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#00f0ff" />
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" />
  <rect width="800" height="480" fill="none" stroke="#1e293b" stroke-width="2" />

  <!-- Grid lines -->
  <path d="M 0 60 L 800 60 M 0 120 L 800 120 M 0 180 L 800 180 M 0 240 L 800 240 M 0 300 L 800 300 M 0 360 L 800 360 M 0 420 L 800 420" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />
  <path d="M 100 0 L 100 480 M 200 0 L 200 480 M 300 0 L 300 480 M 400 0 L 400 480 M 500 0 L 500 480 M 600 0 L 600 480 M 700 0 L 700 480" stroke="#1e293b" stroke-width="0.5" opacity="0.3" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="2">SKILL REGISTER &amp; CAPABILITY GATING</text>
  <text x="400" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">On-Demand Capability Loading, Context VM Partitioning &amp; Tool Filtering</text>

  <!-- LEFT: SKILL REGISTRY &amp; SCANNING -->
  <g transform="translate(30, 80)">
    <rect width="210" height="370" rx="8" fill="url(#boxGrad)" stroke="#1e293b" />
    <rect width="210" height="35" rx="8" fill="#00f0ff" opacity="0.08" />
    <text x="105" y="22" text-anchor="middle" fill="#00f0ff" font-size="12" font-weight="bold">1. Skill Registry Scan</text>

    <text x="15" y="55" fill="#94a3b8" font-size="9">Scans markdown catalog folder:</text>

    <!-- Scan box -->
    <g transform="translate(15, 70)">
      <rect width="180" height="155" rx="4" fill="#111827" stroke="#334155" />
      <text x="10" y="16" fill="#fb923c" font-size="9" font-family="monospace">code-review.md</text>
      
      <!-- YAML Metadata -->
      <rect x="10" y="25" width="160" height="60" rx="3.5" fill="#1e293b" stroke="#334155" />
      <text x="15" y="38" fill="#e2e8f0" font-size="8" font-family="monospace">name: code-review</text>
      <text x="15" y="48" fill="#e2e8f0" font-size="8" font-family="monospace">allowed_tools: [read_file]</text>
      <text x="15" y="58" fill="#e2e8f0" font-size="8" font-family="monospace">description: Review logic...</text>
      <text x="15" y="68" fill="#e2e8f0" font-size="8" font-family="monospace">when_to_use: Review PRs</text>

      <text x="10" y="105" fill="#94a3b8" font-size="8">Skill registry compiles scans,</text>
      <text x="10" y="117" fill="#94a3b8" font-size="8">sends Metadata list to kernel.</text>
      <text x="10" y="129" fill="#10b981" font-size="8" font-weight="bold">✓ XML List: &lt;available_skills&gt;</text>
    </g>

    <!-- Available skills XML box -->
    <g transform="translate(15, 240)">
      <rect width="180" height="110" rx="4" fill="#111827" stroke="#334155" />
      <text x="10" y="18" fill="#ffffff" font-size="10.5" font-weight="bold">XML System Prompt</text>
      <text x="10" y="32" fill="#94a3b8" font-size="8">Injected to System Stable slot:</text>
      <rect x="10" y="42" width="160" height="55" rx="3" fill="#1e293b" stroke="#334155" />
      <text x="16" y="56" fill="#fde047" font-size="7.5" font-family="monospace">&lt;available_skills&gt;</text>
      <text x="16" y="68" fill="#e2e8f0" font-size="7.5" font-family="monospace">  * code-review: Review bugs</text>
      <text x="16" y="80" fill="#fde047" font-size="7.5" font-family="monospace">&lt;/available_skills&gt;</text>
    </g>
  </g>

  <!-- MIDDLE: METATOOL INVOCATION -->
  <g transform="translate(265, 80)">
    <rect width="260" height="370" rx="8" fill="url(#boxGrad)" stroke="#1e293b" />
    <rect width="260" height="35" rx="8" fill="#bd00ff" opacity="0.08" />
    <text x="130" y="22" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="bold">2. On-Demand Loading</text>

    <!-- Meta-tool invocation -->
    <g transform="translate(15, 55)">
      <rect width="230" height="80" rx="6" fill="#111827" stroke="#bd00ff" stroke-width="1.2" />
      <text x="12" y="20" fill="#ffffff" font-size="11" font-weight="bold">Agent Meta-Tool Call</text>
      <text x="12" y="34" fill="#94a3b8" font-size="8.5">Agent reads XML, decides to load skill:</text>
      <rect x="12" y="44" width="206" height="24" rx="3" fill="#1e293b" stroke="#334155" />
      <text x="18" y="58" fill="#c084fc" font-size="8.5" font-family="monospace">skill(name="code-review")</text>
    </g>

    <!-- Active skills state -->
    <g transform="translate(15, 150)">
      <rect width="230" height="90" rx="6" fill="#111827" stroke="#334155" />
      <text x="12" y="20" fill="#ffffff" font-size="11" font-weight="bold">Active Skills Registration</text>
      <text x="12" y="35" fill="#94a3b8" font-size="8.5">Loaded skill metadata registers in TCB:</text>
      
      <rect x="12" y="47" width="206" height="32" rx="3" fill="#1e293b" />
      <text x="18" y="60" fill="#e2e8f0" font-size="8" font-family="monospace">tcb.active_skills: ["code-review"]</text>
      <text x="18" y="70" fill="#10b981" font-size="8" font-weight="bold">✓ Enables tool filtering narrow down</text>
    </g>

    <!-- SDK returns markdown content to Knowledge slot -->
    <g transform="translate(15, 255)">
      <rect width="230" height="95" rx="6" fill="#111827" stroke="#10b981" stroke-width="1" />
      <text x="12" y="20" fill="#34d399" font-size="11" font-weight="bold">Knowledge Injection</text>
      <text x="12" y="35" fill="#94a3b8" font-size="8.5">SDK reads code-review.md markdown body,</text>
      <text x="12" y="47" fill="#94a3b8" font-size="8.5">injects it directly as observation stream</text>
      <text x="12" y="59" fill="#10b981" font-size="8.5" font-weight="bold">→ Appends to system_knowledge slot</text>
      <text x="12" y="71" fill="#94a3b8" font-size="8">Updates LLM context with detail guidelines.</text>
    </g>
  </g>

  <!-- RIGHT: TOOL SCHEMA FILTERING (Gating) -->
  <g transform="translate(550, 80)">
    <rect width="220" height="370" rx="8" fill="url(#boxGrad)" stroke="#1e293b" />
    <rect width="220" height="35" rx="8" fill="#00f0ff" opacity="0.08" />
    <text x="110" y="22" text-anchor="middle" fill="#00f0ff" font-size="12" font-weight="bold">3. Tool Schema Filtering</text>

    <text x="15" y="55" fill="#94a3b8" font-size="9">Allowed tools list in code-review metadata</text>
    <text x="15" y="67" fill="#94a3b8" font-size="9">narrow down the global tool schemas:</text>

    <!-- Filter action -->
    <g transform="translate(15, 85)">
      <rect width="190" height="260" rx="6" fill="#111827" stroke="#334155" />
      <text x="10" y="20" fill="#ffffff" font-size="10.5" font-weight="bold">Registry Schema Filter</text>

      <!-- Allowed -->
      <g transform="translate(10, 35)">
        <rect width="170" height="35" rx="3.5" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="0.8" />
        <text x="8" y="16" fill="#34d399" font-size="9" font-weight="bold">read_file</text>
        <text x="8" y="26" fill="#ffffff" font-size="7.5">Allowed in code-review.md</text>
        <rect x="135" y="4" width="30" height="12" rx="2" fill="#10b981" opacity="0.2" />
        <text x="150" y="13" text-anchor="middle" fill="#34d399" font-size="6.5" font-weight="bold">PASS</text>
      </g>

      <!-- Denied -->
      <g transform="translate(10, 80)">
        <rect width="170" height="35" rx="3.5" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.8" />
        <text x="8" y="16" fill="#f87171" font-size="9" font-weight="bold">write_file</text>
        <text x="8" y="26" fill="#94a3b8" font-size="7.5">Excluded from allowed list</text>
        <rect x="135" y="4" width="30" height="12" rx="2" fill="#ef4444" opacity="0.2" />
        <text x="150" y="13" text-anchor="middle" fill="#f87171" font-size="6.5" font-weight="bold">FILTER</text>
      </g>

      <!-- Denied 2 -->
      <g transform="translate(10, 125)">
        <rect width="170" height="35" rx="3.5" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="0.8" />
        <text x="8" y="16" fill="#f87171" font-size="9" font-weight="bold">dangerous_tool</text>
        <text x="8" y="26" fill="#94a3b8" font-size="7.5">Excluded from allowed list</text>
        <rect x="135" y="4" width="30" height="12" rx="2" fill="#ef4444" opacity="0.2" />
        <text x="150" y="13" text-anchor="middle" fill="#f87171" font-size="6.5" font-weight="bold">FILTER</text>
      </g>

      <text x="10" y="185" fill="#94a3b8" font-size="8.5">Narrows exposed schema list</text>
      <text x="10" y="197" fill="#94a3b8" font-size="8.5">during next CallLLM render,</text>
      <text x="10" y="209" fill="#94a3b8" font-size="8.5">improving agent focus and</text>
      <text x="10" y="221" fill="#94a3b8" font-size="8.5">reducing hallucinated tool calls.</text>
    </g>
  </g>

  <!-- Connectors -->
  <!-- Meta-tool invocation triggers SDK loading -->
  <path d="M 400,135 Q 400,10 135,10 C 135,10 135,30 135,50" fill="none" stroke="#bd00ff" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow)" />
  <!-- Active skills triggers filtering -->
  <path d="M 480,195 L 542,195" stroke="#00f0ff" stroke-width="2" marker-end="url(#arrow)" />
</svg>
