
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike skills, knowledge, and capability gating</title>
  <desc id="desc">Skill metadata enters the stable catalog, bodies load on demand into keyed knowledge, activation narrows tools by intersection, leases expire at boundaries, and manifests can only narrow the host baseline.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">SKILLS &amp; CAPABILITIES / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">Load expertise on demand and narrow authority with it.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">CATALOG · ACTIVATE · KNOWLEDGE · INTERSECTION · LEASE</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">Catalog and activation</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">ONLY METADATA IS RESIDENT BEFORE THE MODEL CHOOSES A SKILL</text>

  <g>
    <rect x="48" y="146" width="258" height="112" rx="6" class="panel"/>

    <text x="66" y="175" class="card-title" text-anchor="start">skillDir scan</text>
    <text x="66" y="199" class="card-text" text-anchor="start">Frontmatter: name · description</text>
<text x="66" y="217" class="card-text" text-anchor="start">allowedTools · effort · token estimate</text>

  </g>
    <path d="M306 202H372" class="flow flow-coral"/>

  <g>
    <rect x="374" y="146" width="258" height="112" rx="6" class="panel"/>
    <rect x="374" y="146" width="5" height="112" rx="2.5" class="accent-fill"/>
    <text x="392" y="175" class="card-title" text-anchor="start">Stable catalog</text>
    <text x="392" y="199" class="card-text" text-anchor="start">Metadata only in context</text>
<text x="392" y="217" class="card-text" text-anchor="start">skill meta-tool selects by name</text>

  </g>
    <path d="M632 202H698" class="flow flow-coral"/>

  <g>
    <rect x="700" y="146" width="208" height="112" rx="6" class="panel"/>

    <text x="718" y="175" class="card-title" text-anchor="start">Activation</text>
    <text x="718" y="199" class="card-text" text-anchor="start">Body returned once</text>
<text x="718" y="217" class="card-text" text-anchor="start">Kernel records active skill</text>

  </g>
    <path d="M908 202H974" class="flow flow-coral"/>

  <g>
    <rect x="976" y="146" width="176" height="112" rx="6" class="panel"/>

    <text x="994" y="175" class="card-title" text-anchor="start">Knowledge pin</text>
    <text x="994" y="199" class="card-text" text-anchor="start">key: skill:&lt;name&gt;</text>
<text x="994" y="217" class="card-text" text-anchor="start">lease tracked</text>

  </g>


  <text x="48" y="306" class="section-title" text-anchor="start">Capability intersection</text>
  <text x="1152" y="306" class="section-note" text-anchor="end">EVERY LAYER CAN NARROW · NO LAYER CAN WIDEN ITS BASELINE</text>
    <rect x="48" y="326" width="1104" height="130" rx="7" class="kernel"/>
    <text x="68" y="357" class="label" text-anchor="start">Registered tools</text>
    <text x="200" y="357" class="label" text-anchor="start">∩ host allowedToolIds</text>
    <text x="382" y="357" class="label" text-anchor="start">∩ HarnessManifest ids</text>
    <text x="570" y="357" class="label" text-anchor="start">∩ skillFilter / allowedTools</text>
    <text x="786" y="357" class="label" text-anchor="start">∪ stableCore + meta-tools</text>
    <path d="M68 382H1080" class="flow flow-coral"/>
    <text x="68" y="420" class="card-title" text-anchor="start">Effective tool schema</text>
    <text x="218" y="420" class="card-text" text-anchor="start">is the safe subset exposed on the next provider call; an empty tool intersection throws instead of widening.</text>


  <text x="48" y="504" class="section-title" text-anchor="start">Lease and boundary lifecycle</text>
  <text x="1152" y="504" class="section-note" text-anchor="end">ACTIVATION IS AN EPOCH EVENT BECAUSE IT CHANGES THE PROMPT CACHE</text>

  <g>
    <rect x="48" y="524" width="258" height="106" rx="6" class="panel"/>

    <text x="66" y="553" class="card-title" text-anchor="start">Active</text>
    <text x="66" y="577" class="card-text" text-anchor="start">Tool surface narrowed</text>
<text x="66" y="595" class="card-text" text-anchor="start">Body resident in knowledge</text>

  </g>

  <g>
    <rect x="324" y="524" width="258" height="106" rx="6" class="panel"/>

    <text x="342" y="553" class="card-title" text-anchor="start">Refresh</text>
    <text x="342" y="577" class="card-text" text-anchor="start">Repeat skill(name)</text>
<text x="342" y="595" class="card-text" text-anchor="start">resets lease turn count</text>

  </g>

  <g>
    <rect x="600" y="524" width="258" height="106" rx="6" class="panel"/>

    <text x="618" y="553" class="card-title" text-anchor="start">Deactivate / expire</text>
    <text x="618" y="577" class="card-text" text-anchor="start">Host command or lease end</text>
<text x="618" y="595" class="card-text" text-anchor="start">Tool surface re-widens to baseline</text>

  </g>

  <g>
    <rect x="876" y="524" width="276" height="106" rx="6" class="panel"/>

    <text x="894" y="553" class="card-title" text-anchor="start">Boundary sweep</text>
    <text x="894" y="577" class="card-text" text-anchor="start">Drop skill knowledge pin</text>
<text x="894" y="595" class="card-text" text-anchor="start">Advance cache generation</text>

  </g>
    <path d="M306 577H322" class="flow"/><path d="M582 577H598" class="flow"/><path d="M858 577H874" class="flow flow-coral"/>

  <text x="48" y="678" class="section-title" text-anchor="start">Separation</text>
  <text x="1152" y="678" class="section-note" text-anchor="end">SKILL = METHOD · KNOWLEDGE = PINNED REFERENCE · MEMORY HIT = DECAYING FACT</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
