
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DeepStrike L-star loop and syscall trap</title>
  <desc id="desc">One turn through Reason, Act, Adjudicate, Execute, Observe, and Delta, including visible denial results and suspension for approval.</desc>
  <defs>
    <marker id="arrow-ivory" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#F7F3EA"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 1 10 5 0 9Z" fill="#FF6B4A"/>
    </marker>
    <style>
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans CJK SC", sans-serif; }
      .eyebrow { fill:#FF6B4A; font-size:11px; font-weight:700; letter-spacing:2px; }
      .title { fill:#F7F3EA; font-size:29px; font-weight:700; letter-spacing:-.45px; }
      .subtitle { fill:#A8A49C; font-size:13px; font-weight:450; }
      .section-title { fill:#F7F3EA; font-size:15px; font-weight:700; }
      .section-note { fill:#8F8C86; font-size:10px; font-weight:600; letter-spacing:.65px; }
      .card-title { fill:#F7F3EA; font-size:13px; font-weight:650; }
      .card-text { fill:#A8A49C; font-size:10.5px; font-weight:450; }
      .body { fill:#A8A49C; font-size:11px; font-weight:450; }
      .label { fill:#F7F3EA; font-size:11px; font-weight:650; }
      .micro { fill:#8F8C86; font-size:9.5px; font-weight:650; letter-spacing:.55px; }
      .pill-text { fill:#111318; font-size:9px; font-weight:750; letter-spacing:.5px; }
      .footer { fill:#77746F; font-size:9px; font-weight:600; letter-spacing:.8px; }
      .panel { fill:#15171A; stroke:#303236; stroke-width:1; }
      .panel-strong { fill:#191A1D; stroke:#F7F3EA; stroke-width:1.15; }
      .kernel { fill:#0D0F11; stroke:#3B3D41; stroke-width:1.2; }
      .soft { fill:#121316; stroke:#26282C; stroke-width:1; }
      .accent-fill { fill:#FF6B4A; }
      .pill.coral { fill:#FF6B4A; }
      .pill.ivory { fill:#F7F3EA; }
      .pill.muted { fill:#8F8C86; }
      .rule { fill:none; stroke:#303236; stroke-width:1; }
      .rule-coral { fill:none; stroke:#FF6B4A; stroke-width:1.2; }
      .flow { fill:none; stroke:#F7F3EA; stroke-width:1.45; marker-end:url(#arrow-ivory); }
      .flow-coral { stroke:#FF6B4A; stroke-width:1.75; marker-end:url(#arrow-coral); }
      .flow-dash { stroke-dasharray:5 5; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#111318"/>
  <path d="M0 94H1200M0 724H1200" class="rule"/>
  <text x="48" y="33" class="eyebrow" text-anchor="start">EXECUTION MODEL / v0.2.48</text>
  <text x="48" y="68" class="title" text-anchor="start">A turn is a state transition, not an SDK callback chain.</text>
  <text x="1152" y="39" class="subtitle" text-anchor="end">REASON → ACT → ADJUDICATE → OBSERVE → DELTA</text>
  <rect x="1135" y="70" width="17" height="3" rx="1.5" class="accent-fill"/>


  <text x="48" y="124" class="section-title" text-anchor="start">One task turn</text>
  <text x="1152" y="124" class="section-note" text-anchor="end">TASK LIFECYCLE IS ORTHOGONAL: READY · RUNNING · SUSPENDED · DONE</text>

  <g>
    <rect x="48" y="148" width="208" height="120" rx="6" class="panel"/>
    <rect x="48" y="148" width="5" height="120" rx="2.5" class="accent-fill"/>
    <text x="66" y="177" class="card-title" text-anchor="start">1 · Reason</text>
    <text x="66" y="201" class="card-text" text-anchor="start">Render four context slots</text>
<text x="66" y="219" class="card-text" text-anchor="start">Narrow visible tool schemas</text>
<text x="66" y="237" class="card-text" text-anchor="start">Emit CallProvider</text>

  </g>

  <g>
    <rect x="280" y="148" width="208" height="120" rx="6" class="panel"/>

    <text x="298" y="177" class="card-title" text-anchor="start">2 · Act</text>
    <text x="298" y="201" class="card-text" text-anchor="start">Provider returns text</text>
<text x="298" y="219" class="card-text" text-anchor="start">and typed tool calls</text>
<text x="298" y="237" class="card-text" text-anchor="start">Trap every requested effect</text>

  </g>

  <g>
    <rect x="512" y="148" width="208" height="120" rx="6" class="panel"/>

    <text x="530" y="177" class="card-title" text-anchor="start">3 · Adjudicate</text>
    <text x="530" y="201" class="card-text" text-anchor="start">Veto · rate · permission</text>
<text x="530" y="219" class="card-text" text-anchor="start">constraints · resource quota</text>
<text x="530" y="237" class="card-text" text-anchor="start">Allow / Deny / Gate / Defer</text>

  </g>

  <g>
    <rect x="744" y="148" width="208" height="120" rx="6" class="panel"/>

    <text x="762" y="177" class="card-title" text-anchor="start">4 · Execute</text>
    <text x="762" y="201" class="card-text" text-anchor="start">Host runs approved calls</text>
<text x="762" y="219" class="card-text" text-anchor="start">Meta-tools stay in kernel</text>
<text x="762" y="237" class="card-text" text-anchor="start">No denied effect executes</text>

  </g>

  <g>
    <rect x="976" y="148" width="176" height="120" rx="6" class="panel"/>

    <text x="994" y="177" class="card-title" text-anchor="start">5 · Observe</text>
    <text x="994" y="201" class="card-text" text-anchor="start">Results return</text>
<text x="994" y="219" class="card-text" text-anchor="start">Evidence appends</text>
<text x="994" y="237" class="card-text" text-anchor="start">DAG may advance</text>

  </g>
    <path d="M256 208H278" class="flow"/><path d="M488 208H510" class="flow"/><path d="M720 208H742" class="flow"/><path d="M952 208H974" class="flow"/>


  <text x="48" y="318" class="section-title" text-anchor="start">Disposition branches</text>
  <text x="1152" y="318" class="section-note" text-anchor="end">DENIALS ARE VISIBLE RESULTS SINCE v0.2.42 · NO TURN ROLLBACK</text>

  <g>
    <rect x="48" y="338" width="258" height="110" rx="6" class="panel"/>

    <text x="66" y="367" class="card-title" text-anchor="start">Allow</text>
    <text x="66" y="391" class="card-text" text-anchor="start">ExecutionPlane receives the call</text>
<text x="66" y="409" class="card-text" text-anchor="start">ToolResult returns to history</text>

  </g>

  <g>
    <rect x="324" y="338" width="258" height="110" rx="6" class="panel"/>
    <rect x="324" y="338" width="5" height="110" rx="2.5" class="accent-fill"/>
    <text x="342" y="367" class="card-title" text-anchor="start">Deny / RateLimited</text>
    <text x="342" y="391" class="card-text" text-anchor="start">Effect never runs</text>
<text x="342" y="409" class="card-text" text-anchor="start">Error ToolResult remains visible</text>

  </g>

  <g>
    <rect x="600" y="338" width="258" height="110" rx="6" class="panel"/>

    <text x="618" y="367" class="card-title" text-anchor="start">Gate</text>
    <text x="618" y="391" class="card-text" text-anchor="start">Task → Suspended(Approval)</text>
<text x="618" y="409" class="card-text" text-anchor="start">Host resolves correlated request</text>

  </g>

  <g>
    <rect x="876" y="338" width="276" height="110" rx="6" class="panel"/>

    <text x="894" y="367" class="card-title" text-anchor="start">Spawn / Workflow</text>
    <text x="894" y="391" class="card-text" text-anchor="start">Child TCB or DAG nodes</text>
<text x="894" y="409" class="card-text" text-anchor="start">Parent waits without token burn</text>

  </g>


  <text x="48" y="500" class="section-title" text-anchor="start">Delta boundary</text>
  <text x="1152" y="500" class="section-note" text-anchor="end">PRESSURE · COMPACTION · RENEWAL · BUDGET · ENTROPY</text>
    <rect x="48" y="520" width="1104" height="116" rx="7" class="panel-strong"/>
    <text x="68" y="549" class="card-title" text-anchor="start">6 · Delta</text>
    <text x="68" y="575" class="card-text" text-anchor="start">Sample token pressure and entropy</text>
    <path d="M286 576H404" class="flow flow-coral"/>
    <text x="424" y="575" class="label" text-anchor="start">Snip → Drop → Summarize</text>
    <path d="M611 576H730" class="flow flow-coral"/>
    <text x="750" y="575" class="label" text-anchor="start">Renew memory / skills / signals</text>
    <path d="M984 576H1084" class="flow flow-coral"/>
    <text x="68" y="611" class="body" text-anchor="start">If unfinished and within budget, the kernel renders the next turn. Completion, quota, cancellation, or no-progress terminates the TCB.</text>
    <path d="M1110 636V678H150V270" class="flow flow-coral flow-dash"/>
    <text x="602" y="684" class="micro" text-anchor="middle">NEXT TURN</text>

  <text x="48" y="746" class="footer" text-anchor="start">DEEPSTRIKE · CONTROL FLOW IN THE KERNEL · REAL I/O IN THE HOST</text>
</svg>
