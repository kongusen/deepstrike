[package]
name = "deepstrike-wasm"
description = "WebAssembly bindings for DeepStrike runtime kernel"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
# tsify-next gives us napi(object)-equivalent: derive-driven JsValue<->Rust
# with auto-generated TypeScript .d.ts types.
tsify-next = { version = "0.5", features = ["js"] }
js-sys = "0.3"
deepstrike-core = { workspace = true }
deepstrike-tokenizer = { workspace = true }
compact_str = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[profile.release]
lto = true
opt-level = "z"   # WASM size optimization
