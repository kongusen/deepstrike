<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashNote</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d12;
    --surface: #16161e;
    --surface2: #1e1e28;
    --border: #2a2a38;
    --text: #e0e0ec;
    --muted: #6b6b80;
    --accent: #7c6af7;
    --accent-dim: #7c6af720;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --radius: 10px;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }

  /* ── buttons ── */
  button {
    cursor: pointer;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    padding: 7px 14px;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ── main layout ── */
  main { max-width: 900px; margin: 0 auto; padding: 28px 24px 80px; }

  /* ── capture panel ── */
  .capture-panel { margin-bottom: 32px; }

  .mode-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }

  textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    line-height: 1.7;
    padding: 16px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 100px;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .capture-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }
  .capture-hint { font-size: 12px; color: var(--muted); }

  /* ── output stream ── */
  .output-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 32px;
    overflow: hidden;
    display: none;
  }
  .output-panel.visible { display: block; }
  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .output-header .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--yellow);
    animation: pulse 1s infinite;
    display: inline-block;
    margin-right: 6px;
  }
  .output-header .status-dot.done { background: var(--green); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .output-body {
    padding: 16px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    max-height: 320px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .output-line-tool {
    color: var(--muted);
    font-size: 12px;
    padding: 2px 0;
  }
  .output-line-tool::before { content: "⚙ "; }
  .output-line-warn { color: var(--yellow); font-size: 12px; }
  .output-line-warn::before { content: "⚠ "; }
  .output-line-done { color: var(--green); font-size: 12px; margin-top: 4px; }
  .output-line-done::before { content: "✓ "; }
  .output-line-skill {
    display: inline-block;
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 8px;
    border-radius: 4px;
    margin: 4px 0;
  }
  .output-line-skill::before { content: "📚 "; }
  .output-line-saved {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 7px;
    border-left: 3px solid var(--accent);
  }
  .saved-type { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .saved-summary { font-weight: 600; color: var(--text); margin: 3px 0; font-family: inherit; font-size: 14px; }
  .saved-tags { font-size: 12px; color: var(--accent); }

  /* ── section header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }

  /* ── note cards ── */
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.2s;
    cursor: default;
  }
  .note-card:hover { border-color: var(--accent); }
  .note-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .note-type {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
  }
  .note-type.idea { background: #1e2a1e; color: #4ade80; }
  .note-type.research { background: #1e1e2a; color: #818cf8; }
  .note-type.task { background: #2a1e1e; color: #f87171; }
  .note-type.insight { background: #2a1a2a; color: #c084fc; }
  .note-type.article { background: #1a2a2a; color: #22d3ee; }
  .note-source-badge {
    font-size: 10px;
    color: var(--muted);
  }
  .note-summary {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .note-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .tag {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .note-time { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* ── empty state ── */
  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--muted);
  }
  .empty p { margin-top: 8px; font-size: 13px; }

  /* ── research modal ── */
  .modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 480px;
    max-width: 90vw;
  }
  .modal h2 { font-size: 16px; margin-bottom: 16px; }
  .modal input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    margin-bottom: 16px;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }

  /* ── note detail modal ── */
  .note-detail { max-width: 600px; width: 90vw; max-height: 80vh; overflow-y: auto; }
  .note-detail h2 { font-size: 15px; font-weight: 600; line-height: 1.5; margin-bottom: 12px; }
  .note-detail-meta {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .note-detail-meta .tag { font-size: 12px; }
  .note-detail-section { margin-bottom: 16px; }
  .note-detail-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--muted); margin-bottom: 6px;
  }
  .note-detail-body {
    background: var(--surface2); border-radius: 7px;
    padding: 12px 14px; font-size: 13px; line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
    max-height: 280px; overflow-y: auto;
    border: 1px solid var(--border);
  }
  .note-detail-connections { display: flex; flex-wrap: wrap; gap: 6px; }
  .conn-chip {
    font-size: 11px; font-family: var(--mono);
    background: var(--surface2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 5px; color: var(--muted);
    cursor: pointer; transition: border-color 0.15s;
  }
  .conn-chip:hover { border-color: var(--accent); color: var(--accent); }
  .quality-bar {
    height: 4px; border-radius: 2px; background: var(--border);
    margin-top: 6px; overflow: hidden;
  }
  .quality-fill { height: 100%; border-radius: 2px; background: var(--accent); }

  /* ── scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ Flash<span>Note</span></div>
  <div class="header-actions">
    <button class="btn-ghost btn-sm" onclick="openExportModal()">Export ↓</button>
    <button class="btn-ghost btn-sm" onclick="openResearchModal()">深度研究</button>
  </div>
</header>

<main>
  <!-- capture -->
  <div class="capture-panel">
    <div class="mode-tabs">
      <button class="tab active" id="tab-capture" onclick="setMode('capture')">💡 捕获闪念</button>
      <button class="tab" id="tab-url" onclick="setMode('url')">🔗 剪藏URL</button>
    </div>

    <textarea id="input"
      placeholder="随手记录想法、粘贴文章、输入任何内容... (⌘↵ 提交)"
      rows="4"
      onkeydown="handleKey(event)"
    ></textarea>

    <div class="capture-footer">
      <span class="capture-hint" id="hint">⌘↵ 或点击捕获</span>
      <button class="btn-primary" id="capture-btn" onclick="capture()">捕获</button>
    </div>
  </div>

  <!-- output -->
  <div class="output-panel" id="output-panel">
    <div class="output-header">
      <span><span class="status-dot" id="status-dot"></span><span id="status-label">处理中...</span></span>
      <button class="btn-ghost btn-sm" onclick="clearOutput()">清除</button>
    </div>
    <div class="output-body" id="output-body"></div>
  </div>

  <!-- notes -->
  <div class="section-header">
    <span class="section-title" id="notes-count">知识库</span>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost btn-sm" onclick="loadNotes()">刷新</button>
    </div>
  </div>
  <div class="notes-grid" id="notes-grid">
    <div class="empty"><div style="font-size:32px">📭</div><p>还没有笔记，捕获第一条吧</p></div>
  </div>
</main>

<!-- research modal -->
<div class="modal-backdrop" id="research-modal">
  <div class="modal">
    <h2>🔍 深度研究</h2>
    <input type="text" id="research-input" placeholder="输入研究主题，例如：2026主流开源LLM推理引擎对比"
      onkeydown="if(event.key==='Enter')startResearch()">
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('research-modal')">取消</button>
      <button class="btn-primary" onclick="startResearch()">开始研究</button>
    </div>
  </div>
</div>

<!-- note detail modal -->
<div class="modal-backdrop" id="note-modal">
  <div class="modal note-detail" id="note-detail-content">
    <!-- filled by JS -->
  </div>
</div>

<!-- export modal -->
<div class="modal-backdrop" id="export-modal">
  <div class="modal">
    <h2>📤 导出</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <button class="btn-ghost" style="padding:14px;text-align:left" onclick="doExport('digest')">
        <div style="font-weight:600">每日摘要</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">按时间倒序的笔记摘要</div>
      </button>
      <button class="btn-ghost" style="padding:14px;text-align:left" onclick="doExport('outline')">
        <div style="font-weight:600">大纲</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">按类型分组</div>
      </button>
      <button class="btn-ghost" style="padding:14px;text-align:left" onclick="doExport('actions')">
        <div style="font-weight:600">待办事项</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">所有 task 类型</div>
      </button>
      <button class="btn-ghost" style="padding:14px;text-align:left" onclick="doExport('clusters')">
        <div style="font-weight:600">主题聚类</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">按标签分组</div>
      </button>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">数据集导出</div>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost btn-sm" onclick="doDataset('jsonl')">JSONL</button>
        <button class="btn-ghost btn-sm" onclick="doDataset('rag')">RAG语料</button>
        <button class="btn-ghost btn-sm" onclick="doDataset('memory_pack')">Memory Pack</button>
      </div>
    </div>
    <div class="modal-footer" style="margin-top:16px">
      <button class="btn-ghost" onclick="closeModal('export-modal')">关闭</button>
    </div>
  </div>
</div>

<script>
  let mode = 'capture'
  let processing = false

  // ── mode ──────────────────────────────────────────────────────────────────
  function setMode(m) {
    mode = m
    document.getElementById('tab-capture').classList.toggle('active', m === 'capture')
    document.getElementById('tab-url').classList.toggle('active', m === 'url')
    const ta = document.getElementById('input')
    ta.placeholder = m === 'url'
      ? '粘贴URL，agent自动抓取正文并整理...'
      : '随手记录想法、粘贴文章、输入任何内容... (⌘↵ 提交)'
  }

  // ── capture ───────────────────────────────────────────────────────────────
  function handleKey(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault()
      capture()
    }
  }

  async function capture() {
    const input = document.getElementById('input')
    const text = input.value.trim()
    if (!text || processing) return

    // If URL mode or input looks like a URL, wrap it
    const payload = mode === 'url' || /^https?:\/\//.test(text)
      ? `Please fetch and clip this URL, then organize it as a note: ${text}`
      : text

    input.value = ''
    await stream('/api/capture', { text: payload }, '捕获中')
    loadNotes()
  }

  // ── research ──────────────────────────────────────────────────────────────
  function openResearchModal() {
    document.getElementById('research-modal').classList.add('open')
    setTimeout(() => document.getElementById('research-input').focus(), 50)
  }

  async function startResearch() {
    const topic = document.getElementById('research-input').value.trim()
    if (!topic) return
    document.getElementById('research-input').value = ''
    closeModal('research-modal')
    await stream('/api/research', { topic }, `研究: ${topic}`)
    loadNotes()
  }

  // ── export ────────────────────────────────────────────────────────────────
  function openExportModal() {
    document.getElementById('export-modal').classList.add('open')
  }

  async function doExport(format) {
    closeModal('export-modal')
    showOutput(`导出 ${format}...`)
    try {
      const res = await fetch(`/api/export?format=${format}`)
      const { result } = await res.json()
      appendLine(result.slice(0, 800), 'text')
      markDone()
    } catch (e) {
      appendLine(`Error: ${e}`, 'warn')
      markDone()
    }
  }

  async function doDataset(format) {
    closeModal('export-modal')
    showOutput(`导出数据集 (${format})...`)
    try {
      const res = await fetch(`/api/export-dataset?format=${format}&min_quality=0.7`)
      const { result } = await res.json()
      appendLine(result, 'done')
      markDone()
    } catch (e) {
      appendLine(`Error: ${e}`, 'warn')
      markDone()
    }
  }

  // ── SSE stream consumer ───────────────────────────────────────────────────
  async function stream(url, body, label) {
    processing = true
    document.getElementById('capture-btn').disabled = true
    showOutput(label)

    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })

      const reader = res.body.getReader()
      const dec = new TextDecoder()
      let buf = ''

      while (true) {
        const { done, value } = await reader.read()
        if (done) break
        buf += dec.decode(value, { stream: true })
        const lines = buf.split('\n')
        buf = lines.pop() ?? ''
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue
          const raw = line.slice(6).trim()
          if (raw === '[DONE]') { markDone(); break }
          try {
            const evt = JSON.parse(raw)
            handleEvent(evt)
          } catch {}
        }
      }
    } catch (e) {
      appendLine(`Error: ${e}`, 'warn')
      markDone()
    } finally {
      processing = false
      document.getElementById('capture-btn').disabled = false
    }
  }

  function handleEvent(evt) {
    if (evt.type === 'delta') appendLine(evt.content, 'text')
    else if (evt.type === 'skill') appendLine(evt.content, 'skill')
    else if (evt.type === 'tool') appendLine(`${evt.name}: ${evt.content}`, 'tool')
    else if (evt.type === 'warn') appendLine(evt.content, 'warn')
    else if (evt.type === 'done') appendLine(`${evt.iterations} turns · ${evt.tokens} tokens · ${evt.status}`, 'done')
    else if (evt.type === 'saved' && evt.note) renderSaved(evt.note)
  }

  // ── output panel ──────────────────────────────────────────────────────────
  function showOutput(label) {
    const panel = document.getElementById('output-panel')
    const body = document.getElementById('output-body')
    const dot = document.getElementById('status-dot')
    const lbl = document.getElementById('status-label')
    panel.classList.add('visible')
    body.innerHTML = ''
    dot.className = 'status-dot'
    lbl.textContent = label
  }

  function appendLine(content, type) {
    const body = document.getElementById('output-body')
    if (type === 'text') {
      // append to last text node or create new span
      let last = body.lastChild
      if (!last || last.nodeType !== Node.TEXT_NODE) {
        last = document.createTextNode('')
        body.appendChild(last)
      }
      last.textContent += content
    } else {
      const el = document.createElement('div')
      el.textContent = content
      el.className = `output-line-${type}`
      body.appendChild(el)
    }
    body.scrollTop = body.scrollHeight
  }

  function renderSaved(note) {
    const body = document.getElementById('output-body')
    const el = document.createElement('div')
    el.className = 'output-line-saved'
    el.innerHTML = `
      <div class="saved-type">${note.type} saved</div>
      <div class="saved-summary">${escHtml(note.summary)}</div>
      <div class="saved-tags">${(note.tags || []).join(' ')}</div>
    `
    body.appendChild(el)
    body.scrollTop = body.scrollHeight
  }

  function markDone() {
    document.getElementById('status-dot').className = 'status-dot done'
    document.getElementById('status-label').textContent = '完成'
  }

  function clearOutput() {
    document.getElementById('output-panel').classList.remove('visible')
  }

  // ── notes grid ────────────────────────────────────────────────────────────
  async function loadNotes() {
    try {
      const res = await fetch('/api/notes')
      const notes = await res.json()
      renderNotes(notes)
    } catch {}
  }

  let allNotes = []

  function renderNotes(notes) {
    allNotes = notes
    const grid = document.getElementById('notes-grid')
    const countEl = document.getElementById('notes-count')
    countEl.textContent = `知识库 · ${notes.length} 条`

    if (!notes.length) {
      grid.innerHTML = '<div class="empty"><div style="font-size:32px">📭</div><p>还没有笔记，捕获第一条吧</p></div>'
      return
    }

    grid.innerHTML = notes.map((n, i) => `
      <div class="note-card" onclick="openNote(${i})" style="cursor:pointer">
        <div class="note-meta">
          <span class="note-type ${escHtml(n.type)}">${escHtml(n.type)}</span>
          ${n.source === 'community' ? '<span class="note-source-badge">👥 社区</span>' : ''}
        </div>
        <div class="note-summary">${escHtml(n.summary)}</div>
        <div class="note-tags">${(n.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>
        <div class="note-time">${relTime(n.createdAt)}</div>
      </div>
    `).join('')
  }

  function openNote(idx) {
    const n = allNotes[idx]
    if (!n) return

    const connections = (n.connections || []).length
      ? `<div class="note-detail-connections">${n.connections.map(id =>
          `<span class="conn-chip" onclick="openNoteById('${escHtml(id)}')">${escHtml(id)}</span>`
        ).join('')}</div>`
      : `<span style="color:var(--muted);font-size:13px">暂无关联</span>`

    const qualityPct = Math.round((n.qualityScore || 0) * 100)

    document.getElementById('note-detail-content').innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px">
        <h2>${escHtml(n.summary)}</h2>
        <button class="btn-ghost btn-sm" onclick="closeModal('note-modal')" style="flex-shrink:0">✕</button>
      </div>

      <div class="note-detail-meta">
        <span class="note-type ${escHtml(n.type)}">${escHtml(n.type)}</span>
        ${n.source === 'community' ? '<span class="note-source-badge">👥 社区</span>' : ''}
        ${n.contributor ? `<span style="color:var(--muted)">by ${escHtml(n.contributor)}</span>` : ''}
        ${(n.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}
      </div>

      <div class="note-detail-section">
        <div class="note-detail-label">原始内容</div>
        <div class="note-detail-body">${escHtml(n.raw || '')}</div>
      </div>

      ${n.url ? `
      <div class="note-detail-section">
        <div class="note-detail-label">来源</div>
        <a href="${escHtml(n.url)}" target="_blank" rel="noopener"
           style="color:var(--accent);font-size:13px;word-break:break-all">${escHtml(n.url)}</a>
      </div>` : ''}

      <div class="note-detail-section">
        <div class="note-detail-label">关联笔记</div>
        ${connections}
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;
                  padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
        <span>${relTime(n.createdAt)}</span>
        <span style="display:flex;align-items:center;gap:8px">
          质量分 ${qualityPct}%
          <span style="width:60px">
            <div class="quality-bar"><div class="quality-fill" style="width:${qualityPct}%"></div></div>
          </span>
        </span>
        <span style="font-family:var(--mono);font-size:11px">${escHtml(n.id)}</span>
      </div>
    `
    document.getElementById('note-modal').classList.add('open')
  }

  function openNoteById(id) {
    const idx = allNotes.findIndex(n => n.id === id)
    if (idx !== -1) openNote(idx)
  }

  // ── modal ─────────────────────────────────────────────────────────────────
  function closeModal(id) {
    document.getElementById(id).classList.remove('open')
  }
  document.querySelectorAll('.modal-backdrop').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open') })
  })

  // ── utils ─────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }
  function relTime(ms) {
    const diff = Date.now() - ms
    if (diff < 60_000) return '刚刚'
    if (diff < 3600_000) return `${Math.floor(diff / 60_000)} 分钟前`
    if (diff < 86400_000) return `${Math.floor(diff / 3600_000)} 小时前`
    return new Date(ms).toLocaleDateString('zh-CN')
  }

  // ── init ──────────────────────────────────────────────────────────────────
  loadNotes()
</script>
</body>
</html>
