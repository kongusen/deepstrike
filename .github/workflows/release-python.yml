name: Release Python SDK

on:
  push:
    tags: ["v*"]

jobs:
  build-wheels:
    strategy:
      matrix:
        include:
          # glibc Linux — maturin-action 提供 manylinux Docker 环境
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
            run_smoke: "true"
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
            run_smoke: "false"  # cross-compiled; can't install aarch64 wheel on x86_64 runner
          # musl Linux (Alpine-compatible)
          - os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
            run_smoke: "false"  # musl wheel won't install on glibc runner
          - os: ubuntu-latest
            target: aarch64
            manylinux: musllinux_1_2
            run_smoke: "false"
          # macOS — 直接跑 maturin，不经过 action（规避 rustup-init --print regression）
          - os: macos-latest
            target: x86_64
            manylinux: auto
            run_smoke: "false"  # macos-latest runners are arm64; cross-compiled x86_64 won't run
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64
            manylinux: auto
            run_smoke: "true"
            rust_target: aarch64-apple-darwin
          # Windows — 直接跑 maturin；aarch64 依赖 PyO3 generate-import-lib
          - os: windows-latest
            target: x86_64
            manylinux: auto
            run_smoke: "true"
            rust_target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64
            manylinux: auto
            run_smoke: "false"
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # macOS：提前安装双架构 Rust target，供 maturin cross-compile 使用
      - name: Add macOS cross-compile Rust targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      # Linux：maturin-action 负责启动 manylinux/musllinux Docker 容器
      - name: Build wheels (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.12
          working-directory: python
          manylinux: ${{ matrix.manylinux }}

      # macOS / Windows：直接调用 maturin，绕过 action 的 rustup-init 问题
      - name: Build wheels (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        working-directory: python
        run: |
          pip install "maturin>=1.7,<2"
          maturin build --release --out dist --interpreter 3.12 --target ${{ matrix.rust_target }}

      - name: Smoke install wheel
        if: matrix.run_smoke == 'true'
        shell: bash
        run: |
          ls python/dist/*abi3*.whl
          python -m pip install python/dist/*.whl
          python -c "
          import deepstrike
          from deepstrike import Governance
          from deepstrike.kernel import LoopStateMachine, LoopPolicy
          assert Governance().evaluate('x', '{}').kind == 'allow'
          sm = LoopStateMachine(LoopPolicy())
          assert not sm.is_terminal()
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux }}
          path: python/dist/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: python
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist }
