name: Release Python SDK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.10); must match VERSION file'
        required: false
        default: ''

jobs:
  verify:
    uses: ./.github/workflows/_verify-version.yml
    with:
      tag: ${{ github.event.inputs.tag || '' }}

  gate:
    uses: ./.github/workflows/_gate-ci.yml

  build-wheels:
    needs: [verify, gate]
    strategy:
      matrix:
        include:
          # glibc Linux — maturin-action 提供 manylinux Docker 环境
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
            run_smoke: "true"
          - os: ubuntu-latest
            target: aarch64
            manylinux: auto
            run_smoke: "false"  # cross-compiled; can't install aarch64 wheel on x86_64 runner
          # musl Linux (Alpine-compatible)
          - os: ubuntu-latest
            target: x86_64
            manylinux: musllinux_1_2
            run_smoke: "false"  # musl wheel won't install on glibc runner
          - os: ubuntu-latest
            target: aarch64
            manylinux: musllinux_1_2
            run_smoke: "false"
          # macOS — 直接跑 maturin，不经过 action（规避 rustup-init --print regression）
          - os: macos-latest
            target: x86_64
            manylinux: auto
            run_smoke: "false"  # macos-latest runners are arm64; cross-compiled x86_64 won't run
            rust_target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64
            manylinux: auto
            run_smoke: "true"
            rust_target: aarch64-apple-darwin
          # Windows — 直接跑 maturin；aarch64 依赖 PyO3 generate-import-lib
          - os: windows-latest
            target: x86_64
            manylinux: auto
            run_smoke: "true"
            rust_target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64
            manylinux: auto
            run_smoke: "false"
            rust_target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      # Linux wheels are built inside maturin-action's manylinux/musllinux
      # containers. Do not restore host-built `target/` binaries into those
      # older libc environments; cache only Cargo registry data there.
      - uses: Swatinem/rust-cache@v2
        if: matrix.os == 'ubuntu-latest'
        with:
          cache-targets: false
      - uses: Swatinem/rust-cache@v2
        if: matrix.os != 'ubuntu-latest'

      # macOS / Windows cross-compile: 安装目标架构的 Rust target
      - name: Add macOS cross-compile Rust targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Add cross-compile Rust target
        if: matrix.rust_target && matrix.os == 'windows-latest'
        shell: bash
        run: rustup target add ${{ matrix.rust_target }}

      # Linux：maturin-action 负责启动 manylinux/musllinux Docker 容器
      - name: Build wheels (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter 3.12
          working-directory: python
          manylinux: ${{ matrix.manylinux }}

      # macOS / Windows：直接调用 maturin，绕过 action 的 rustup-init 问题
      - name: Build wheels (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        shell: bash
        working-directory: python
        run: |
          pip install "maturin>=1.7,<2"
          maturin build --release --out dist --interpreter 3.12 --target ${{ matrix.rust_target }}

      - name: Smoke install wheel
        if: matrix.run_smoke == 'true'
        shell: bash
        run: |
          ls python/dist/*abi3*.whl
          python -m pip install python/dist/*.whl
          python -c "
          import deepstrike
          from deepstrike import Governance
          from deepstrike.kernel import KernelRuntime, LoopPolicy
          assert Governance().evaluate('x', '{}').kind == 'allow'
          sm = KernelRuntime(LoopPolicy())
          assert not sm.is_terminal()
          "

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}-${{ matrix.manylinux }}
          path: python/dist/*.whl

  build-sdist:
    needs: [verify, gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: python
      - name: Smoke install from sdist
        shell: bash
        run: |
          pip install "maturin>=1.7,<2"
          pip install python/dist/*.tar.gz
          python -c "import deepstrike; print('sdist ok:', deepstrike.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  publish:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }
      - name: Validate wheel and sdist metadata
        run: |
          pip install twine
          twine check dist/*.whl dist/*.tar.gz
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist }
