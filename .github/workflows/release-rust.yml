name: Release Rust Crates

on:
  push:
    tags: ["v*"]

jobs:
  verify:
    uses: ./.github/workflows/_verify-version.yml

  gate:
    # Grant the reusable gate exactly what it needs to poll the Actions API.
    # Without this, the repo's default token (actions: none) rejects the call.
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/_gate-ci.yml

  publish:
    needs: [verify, gate]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Dry-run publish check (core only)
        # deepstrike-sdk depends on deepstrike-core, which is not on crates.io until the
        # "Publish deepstrike-core" step below — so `cargo publish -p deepstrike-sdk --dry-run`
        # always fails here with "no matching package named deepstrike-core". The sdk is fully
        # verified during its real, post-core publish (cargo publish builds before uploading).
        run: cargo publish -p deepstrike-core --dry-run --allow-dirty

      - name: Publish deepstrike-core
        run: cargo publish -p deepstrike-core

      - name: Wait for deepstrike-core in crates.io index
        shell: bash
        run: |
          VERSION="$(cat VERSION)"
          for i in $(seq 1 12); do
            if cargo search deepstrike-core 2>/dev/null | grep -q "\"$VERSION\""; then
              echo "deepstrike-core $VERSION is indexed"; break
            fi
            echo "Waiting for index... attempt $i/12"
            sleep 15
          done

      - name: Publish deepstrike-sdk
        run: cargo publish -p deepstrike-sdk
