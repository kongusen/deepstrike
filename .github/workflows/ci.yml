name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude deepstrike-py --exclude deepstrike-node --exclude deepstrike-wasm

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 24 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "x86_64-unknown-linux-musl" }
      - uses: Swatinem/rust-cache@v2
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2
      - name: Build @deepstrike/core native addon
        run: napi build --release --platform artifacts
        working-directory: crates/deepstrike-node
      - name: Install @deepstrike/core from local build
        run: |
          # 先把生成物写入 crate root，npm install 建 symlink 后文件自动就位
          cp ../crates/deepstrike-node/artifacts/index.d.ts ../crates/deepstrike-node/
          cp ../crates/deepstrike-node/artifacts/*.node     ../crates/deepstrike-node/
          npm install --no-save --package-lock=false --ignore-scripts --omit=optional ../crates/deepstrike-node
        working-directory: node
      - run: npm test
        working-directory: node

      # 与 release 一致：静态 musl（Rust 对 musl target 默认 +crt-static，无需 libgcc_s.so.1）
      - name: Install musl toolchain for x64 musl verification
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Verify Linux x64 musl native build
        shell: bash
        env:
          CC_x86_64_unknown_linux_musl: x86_64-linux-musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: x86_64-linux-musl-gcc
        run: |
          set -euo pipefail
          napi build --release --platform --target x86_64-unknown-linux-musl artifacts-musl
          test -f artifacts-musl/deepstrike-core.linux-x64-musl.node
        working-directory: crates/deepstrike-node

  # ARM64 host + musl：与 release-node.yml 中 linux-arm64-musl 矩阵一致（Alpine arm64）
  node-linux-arm64-musl:
    runs-on: ubuntu-24.04-arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 24 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-unknown-linux-musl" }
      - uses: Swatinem/rust-cache@v2
        with: { key: "aarch64-unknown-linux-musl" }
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2
      - name: Install musl toolchain (arm64 native)
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Verify Linux arm64 musl native build
        shell: bash
        env:
          CC_aarch64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          set -euo pipefail
          napi build --release --platform --target aarch64-unknown-linux-musl artifacts-musl-arm64
          test -f artifacts-musl-arm64/deepstrike-core.linux-arm64-musl.node
        working-directory: crates/deepstrike-node

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 24 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm-kernel
        run: wasm-pack build --release --target bundler --out-dir pkg --scope deepstrike
        working-directory: crates/deepstrike-wasm
      - name: Normalize wasm-kernel package metadata
        run: node scripts/normalize-wasm-kernel-package.mjs "$(node -p "require('./wasm/package.json').version")" crates/deepstrike-wasm/pkg
      - name: Link wasm-kernel for tsc
        run: npm install --no-save --package-lock=false ../crates/deepstrike-wasm/pkg
        working-directory: wasm
      - name: Build WASM SDK
        run: npm run build
        working-directory: wasm

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pip install maturin pytest pytest-asyncio
      - name: Build and install wheel
        working-directory: python
        run: |
          maturin build --release --out dist
          pip install dist/*.whl
      - run: pytest
        working-directory: python
