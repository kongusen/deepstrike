name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude deepstrike-py --exclude deepstrike-node --exclude deepstrike-wasm

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 24 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "x86_64-unknown-linux-musl" }
      - uses: Swatinem/rust-cache@v2
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2
      - name: Build @deepstrike/core native addon
        run: napi build --release --platform artifacts
        working-directory: crates/deepstrike-node
      - name: Install @deepstrike/core from local build
        run: |
          # 先把生成物写入 crate root，npm install 建 symlink 后文件自动就位
          cp ../crates/deepstrike-node/artifacts/index.d.ts ../crates/deepstrike-node/
          cp ../crates/deepstrike-node/artifacts/*.node     ../crates/deepstrike-node/
          npm install --no-save --package-lock=false --ignore-scripts --omit=optional ../crates/deepstrike-node
        working-directory: node
      - run: npm test
        working-directory: node

      # 与 release 一致：zigbuild 提供动态 musl 所需的 libgcc_s 等价实现
      - name: Install zig + cargo-zigbuild for x64 musl verification
        shell: bash
        run: |
          ZIG_VERSION="0.13.0"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            | sudo tar -xJ -C /usr/local/
          sudo ln -sf "/usr/local/zig-linux-x86_64-${ZIG_VERSION}/zig" /usr/local/bin/zig
          cargo install cargo-zigbuild

      - name: Verify Linux x64 musl native build
        shell: bash
        env:
          RUSTFLAGS: "-C target-feature=-crt-static"
        run: |
          set -euo pipefail
          cargo zigbuild --release --target x86_64-unknown-linux-musl --manifest-path Cargo.toml
          mkdir -p artifacts-musl
          cp ../../target/x86_64-unknown-linux-musl/release/libdeepstrike_node.so \
             artifacts-musl/deepstrike-core.linux-x64-musl.node
          test -f artifacts-musl/deepstrike-core.linux-x64-musl.node
        working-directory: crates/deepstrike-node

  # ARM64 host + musl：与 release-node.yml 中 linux-arm64-musl 矩阵一致（Alpine arm64）
  node-linux-arm64-musl:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 24 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-unknown-linux-musl" }
      - uses: Swatinem/rust-cache@v2
        with: { key: "aarch64-unknown-linux-musl" }
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2
      - name: Install zig + cargo-zigbuild for arm64 musl verification
        shell: bash
        run: |
          ZIG_VERSION="0.13.0"
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-aarch64-${ZIG_VERSION}.tar.xz" \
            | sudo tar -xJ -C /usr/local/
          sudo ln -sf "/usr/local/zig-linux-aarch64-${ZIG_VERSION}/zig" /usr/local/bin/zig
          cargo install cargo-zigbuild

      - name: Verify Linux arm64 musl native build
        shell: bash
        env:
          RUSTFLAGS: "-C target-feature=-crt-static"
        run: |
          set -euo pipefail
          cargo zigbuild --release --target aarch64-unknown-linux-musl --manifest-path Cargo.toml
          mkdir -p artifacts-musl-arm64
          cp ../../target/aarch64-unknown-linux-musl/release/libdeepstrike_node.so \
             artifacts-musl-arm64/deepstrike-core.linux-arm64-musl.node
          test -f artifacts-musl-arm64/deepstrike-core.linux-arm64-musl.node
        working-directory: crates/deepstrike-node

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 24 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build wasm-kernel
        run: wasm-pack build --release --target bundler --out-dir pkg --scope deepstrike
        working-directory: crates/deepstrike-wasm
      - name: Normalize wasm-kernel package metadata
        run: node scripts/normalize-wasm-kernel-package.mjs "$(node -p "require('./wasm/package.json').version")" crates/deepstrike-wasm/pkg
      - name: Link wasm-kernel for tsc
        run: npm install --no-save --package-lock=false ../crates/deepstrike-wasm/pkg
        working-directory: wasm
      - name: Build WASM SDK
        run: npm run build
        working-directory: wasm

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pip install maturin pytest pytest-asyncio
      - name: Build and install wheel
        working-directory: python
        run: |
          maturin build --release --out dist
          pip install dist/*.whl
      - run: pytest
        working-directory: python
