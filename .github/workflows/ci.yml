name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude deepstrike-py --exclude deepstrike-node --exclude deepstrike-wasm

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 24 }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2
      - name: Build @deepstrike/core native addon
        run: napi build --release --platform artifacts
        working-directory: crates/deepstrike-node
      - name: Install @deepstrike/core from local build
        run: |
          cp crates/deepstrike-node/artifacts/index.d.ts crates/deepstrike-node/artifacts/index.js crates/deepstrike-node/
          npm install --no-save
          cp crates/deepstrike-node/artifacts/*.node node_modules/@deepstrike/core/
          cp crates/deepstrike-node/index.d.ts crates/deepstrike-node/index.js node_modules/@deepstrike/core/
        working-directory: node
      - run: npm test
        working-directory: node

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: pip install maturin pytest pytest-asyncio
      - name: Build and install wheel
        working-directory: python
        run: |
          maturin build --release --out dist
          pip install dist/*.whl
      - run: pytest
        working-directory: python
