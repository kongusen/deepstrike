name: Release Node.js SDK

# 触发方式：
# 1) 打 tag v*：与其它 release 工作流一样由 tag 触发
# 2) 手动：Actions → 选本 workflow → Run workflow（仅跑 Node，不跑 wasm/python/rust）
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本号（不要带 v），例如 0.1.6；与 node/package.json 一致"
        required: true
        type: string

env:
  NODE_VERSION: 20

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 阶段一：各平台分别编译 .node 原生 addon
  #
  # napi v2 CLI 关键行为：
  #   napi build [options] [destDir]
  #   - destDir（位置参数）：.node 文件输出目录，默认为 CWD
  #   - index.d.ts 和 index.js：始终输出到 CWD（package root），与 destDir 无关
  #   - 没有 --output-dir / --use-napi-cross 选项（这些是 napi v3 的参数）
  #   - ARM64 Linux (glibc) 交叉编译：gcc-aarch64-linux-gnu + 环境变量
  #   - Linux musl（Alpine 等）：musl-tools；aarch64 musl 在 arm64 runner 上原生编译
  #   - musl 默认静态链接 libc；Node 需动态链 musl，故 RUSTFLAGS=-C target-feature=-crt-static
  # ──────────────────────────────────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            pkg: linux-arm64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            pkg: linux-x64-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            pkg: linux-arm64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            pkg: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: win32-x64-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { key: "${{ matrix.target }}" }

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2

      # ARM64 Linux 交叉编译：安装 gcc 交叉工具链
      # （napi v2 无 --use-napi-cross，需手动设置 linker）
      - name: Install ARM64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      # musl cdylib 原理：
      #   +crt-static 在 musl 上会禁用 cdylib 支持（Rust 编译器限制）
      #   -crt-static（动态 musl）需要 libgcc_s.so.1，而 musl 工具链没有它
      #   解法：用 cargo-zigbuild，zig 自带完整 musl 运行时，包含 libgcc_s 等价实现
      - name: Install zig + cargo-zigbuild (musl targets)
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          ZIG_VERSION="0.13.0"
          ARCH=$(uname -m)
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-${ARCH}-${ZIG_VERSION}.tar.xz" \
            | sudo tar -xJ -C /usr/local/
          sudo ln -sf "/usr/local/zig-linux-${ARCH}-${ZIG_VERSION}/zig" /usr/local/bin/zig
          zig version
          cargo install cargo-zigbuild

      - name: Install ARM64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build native addon (ARM64 Linux cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          napi build --release --platform --target ${{ matrix.target }} artifacts
        working-directory: crates/deepstrike-node

      - name: Build native addon (Linux x64 musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        env:
          RUSTFLAGS: "-C target-feature=-crt-static"
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} --manifest-path Cargo.toml
          mkdir -p artifacts
          cp "../../target/${{ matrix.target }}/release/libdeepstrike_node.so" \
             "artifacts/index.${{ matrix.pkg }}.node"
        working-directory: crates/deepstrike-node

      - name: Build native addon (Linux arm64 musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        shell: bash
        env:
          RUSTFLAGS: "-C target-feature=-crt-static"
        run: |
          cargo zigbuild --release --target ${{ matrix.target }} --manifest-path Cargo.toml
          mkdir -p artifacts
          cp "../../target/${{ matrix.target }}/release/libdeepstrike_node.so" \
             "artifacts/index.${{ matrix.pkg }}.node"
        working-directory: crates/deepstrike-node

      - name: Build native addon
        if: matrix.target != 'aarch64-unknown-linux-gnu' && !contains(matrix.target, 'linux-musl')
        shell: bash
        run: |
          # Prepend ~/.cargo/bin to PATH: macOS runners may have a broken system cargo (rustup-init proxy)
          export PATH="$HOME/.cargo/bin:$PATH"
          napi build --release --platform --target ${{ matrix.target }} artifacts
        working-directory: crates/deepstrike-node

      # .node 文件由 napi 写入 artifacts/；上传至 GHA artifact
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.pkg }}
          path: crates/deepstrike-node/artifacts/*.node

      # napi v2 指定 destDir 后，.node / index.d.ts / index.js 全部写入 destDir（artifacts/）
      # 只使用生成的类型定义；loader 由仓库维护，避免生成器暴露未发布平台分支
      # 只需从 linux-x64-gnu 收集一次（各平台 DTS 相同）
      - name: Upload generated type definitions
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          ART="crates/deepstrike-node/artifacts"
          mkdir -p napi-types-artifact

          if [ ! -s "$ART/index.d.ts" ]; then
            echo "::error::napi 未在 $ART/index.d.ts 生成非空类型定义"
            find "crates/deepstrike-node" -maxdepth 4 \( -name '*.d.ts' -o -name '*.js' \) \
              -not -path '*/node_modules/*' | sort || true
            exit 1
          fi

          cp "$ART/index.d.ts" napi-types-artifact/index.d.ts
          test -s napi-types-artifact/index.d.ts

      - name: Upload napi-types artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: napi-types
          path: napi-types-artifact/

  # ──────────────────────────────────────────────────────────────────────────
  # 阶段二：汇总产物，发布到 npm
  #
  # 发布顺序：
  #   1. @deepstrike/core-<platform>  （7 个平台包：含 linux x64/arm64 的 gnu + musl，各含一个 .node）
  #   2. @deepstrike/core             （含 index.js loader + index.d.ts 类型）
  #   3. @deepstrike/sdk              （TypeScript SDK，tsc 编译后发布）
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "${{ env.NODE_VERSION }}"
          registry-url: "https://registry.npmjs.org"

      # 下载所有 .node 文件到 artifacts/（repo root 下）
      - name: Download all native addons
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # 下载生成的 index.d.ts 到 napi-types-artifact/
      - name: Download generated type definitions
        uses: actions/download-artifact@v4
        with:
          name: napi-types
          path: napi-types-artifact

      # 将生成的类型定义写回 crate root，loader 保持使用仓库内维护版本
      - name: Install napi bindings into crate root
        run: |
          cp napi-types-artifact/index.d.ts crates/deepstrike-node/
          test -s crates/deepstrike-node/index.d.ts

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2

      - name: Resolve publish version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # 将 SDK、core loader、平台二进制包统一到本次发布版本，避免 npm install 解析到旧平台包
      - name: Sync Node package versions
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          node scripts/sync-node-release-version.mjs "$VERSION"

      # 构建阶段统一收敛为 napi 生成的 index.<pkg>.node 命名；
      # 发布时再复制为各平台 npm 包实际暴露的 deepstrike-core.<pkg>.node。
      # artifacts/ 在 repo root，从 crates/deepstrike-node/ 需 ../../artifacts/
      - name: Install native addons into platform packages
        working-directory: crates/deepstrike-node
        run: |
          set -euo pipefail
          for dir in npm/*/; do
            pkg=$(basename "$dir")
            expected="$dir/deepstrike-core.${pkg}.node"
            node_file=$(find ../../artifacts -maxdepth 1 -type f -name "index.${pkg}.node" -print -quit)
            if [ -z "$node_file" ]; then
              echo "::error::No .node file found for $pkg"
              ls -la ../../artifacts
              exit 1
            fi
            cp "$node_file" "$expected"
            test -s "$expected"
          done

      - name: Validate npm package layout
        working-directory: crates/deepstrike-node
        shell: bash
        run: |
          set -euo pipefail
          test -s index.js
          test -s index.d.ts

          core_files=$(npm pack --dry-run --json | node -e '
            let data = "";
            process.stdin.on("data", chunk => data += chunk);
            process.stdin.on("end", () => {
              const files = JSON.parse(data)[0].files.map(file => file.path).sort();
              console.log(files.join("\n"));
            });
          ')
          printf '%s\n' "$core_files" | grep -qx 'index.js'
          printf '%s\n' "$core_files" | grep -qx 'index.d.ts'
          if printf '%s\n' "$core_files" | grep -Eq '(^npm/|^src/|^Cargo\.toml$|\.node$)'; then
            echo "::error::@deepstrike/core package contains native/build files:"
            printf '%s\n' "$core_files"
            exit 1
          fi

          for dir in npm/*/; do
            pkg=$(basename "$dir")
            test -s "$dir/deepstrike-core.${pkg}.node"
            npm pack "$dir" --dry-run >/dev/null
          done

      - name: Smoke install local Linux x64 package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/deepstrike-node-smoke/packs /tmp/deepstrike-node-smoke/app
          npm pack crates/deepstrike-node --pack-destination /tmp/deepstrike-node-smoke/packs
          npm pack crates/deepstrike-node/npm/linux-x64-gnu --pack-destination /tmp/deepstrike-node-smoke/packs
          cd /tmp/deepstrike-node-smoke/app
          npm init -y >/dev/null
          npm install --ignore-scripts /tmp/deepstrike-node-smoke/packs/deepstrike-core-*.tgz /tmp/deepstrike-node-smoke/packs/deepstrike-core-linux-x64-gnu-*.tgz
          node -e "const core = require('@deepstrike/core'); if (!core || typeof core.Governance !== 'function') throw new Error('native core did not load')"

      - name: Publish platform packages
        working-directory: crates/deepstrike-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          for dir in npm/*/; do
            node ../../scripts/publish-npm-package.mjs "$dir"
          done

      - name: Publish @deepstrike/core
        run: node ../../scripts/publish-npm-package.mjs .
        working-directory: crates/deepstrike-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build @deepstrike/sdk
        run: |
          npm install --no-save --package-lock=false --ignore-scripts --omit=optional ../crates/deepstrike-node
          test -s node_modules/@deepstrike/core/index.d.ts
          npm run build
        working-directory: node

      - name: Publish @deepstrike/sdk
        run: node ../scripts/publish-npm-package.mjs .
        working-directory: node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
