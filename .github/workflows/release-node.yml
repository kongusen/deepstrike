name: Release Node.js SDK

on:
  push:
    tags: ["v*"]

env:
  NODE_VERSION: 20

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            pkg: linux-arm64-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            pkg: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: win32-x64-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { key: "${{ matrix.target }}" }

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build native addon (Linux ARM64 cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: napi build --release --platform --target ${{ matrix.target }} --output-dir artifacts --use-napi-cross
        working-directory: crates/deepstrike-node

      - name: Build native addon
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: napi build --release --platform --target ${{ matrix.target }} --output-dir artifacts
        working-directory: crates/deepstrike-node

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.pkg }}
          path: crates/deepstrike-node/artifacts/*.node

      - name: Upload generated type definitions
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: napi-types
          path: |
            crates/deepstrike-node/index.d.ts
            crates/deepstrike-node/index.js

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "${{ env.NODE_VERSION }}"
          registry-url: "https://registry.npmjs.org"

      - name: Download all native addons
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Download generated type definitions
        uses: actions/download-artifact@v4
        with:
          name: napi-types
          path: crates/deepstrike-node

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      # Sync platform package versions to match the tag
      - name: Sync platform package versions
        working-directory: crates/deepstrike-node
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for dir in npm/*/; do
            npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix "$dir"
          done

      # Move each .node file into its platform npm dir and publish
      - name: Publish platform packages
        working-directory: crates/deepstrike-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            pkg=$(basename "$dir")
            node_file=$(ls ../../artifacts/deepstrike-core.*${pkg}*.node 2>/dev/null | head -1)
            if [ -n "$node_file" ]; then
              cp "$node_file" "$dir/"
              npm publish "$dir" --access public || echo "Skipping $pkg (already published)"
            fi
          done

      - name: Publish @deepstrike/core
        run: npm publish --access public || echo "Skipping @deepstrike/core (already published)"
        working-directory: crates/deepstrike-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build @deepstrike/sdk
        run: |
          npm install
          cp ../crates/deepstrike-node/index.d.ts node_modules/@deepstrike/core/index.d.ts
          npm run build
        working-directory: node

      - name: Publish @deepstrike/sdk
        run: npm publish --access public
        working-directory: node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
