name: Release Node.js SDK

# 触发方式：
# 1) 打 tag v*：与其它 release 工作流一样由 tag 触发
# 2) 手动：Actions → 选本 workflow → Run workflow（仅跑 Node，不跑 wasm/python/rust）
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "要发布的版本号（不要带 v），例如 0.1.3；与 node/package.json 一致"
        required: true
        type: string

env:
  NODE_VERSION: 20

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 阶段一：各平台分别编译 .node 原生 addon
  #
  # napi v2 CLI 关键行为：
  #   napi build [options] [destDir]
  #   - destDir（位置参数）：.node 文件输出目录，默认为 CWD
  #   - index.d.ts 和 index.js：始终输出到 CWD（package root），与 destDir 无关
  #   - 没有 --output-dir / --use-napi-cross 选项（这些是 napi v3 的参数）
  #   - ARM64 Linux 交叉编译：通过 gcc-aarch64-linux-gnu 工具链 + 环境变量实现
  # ──────────────────────────────────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            pkg: linux-arm64-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            pkg: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: win32-x64-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { key: "${{ matrix.target }}" }

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2

      # ARM64 Linux 交叉编译：安装 gcc 交叉工具链
      # （napi v2 无 --use-napi-cross，需手动设置 linker）
      - name: Install ARM64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build native addon (ARM64 Linux cross-compile)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: napi build --release --platform --target ${{ matrix.target }} artifacts
        working-directory: crates/deepstrike-node

      - name: Build native addon
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        shell: bash
        run: napi build --release --platform --target ${{ matrix.target }} artifacts
        working-directory: crates/deepstrike-node

      # .node 文件由 napi 写入 artifacts/；上传至 GHA artifact
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.pkg }}
          path: crates/deepstrike-node/artifacts/*.node

      # napi v2 指定 destDir 后，.node / index.d.ts / index.js 全部写入 destDir（artifacts/）
      # CWD 里的文件不会被覆盖，所以从 artifacts/ 收集
      # 只需从 linux-x64-gnu 收集一次（各平台 DTS 相同）
      - name: Upload generated type definitions
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          ART="crates/deepstrike-node/artifacts"
          mkdir -p napi-types-artifact

          if [ ! -s "$ART/index.d.ts" ]; then
            echo "::error::napi 未在 $ART/index.d.ts 生成非空类型定义"
            find "crates/deepstrike-node" -maxdepth 4 \( -name '*.d.ts' -o -name '*.js' \) \
              -not -path '*/node_modules/*' | sort || true
            exit 1
          fi

          cp "$ART/index.d.ts" napi-types-artifact/index.d.ts
          cp "$ART/index.js"   napi-types-artifact/index.js
          test -s napi-types-artifact/index.d.ts

      - name: Upload napi-types artifact
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: napi-types
          path: napi-types-artifact/

  # ──────────────────────────────────────────────────────────────────────────
  # 阶段二：汇总产物，发布到 npm
  #
  # 发布顺序：
  #   1. @deepstrike/core-<platform>  （5 个平台包，各含一个 .node 文件）
  #   2. @deepstrike/core             （含 index.js loader + index.d.ts 类型）
  #   3. @deepstrike/sdk              （TypeScript SDK，tsc 编译后发布）
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "${{ env.NODE_VERSION }}"
          registry-url: "https://registry.npmjs.org"

      # 下载所有 .node 文件到 artifacts/（repo root 下）
      - name: Download all native addons
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # 下载 index.d.ts / index.js 到 napi-types-artifact/
      - name: Download generated type definitions
        uses: actions/download-artifact@v4
        with:
          name: napi-types
          path: napi-types-artifact

      # 将生成的类型定义写回 crate root，供后续步骤使用
      - name: Install napi bindings into crate root
        run: |
          cp napi-types-artifact/index.d.ts napi-types-artifact/index.js crates/deepstrike-node/
          test -s crates/deepstrike-node/index.d.ts

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli@2

      - name: Resolve publish version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # 将各平台包版本号同步为本次发布版本
      - name: Sync platform package versions
        working-directory: crates/deepstrike-node
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          for dir in npm/*/; do
            npm version "$VERSION" --no-git-tag-version --allow-same-version --prefix "$dir"
          done

      # 把对应 .node 文件复制进各平台 npm 目录，然后发布
      # artifacts/ 在 repo root，从 crates/deepstrike-node/ 需 ../../artifacts/
      - name: Publish platform packages
        working-directory: crates/deepstrike-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            pkg=$(basename "$dir")
            node_file=$(ls ../../artifacts/deepstrike-core.*${pkg}*.node 2>/dev/null | head -1)
            if [ -n "$node_file" ]; then
              cp "$node_file" "$dir/"
              npm publish "$dir" --access public || echo "Skipping $pkg (already published)"
            else
              echo "No .node file found for $pkg, skipping"
            fi
          done

      - name: Publish @deepstrike/core
        run: npm publish --access public || echo "Skipping @deepstrike/core (already published)"
        working-directory: crates/deepstrike-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build @deepstrike/sdk
        run: |
          npm install
          cp ../crates/deepstrike-node/index.d.ts ../crates/deepstrike-node/index.js node_modules/@deepstrike/core/
          test -s node_modules/@deepstrike/core/index.d.ts
          npm run build
        working-directory: node

      - name: Publish @deepstrike/sdk
        run: npm publish --access public || echo "Already published"
        working-directory: node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
