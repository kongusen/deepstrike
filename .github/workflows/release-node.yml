name: Release Node.js SDK

on:
  push:
    tags: ["node-v*"]

env:
  NODE_VERSION: 20

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            pkg: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            pkg: linux-arm64-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            pkg: linux-x64-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            pkg: linux-arm64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            pkg: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            pkg: win32-x64-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
        with: { key: "${{ matrix.target }}" }

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      # Use napi-cross for Linux cross-compilation (handles musl + ARM64 via zig)
      - name: Build native addon (Linux)
        if: runner.os == 'Linux'
        run: napi build --release --platform --target ${{ matrix.target }} --output-dir artifacts --use-napi-cross
        working-directory: crates/deepstrike-node

      - name: Build native addon (macOS / Windows)
        if: runner.os != 'Linux'
        run: napi build --release --platform --target ${{ matrix.target }} --output-dir artifacts
        working-directory: crates/deepstrike-node

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.pkg }}
          path: crates/deepstrike-node/artifacts/*.node

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          registry-url: "https://registry.npmjs.org"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Download all native addons
        uses: actions/download-artifact@v4
        with:
          path: crates/deepstrike-node/artifacts
          merge-multiple: true

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Publish platform packages
        run: napi prepublish --skip-gh-release
        working-directory: crates/deepstrike-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deepstrike/core
        run: npm publish --access public
        working-directory: crates/deepstrike-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build @deepstrike/sdk
        run: npm install && npm run build
        working-directory: node

      - name: Publish @deepstrike/sdk
        run: npm publish --access public
        working-directory: node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
