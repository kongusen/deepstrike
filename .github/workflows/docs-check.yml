name: Docs Drift Check

# Thin manual entry point. Drift is a permanent job on the main CI workflow
# (see ci.yml → docs), which is what release gates wait on. Keep this workflow
# for ad-hoc re-runs without waiting for a full CI matrix.
# Spec: .local-docs/specs/docs-code-narrative-sync.md
on:
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Check docs ↔ code drift
        run: node scripts/check-docs-drift.mjs
